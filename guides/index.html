atic/chunks/472-1542fbc46b2b2207.js\",\"177\",\"static/chunks/app/layout-04c2d03778e1a81b.js\"],\"default\"]\n3:I[85496,[\"274\",\"static/chunks/274-c88b5be990786de4.js\",\"619\",\"static/chunks/619-f072ac750404f9da.js\",\"214\",\"static/chunks/214-de4077ebac0b9f16.js\",\"472\",\"static/chunks/472-1542fbc46b2b2207.js\",\"177\",\"static/chunks/app/layout-04c2d03778e1a81b.js\"],\"default\"]\n4:I[9766,[],\"\"]\n5:I[98924,[],\"\"]\n6:I[88743,[\"274\",\"static/chunks/274-c88b5be990786de4.js\",\"619\",\"static/chunks/619-f072ac750404f9da.js\",\"214\",\"static/chunks/214-de4077ebac0b9f16.js\",\"472\",\"static/chunks/472-1542fbc46b2b2207.js\",\"177\",\"static/chunks/app/layout-04c2d03778e1a81b.js\"],\"default\"]\n7:I[42823,[\"274\",\"static/chunks/274-c88b5be990786de4.js\",\"619\",\"static/chunks/619-f072ac750404f9da.js\",\"214\",\"static/chunks/214-de4077ebac0b9f16.js\",\"6\",\"static/chunks/app/guides/page-b835bb06d3baa961.js\"],\"default\"]\n26:I[57150,[],\"\"]\n:HL[\"/_next/static/css/203636aecdefe762.css\",\"style\"]\n8:T45df,"])</script><script>self.__next_f.push([1,"\n# دليل مهارات ومستويات النجوم للأبطال ⭐\n\nيتضمن تقدم الأبطال في DarkWar Survival نظامين مترابطين: **مستويات النجوم** و **المهارات**. يغطي هذا الدليل الشامل كل ما تحتاج لمعرفته حول ترقية أبطالك من 0 نجمة إلى 5 نجوم، فتح مهاراتهم، وتعظيم إمكاناتهم.\n\n---\n\n## نظام مستويات النجوم\n\n### أساسيات مستوى النجوم\n\n**الآليات الأساسية:**\n- يبدأ الأبطال بـ **0 نجمة** ويمكنهم الوصول إلى حد أقصى **5 نجوم**\n- ينقسم كل مستوى نجوم إلى **5 أجزاء**\n- يتطلب كل جزء **شظايا صفراء (Yellow Shards)** لملئه\n- بمجرد ملء جميع الأجزاء الخمسة، يتقدم البطل إلى مستوى النجوم التالي\n\n**لماذا تهم مستويات النجوم:**\n- **تُفتح المهارات تدريجياً** عندما تكسب مستويات النجوم\n- **توفر المهارة الرابعة مكافآت سعة القوات الحاسمة** (زيادة ~5٪)\n- يحتاج الأبطال إلى **حد أدنى 4 نجوم** ليكونوا فعالين في التشكيلات\n- يؤثر مستوى النجوم مباشرة على قوة القتال (CP)\n\n---\n\n### متطلبات الشظايا الصفراء\n\nيوضح الجدول التالي التكلفة الدقيقة للشظايا الصفراء لكل جزء في كل مستوى نجوم:\n\n| مستوى النجوم | الجزء 1 | الجزء 2 | الجزء 3 | الجزء 4 | الجزء 5 | **إجمالي الشظايا الصفراء المطلوبة** |\n|:----------:|:----------:|:----------:|:----------:|:----------:|:----------:|:--------------------:|\n| **0 → 1** | 1 | 1 | 2 | 3 | 5 | **12** |\n| **1 → 2** | 5 | 5 | 5 | 5 | 15 | **35** |\n| **2 → 3** | 15 | 15 | 15 | 15 | 50 | **110** |\n| **3 → 4** | 50 | 50 | 50 | 50 | 100 | **300** |\n| **4 → 5** | 100 | 100 | 100 | 100 | 100 | **500** |\n\n### التكاليف التراكمية للشظايا الصفراء\n\n| مستوى النجوم المستهدف | إجمالي الشظايا الصفراء المطلوبة |\n|:-----------------:|:----------------------------:|\n| **1 نجمة** | **12** |\n| **2 نجمة** | **47** (12 + 35) |\n| **3 نجوم** | **157** (47 + 110) |\n| **4 نجوم** | **457** (157 + 300) |\n| **5 نجوم** | **957** (457 + 500) |\n\n**لرفع بطل إلى أقصى حد إلى 5 نجوم يتطلب 957 شظية صفراء.**\n\n---\n\n### فتح المهارات حسب مستوى النجوم\n\nتُفتح المهارات تدريجياً عندما يكسب بطلك النجوم:\n\n| مستوى النجوم المحقق | المهارة المفتوحة | ملاحظات |\n|:------------------:|:--------------:|:------|\n| **1 نجمة** | **المهارة الأولى** | فتح المهارة الأساسية |\n| **2 نجمة** | **المهارة الثانية** | فتح المهارة الثانوية |\n| **3 نجوم** | **المهارة الثالثة** | **مهارة حاسمة** - غالباً ما تحتوي على تعزيزات قوية للتطوير أو القوات |\n| **4 نجوم** | **المهارة الرابعة** | **مهارة سعة الوحدة** - توفر زيادة في حد القوات (~5٪) + مكافآت هجوم/دفاع البطل |\n| **5 نجوم** | — | الوصول إلى أقصى مستوى نجوم |\n\n**ملاحظات مهمة:**\n- يمكن رفع مستوى المهارات 1 و 2 و 3 من **1 إلى 30**\n- **الحد الأقصى لمستوى المهارة 4 هو 1** (لا يمكن ترقيته أكثر)\n- يجب عليك فتح مهارة بالوصول إلى مستوى نجومها قبل أن تتمكن من ترقيتها بكتب المهارات\n\n---\n\n## نظرة عامة على نظام المهارات\n\n### آليات المهارات\n\n**أساسيات المهارات:**\n- كل بطل لديه بالضبط **4 مهارات**\n- تبدأ المهارات في **المستوى 1** ويمكن ترقيتها إلى **المستوى 30** (باستثناء المهارة 4)\n- **المهارة 4 مقفلة عند المستوى 1** ولا يمكن ترقيتها\n- يتطلب كل مستوى مهارة **كتب مهارات** للترقية\n- يعتمد نوع كتاب المهارات على ندرة البطل\n\n**ندرة البطل وكتب المهارات:**\n\n| ندرة البطل | نوع كتاب المهارات |\n|-------------|----------------|\n| 🟠 **برتقالي (S-Tier)** | كتب المهارات البرتقالية |\n| 🟣 **أرجواني (A-Tier)** | كتب المهارات الأرجوانية |\n| 🔵 **أزرق (B-Tier)** | كتب المهارات الزرقاء |\n\n**ملاحظات مهمة:**\n- يجب عليك استخدام **كتاب المهارات المطابق** لندرة بطلك\n- ترتفع مستويات المهارات 1-3 بشكل مستقل\n- تتبع جميع المهارات 1-3 نفس هيكل تكلفة المستوى\n\n---\n\n## متطلبات كتب المهارات لكل مستوى\n\nيوضح الجدول التالي **العدد الدقيق لكتب المهارات المطلوبة** لترقية كل مهارة من مستوى إلى آخر:\n\n| من المستوى | إلى المستوى | كتب المهارات المطلوبة |\n|:----------:|:--------:|:--------------------:|\n| 1 | 2 | 10 |\n| 2 | 3 | 10 |\n| 3 | 4 | 20 |\n| 4 | 5 | 20 |\n| 5 | 6 | 30 |\n| 6 | 7 | 30 |\n| 7 | 8 | 40 |\n| 8 | 9 | 40 |\n| 9 | 10 | 60 |\n| 10 | 11 | 80 |\n| 11 | 12 | 120 |\n| 12 | 13 | 160 |\n| 13 | 14 | 200 |\n| 14 | 15 | 240 |\n| 15 | 16 | 280 |\n| 16 | 17 | 320 |\n| 17 | 18 | 360 |\n| 18 | 19 | 400 |\n| 19 | 20 | 460 |\n| 20 | 21 | 520 |\n| 21 | 22 | 580 |\n| 22 | 23 | 640 |\n| 23 | 24 | 700 |\n| 24 | 25 | 760 |\n| 25 | 26 | 820 |\n| 26 | 27 | 900 |\n| 27 | 28 | 1,000 |\n| 28 | 29 | 1,100 |\n| 29 | 30 | 1,200 |\n\n---\n\n## التكاليف التراكمية لكتب المهارات\n\nفهم الاستثمار الإجمالي المطلوب للوصول إلى معالم مستوى المهارة المعينة:\n\n### تكاليف المعالم (لكل مهارة)\n\n| المستوى المستهدف | إجمالي الكتب المطلوبة | الإجمالي التراكمي |\n|:------------:|:-------------------:|:---------------:|\n| **المستوى 5** | المستويات 2-5 | **60** |\n| **المستوى 10** | المستويات 2-10 | **260** |\n| **المستوى 15** | المستويات 2-15 | **1,220** |\n| **المستوى 20** | المستويات 2-20 | **3,520** |\n| **المستوى 25** | المستويات 2-25 | **7,360** |\n| **المستوى 30** | المستويات 2-30 | **13,860** |\n\n### التكلفة الإجمالية للمهارات 1-3\n\nنظراً لأن كل بطل لديه **3 مهارات قابلة للترقية** (المهارات 1-3) التي يجب رفع مستواها بشكل مستقل:\n\n| المستوى المستهدف | كتب لكل مهارة | كتب للمهارات 1-3 |\n|:------------:|:--------------:|:-------------------:|\n| **المستوى 5** | 60 | **180** |\n| **المستوى 10** | 260 | **780** |\n| **المستوى 15** | 1,220 | **3,660** |\n| **المستوى 20** | 3,520 | **10,560** |\n| **المستوى 25** | 7,360 | **22,080** |\n| **المستوى 30** | 13,860 | **41,580** |\n\n**هذا يعني أنه لرفع مهارات بطل واحد القابلة للترقية إلى أقصى حد (المهارات 1-3 إلى المستوى 30)، تحتاج إلى:**\n- 🟠 **41,580 كتاب مهارات برتقالي** لبطل S-Tier\n- 🟣 **41,580 كتاب مهارات أرجواني** لبطل A-Tier\n- 🔵 **41,580 كتاب مهارات أزرق** لبطل B-Tier\n\n*تذكر: المهارة 4 دائماً في المستوى 1 ولا يمكن ترقيتها.*\n\n---\n\n## استراتيجية الترقية\n\n### أولوية مستوى النجوم\n\n**متطلبات الحد الأدنى لمستوى النجوم:**\n\n1. **الوصول إلى 4 نجوم كحد أدنى** لأبطال التشكيل\n   - فتح المهارة الرابعة الحاسمة (تعزيز سعة القوات)\n   - زيادة سعة القوات بنسبة ~5٪ تؤثر بشكل كبير على قوة القتال (CP)\n   - التشكيلات ذات سعة القوات الأعلى لديها CP أعلى بكثير\n   - توفر المهارة الرابعة أيضاً مكافآت هجوم/دفاع البطل\n\n2. **ادفع إلى 5 نجوم** لأفضل 5 أبطال رئيسيين لديك\n   - يعظم إمكانات البطل\n   - مطلوب للعب التنافسي في نهاية اللعبة\n\n3. **يمكن لأبطال المنفعة التوقف عند 3-4 نجوم**\n   - فتح المهارة الثالثة غالباً ما يكون كافياً لأغراض المنفعة\n   - من الأفضل إنفاق الشظايا الصفراء على أبطال القتال\n\n### نظام أولوية المهارات\n\n**حاسم: تحقق دائماً من المهارة الثالثة أولاً!**\n\n**المهارة الثالثة** غالباً ما تحتوي على أكثر التعزيزات قيمة للبطل. قبل استثمار كتب المهارات، افحص ما توفره المهارة الثالثة:\n\n**إذا كانت المهارة الثالثة لديها تعزيزات قوية:**\n- تعزيزات التطوير (البحث، البناء، التدريب، إلخ)\n- تعزيزات القوات الشاملة (الضرر، الدفاع، HP، إلخ)\n- مكافآت الموارد\n\n**ترتيب الأولوية:**\n1. **المهارة الثالثة إلى المستوى 30** ← ركز هنا أولاً\n2. المهارة الأولى إلى المستوى 30\n3. المهارة الثانية إلى المستوى 30\n4. المهارة الرابعة (دائماً المستوى 1، لا حاجة للترقية)\n\n**إذا كانت المهارة الثالثة لديها تعزيزات ضعيفة/ظرفية:**\n\n**ترتيب الأولوية:**\n1. **المهارة الأولى إلى المستوى 30** ← ابدأ هنا\n2. **المهارة الثانية إلى المستوى 30** ← ثم هذا\n3. المهارة الثالثة إلى المستوى 30 ← أولوية أقل\n4. المهارة الرابعة (دائماً المستوى 1، لا حاجة للترقية)\n\n---\n\n### استراتيجيات نوع البطل\n\n**أفضل 5 أبطال قتالية:**\n- **مستوى النجوم:** ادفع إلى **4-5 نجوم** (حد أدنى 4 نجوم للتشكيلات)\n- **أولوية المهارات:** تحقق من المهارة الثالثة أولاً، ثم اتبع ترتيب الأولوية\n- **هدف المهارة:** استهدف **المستوى 20+** على المهارات ذات الأولوية للقوة التنافسية\n- **نهاية اللعبة:** ادفع المهارات ذات الأولوية إلى **المستوى 30**\n\n**أبطال المنفعة (الأزرق والأرجواني):**\n\n*أبطال الموارد الزرقاء (Willow، Ruby، Selena، Bob، Musashimaru، Joe):*\n- **مستوى النجوم:** الوصول إلى **3 نجوم كحد أدنى** لفتح المهارة الثالثة\n- **أولوية المهارات:** ركز حصرياً على **المهارة الثالثة** (تعزيز الموارد) إلى المستوى 30\n- المهارات 1 و 2 و 4 لها أولوية منخفضة\n\n*أبطال المنفعة الأرجوانية (Andre، Victor، Liz، Barnett):*\n- **مستوى النجوم:** الوصول إلى **3-4 نجوم** (يوصى بـ 4 نجوم لسعة القوات)\n- **أولوية المهارات:** ركز على **المهارة الثالثة** (تعزيز المنفعة) إلى المستوى 30 أولاً\n- يمكن رفع مستوى المهارات الأولى والثانية إذا سمحت الموارد\n- المهارة الرابعة (سعة القوات) تُفتح عند 4 نجوم\n\n**أبطال قاعة الشرف (القتال الأرجواني):**\n- **مستوى النجوم:** يجب الوصول إلى **5 نجوم** لدخول قاعة الشرف\n- **أولوية المهارات:** المهارة الثالثة عادة ما يكون لديها تعزيزات فصائلية، حدد الأولوية وفقاً لذلك\n- توفر هذه الأبطال مكافآت قتالية على مستوى الفصيل بمجرد دخول قاعة الشرف\n\n---\n\n### إدارة الموارد\n\n**مصادر الشظايا الصفراء:**\n- الأسواق السوداء\n- الأحداث والمكافآت\n- عمليات التبادل الخاصة بالأحداث\n- مرافقة ونهب الشاحنات\n- مكافآت مبارزة التحالف\n- مكافآت التأهب للبقاء\n- فوائد VIP\n\n**مصادر كتب المهارات:**\n- الأسواق السوداء\n- نهب مهام نداء الظل\n- مكافآت مبارزة التحالف\n- مكافآت التأهب للبقاء\n- الأحداث والمكافآت\n- عمليات التبادل الخاصة بالأحداث\n- فوائد VIP\n\n**استراتيجية الحفاظ:**\n- **الشظايا الصفراء:** أعط الأولوية لجعل أبطال القتال يصلون إلى 4 نجوم كحد أدنى\n- **كتب المهارات:** تحقق دائماً من قيمة المهارة الثالثة قبل الاستثمار\n- لا تنشر الموارد بشكل رقيق جداً عبر العديد من الأبطال\n- أكمل تقدم بطل واحد قبل الانتقال إلى التالي\n- احفظ موارد المستوى الأعلى (البرتقالي) لأفضل أبطالك المطلقين\n- يمكن أن تكون موارد الأزرق/الأرجواني أكثر تحرراً لأبطال المنفعة\n\n---\n\n## ملخص مرجعي سريع 📋\n\n```\n═══════════════════════════════════════\n    دليل مهارات ومستويات النجوم\n═══════════════════════════════════════\n\n⭐ أساسيات مستوى النجوم\n✦ 0 → 5 نجوم كحد أقصى\n✦ 5 أجزاء لكل مستوى نجوم\n✦ الشظايا الصفراء المطلوبة لكل نجمة:\n  • 1★: 12 شظية صفراء\n  • 2★: 35 شظية صفراء (47 إجمالي)\n  • 3★: 110 شظية صفراء (157 إجمالي)\n  • 4★: 300 شظية صفراء (457 إجمالي)\n  • 5★: 500 شظية صفراء (957 إجمالي)\n\n🔓 فتح المهارات\n✦ 1★ → المهارة الأولى\n✦ 2★ → المهارة الثانية\n✦ 3★ → المهارة الثالثة (غالباً الأكثر قيمة!)\n✦ 4★ → المهارة الرابعة (حد القوات +5٪، هجوم/دفاع)\n✦ 5★ → أقصى مستوى نجوم\n\n📚 نظام مستوى المهارات\n✦ المهارات 1-3: المستوى 1 → 30\n✦ المهارة 4: دائماً المستوى 1 (بدون ترقية)\n✦ كل مهارة ترتفع بشكل مستقل\n\n🎨 أنواع كتب المهارات\n✦ 🟠 أبطال برتقاليون → كتب المهارات البرتقالية\n✦ 🟣 أبطال أرجوانيون → كتب المهارات الأرجوانية\n✦ 🔵 أبطال زرق → كتب المهارات الزرقاء\n\n📊 المعالم الرئيسية (لكل مهارة 1-3)\n✦ المستوى 1 → 5:     60 كتاب\n✦ المستوى 1 → 10:    260 كتاب\n✦ المستوى 1 → 20:    3,520 كتاب\n✦ المستوى 1 → 30:    13,860 كتاب\n\n💎 التكلفة الإجمالية (جميع المهارات 1-3)\n✦ المستوى 10:    780 كتاب\n✦ المستوى 20:    10,560 كتاب\n✦ المستوى 30:    41,580 كتاب\n\n🎯 أولوية المهارات (حاسم!)\nالخطوة 1: تحقق من جودة المهارة الثالثة\nالخطوة 2أ: إذا كانت المهارة الثالثة جيدة → الثالثة → الأولى → الثانية\nالخطوة 2ب: إذا كانت المهارة الثالثة ضعيفة → الأولى → الثانية → الثالثة\nالخطوة 3: المهارة الرابعة دائماً المستوى 1 (لا حاجة لكتب)\n\n⚡ أولوية مستوى النجوم\nأبطال القتال:\n✦ الحد الأدنى: 4★ (فتح مهارة حد القوات)\n✦ الهدف: 5★ لأفضل 5 أبطال\n\nأبطال المنفعة:\n✦ أزرق: 3★ كحد أدنى (فتح المهارة الثالثة)\n✦ أرجواني: 3-4★ (المهارة الثالثة + حد اختياري)\n\nقاعدة التشكيل:\n✦ دائماً الوصول إلى 4★ كحد أدنى قبل الاستخدام في التشكيلات\n✦ سعة القوات = فرق CP كبير\n\n═══════════════════════════════════════\n```\n\n---\n\n**تذكر**:\n- **مستويات النجوم تفتح المهارات** - الوصول إلى 4 نجوم كحد أدنى لأبطال التشكيل!\n- **تحقق دائماً من المهارة الثالثة أولاً** - غالباً ما تحتوي على أفضل التعزيزات!\n- **المهارة الرابعة توفر سعة القوات الحاسمة** - ~5٪ يحدث فرق CP كبير!\n- **المهارة 4 دائماً المستوى 1** - لا حاجة لكتب المهارات!\n- **إدارة الموارد هي المفتاح** - ركز على الجودة بدلاً من الكمية!\n\nحظاً سعيداً، أيها الناجي! ⭐📚\n"])</script><script>self.__next_f.push([1,"9:T2e80,"])</script><script>self.__next_f.push([1,"\n# Panduan Skill dan Star Level Hero ⭐\n\nProgres hero di DarkWar Survival melibatkan dua sistem yang saling terhubung: **Star Level** dan **Skill**. Panduan komprehensif ini mencakup semua yang perlu Anda ketahui tentang upgrade hero dari 0 bintang ke 5 bintang, unlock skill mereka, dan memaksimalkan potensi mereka.\n\n---\n\n## Sistem Star Level\n\n### Dasar Star Level\n\n**Mekanik Inti:**\n- Hero dimulai di **0 bintang** dan dapat mencapai maksimum **5 bintang**\n- Setiap star level dibagi menjadi **5 fraksi**\n- Setiap fraksi memerlukan **Yellow Fragment (Yellow Shard)** untuk mengisi\n- Setelah semua 5 fraksi terisi, hero naik ke star level berikutnya\n\n**Mengapa Star Level Penting:**\n- **Skill unlock secara progresif** saat Anda mendapat star level\n- **Skill ke-4 memberikan bonus kapasitas pasukan penting** (~5% peningkatan)\n- Hero membutuhkan **minimum 4 bintang** untuk efektif dalam formasi\n- Star level langsung berdampak pada combat power (CP)\n\n---\n\n### Kebutuhan Yellow Fragment\n\nTabel berikut menunjukkan biaya yellow fragment yang tepat untuk setiap fraksi di setiap star level:\n\n| Star Level | Fraksi 1 | Fraksi 2 | Fraksi 3 | Fraksi 4 | Fraksi 5 | **Total YF Diperlukan** |\n|:----------:|:----------:|:----------:|:----------:|:----------:|:----------:|:--------------------:|\n| **0 → 1** | 1 | 1 | 2 | 3 | 5 | **12** |\n| **1 → 2** | 5 | 5 | 5 | 5 | 15 | **35** |\n| **2 → 3** | 15 | 15 | 15 | 15 | 50 | **110** |\n| **3 → 4** | 50 | 50 | 50 | 50 | 100 | **300** |\n| **4 → 5** | 100 | 100 | 100 | 100 | 100 | **500** |\n\n### Biaya Yellow Fragment Kumulatif\n\n| Target Star Level | Total Yellow Fragment Dibutuhkan |\n|:-----------------:|:----------------------------:|\n| **1 Bintang** | **12** |\n| **2 Bintang** | **47** (12 + 35) |\n| **3 Bintang** | **157** (47 + 110) |\n| **4 Bintang** | **457** (157 + 300) |\n| **5 Bintang** | **957** (457 + 500) |\n\n**Untuk memaksimalkan hero ke 5 bintang penuh memerlukan 957 Yellow Fragment.**\n\n---\n\n### Unlock Skill Berdasarkan Star Level\n\nSkill unlock secara progresif saat hero Anda mendapat bintang:\n\n| Star Level Dicapai | Skill Dibuka | Catatan |\n|:------------------:|:--------------:|:------|\n| **1 Bintang** | **Skill ke-1** | Skill dasar dibuka |\n| **2 Bintang** | **Skill ke-2** | Skill sekunder dibuka |\n| **3 Bintang** | **Skill ke-3** | **Skill kritis** - Sering berisi buff pengembangan atau pasukan yang kuat |\n| **4 Bintang** | **Skill ke-4** | **Skill kapasitas unit** - Memberikan peningkatan cap pasukan (~5%) + bonus ATK/DEF hero |\n| **5 Bintang** | — | Star level maksimum tercapai |\n\n**Catatan Penting:**\n- Skill 1, 2, dan 3 dapat di-level dari **1 hingga 30**\n- **Level maksimum Skill 4 adalah 1** (tidak dapat diupgrade lebih lanjut)\n- Anda harus unlock skill dengan mencapai star levelnya sebelum dapat mengupgradenya dengan skill book\n\n---\n\n## Tinjauan Sistem Skill\n\n### Mekanik Skill\n\n**Dasar Skill:**\n- Setiap hero memiliki tepat **4 skill**\n- Skill dimulai di **Level 1** dan dapat diupgrade ke **Level 30** (kecuali Skill 4)\n- **Skill 4 dikunci di Level 1** dan tidak dapat diupgrade\n- Setiap skill level memerlukan **skill book** untuk upgrade\n- Jenis skill book tergantung pada raritas hero\n\n**Raritas Hero \u0026 Skill Book:**\n\n| Raritas Hero | Jenis Skill Book |\n|-------------|----------------|\n| 🟠 **Orange (S-Tier)** | Buku Skill Orange |\n| 🟣 **Purple (A-Tier)** | Buku Skill Purple |\n| 🔵 **Blue (B-Tier)** | Buku Skill Biru |\n\n**Catatan Penting:**\n- Anda harus menggunakan **skill book yang cocok** untuk raritas hero Anda\n- Skill 1-3 level up secara independen\n- Semua skill 1-3 mengikuti struktur biaya leveling yang sama\n\n---\n\n## Kebutuhan Skill Book Per Level\n\nTabel berikut menunjukkan **jumlah skill book yang tepat yang diperlukan** untuk mengupgrade setiap skill dari satu level ke level berikutnya:\n\n| Dari Level | Ke Level | Skill Book Diperlukan |\n|:----------:|:--------:|:--------------------:|\n| 1 | 2 | 10 |\n| 2 | 3 | 10 |\n| 3 | 4 | 20 |\n| 4 | 5 | 20 |\n| 5 | 6 | 30 |\n| 6 | 7 | 30 |\n| 7 | 8 | 40 |\n| 8 | 9 | 40 |\n| 9 | 10 | 60 |\n| 10 | 11 | 80 |\n| 11 | 12 | 120 |\n| 12 | 13 | 160 |\n| 13 | 14 | 200 |\n| 14 | 15 | 240 |\n| 15 | 16 | 280 |\n| 16 | 17 | 320 |\n| 17 | 18 | 360 |\n| 18 | 19 | 400 |\n| 19 | 20 | 460 |\n| 20 | 21 | 520 |\n| 21 | 22 | 580 |\n| 22 | 23 | 640 |\n| 23 | 24 | 700 |\n| 24 | 25 | 760 |\n| 25 | 26 | 820 |\n| 26 | 27 | 900 |\n| 27 | 28 | 1,000 |\n| 28 | 29 | 1,100 |\n| 29 | 30 | 1,200 |\n\n---\n\n## Biaya Skill Book Kumulatif\n\nMemahami total investasi yang diperlukan untuk mencapai milestone skill level tertentu:\n\n### Biaya Milestone (Per Skill)\n\n| Target Level | Total Book Diperlukan | Total Kumulatif |\n|:------------:|:-------------------:|:---------------:|\n| **Level 5** | Level 2-5 | **60** |\n| **Level 10** | Level 2-10 | **260** |\n| **Level 15** | Level 2-15 | **1,220** |\n| **Level 20** | Level 2-20 | **3,520** |\n| **Level 25** | Level 2-25 | **7,360** |\n| **Level 30** | Level 2-30 | **13,860** |\n\n### Total Biaya untuk Skill 1-3\n\nKarena setiap hero memiliki **3 skill yang dapat diupgrade** (Skill 1-3) yang perlu di-level secara independen:\n\n| Target Level | Book Per Skill | Book untuk Skill 1-3 |\n|:------------:|:--------------:|:-------------------:|\n| **Level 5** | 60 | **180** |\n| **Level 10** | 260 | **780** |\n| **Level 15** | 1,220 | **3,660** |\n| **Level 20** | 3,520 | **10,560** |\n| **Level 25** | 7,360 | **22,080** |\n| **Level 30** | 13,860 | **41,580** |\n\n**Ini berarti untuk memaksimalkan skill yang dapat diupgrade dari satu hero (Skill 1-3 ke Level 30), Anda memerlukan:**\n- 🟠 **41,580 Buku Skill Orange** untuk hero S-Tier\n- 🟣 **41,580 Buku Skill Purple** untuk hero A-Tier\n- 🔵 **41,580 Buku Skill Biru** untuk hero B-Tier\n\n*Ingat: Skill 4 selalu Level 1 dan tidak dapat diupgrade.*\n\n---\n\n## Strategi Upgrade\n\n### Prioritas Star Level\n\n**Kebutuhan Star Level Minimum:**\n\n1. **Capai 4 Bintang Minimum** untuk hero formasi\n   - Unlock skill ke-4 yang kritis (boost kapasitas pasukan)\n   - Peningkatan kapasitas pasukan ~5% secara signifikan berdampak pada combat power (CP)\n   - Formasi dengan kapasitas pasukan lebih tinggi memiliki CP yang jauh lebih tinggi\n   - Skill ke-4 juga memberikan bonus ATK/DEF hero\n\n2. **Push ke 5 Bintang** untuk 5 hero utama Anda\n   - Maksimalkan potensi hero\n   - Diperlukan untuk permainan kompetitif endgame\n\n3. **Hero utilitas dapat berhenti di 3-4 bintang**\n   - Skill ke-3 yang di-unlock sering cukup untuk tujuan utilitas\n   - Yellow fragment lebih baik dihabiskan untuk hero combat\n\n### Sistem Prioritas Skill\n\n**KRITIS: Selalu Periksa Skill ke-3 Terlebih Dahulu!**\n\n**Skill ke-3** sering berisi buff paling berharga untuk hero. Sebelum menginvestasikan skill book, periksa apa yang diberikan skill ke-3:\n\n**Jika Skill ke-3 Memiliki Buff Kuat:**\n- Boost pengembangan (research, construction, training, dll.)\n- Buff pasukan universal (damage, defense, HP, dll.)\n- Bonus resource\n\n**Urutan Prioritas:**\n1. **Skill ke-3 ke Level 30** ← Fokus di sini dulu\n2. Skill ke-1 ke Level 30\n3. Skill ke-2 ke Level 30\n4. Skill ke-4 (selalu Level 1, tidak perlu upgrade)\n\n**Jika Skill ke-3 Memiliki Buff Lemah/Situasional:**\n\n**Urutan Prioritas:**\n1. **Skill ke-1 ke Level 30** ← Mulai di sini\n2. **Skill ke-2 ke Level 30** ← Lalu ini\n3. Skill ke-3 ke Level 30 ← Prioritas lebih rendah\n4. Skill ke-4 (selalu Level 1, tidak perlu upgrade)\n\n---\n\n### Strategi Tipe Hero\n\n**Top 5 Hero Combat:**\n- **Star Level:** Push ke **4-5 bintang** (minimum 4 bintang untuk formasi)\n- **Prioritas Skill:** Periksa skill ke-3 dulu, lalu ikuti urutan prioritas\n- **Target Skill:** Bidik **Level 20+** pada skill prioritas untuk kekuatan kompetitif\n- **Endgame:** Push skill prioritas ke **Level 30**\n\n**Hero Utilitas (Biru \u0026 Purple):**\n\n*Hero Resource Biru (Willow, Ruby, Selena, Bob, Musashimaru, Joe):*\n- **Star Level:** Capai **minimum 3 bintang** untuk unlock skill ke-3\n- **Prioritas Skill:** Fokus eksklusif pada **skill ke-3** (buff resource) ke Level 30\n- Skill 1, 2, dan 4 adalah prioritas rendah\n\n*Hero Utilitas Purple (Andre, Victor, Liz, Barnett):*\n- **Star Level:** Capai **3-4 bintang** (4 bintang direkomendasikan untuk kapasitas pasukan)\n- **Prioritas Skill:** Fokus pada **skill ke-3** (buff utilitas) ke Level 30 dulu\n- Skill ke-1 dan ke-2 dapat di-level jika resource memungkinkan\n- Skill ke-4 (kapasitas pasukan) unlock di 4 bintang\n\n**Hero Hall of Fame (Purple Combat):**\n- **Star Level:** Harus mencapai **5 bintang** untuk memasuki Hall of Fame\n- **Prioritas Skill:** Skill ke-3 biasanya memiliki buff faction, prioritaskan sesuai\n- Hero ini memberikan bonus combat seluruh faction setelah di Hall of Fame\n\n---\n\n### Manajemen Resource\n\n**Sumber Yellow Fragment:**\n- Black market\n- Event dan reward\n- Exchange event khusus\n- Escort dan loot truck\n- Reward alliance duel\n- Reward survival preparedness\n- Benefit VIP\n\n**Sumber Skill Book:**\n- Black market\n- Loot misi shadow call\n- Reward alliance duel\n- Reward survival preparedness\n- Event dan reward\n- Exchange event khusus\n- Benefit VIP\n\n**Strategi Konservasi:**\n- **Yellow Fragment:** Prioritaskan mendapatkan hero combat ke 4 bintang minimum\n- **Skill Book:** Selalu periksa nilai skill ke-3 sebelum berinvestasi\n- Jangan sebarkan resource terlalu tipis di banyak hero\n- Selesaikan progres satu hero sebelum pindah ke berikutnya\n- Simpan resource tier tinggi (Orange) untuk hero terbaik Anda\n- Resource Biru/Purple dapat lebih liberal untuk hero utilitas\n\n---\n\n## Ringkasan Referensi Cepat 📋\n\n```\n═══════════════════════════════════════\n    PANDUAN SKILL \u0026 STAR LEVEL HERO\n═══════════════════════════════════════\n\n⭐ DASAR STAR LEVEL\n✦ 0 → 5 bintang maksimum\n✦ 5 fraksi per star level\n✦ Yellow Fragment diperlukan per bintang:\n  • 1★: 12 YF\n  • 2★: 35 YF (47 total)\n  • 3★: 110 YF (157 total)\n  • 4★: 300 YF (457 total)\n  • 5★: 500 YF (957 total)\n\n🔓 UNLOCK SKILL\n✦ 1★ → Skill ke-1\n✦ 2★ → Skill ke-2\n✦ 3★ → Skill ke-3 (Sering paling berharga!)\n✦ 4★ → Skill ke-4 (Cap pasukan +5%, ATK/DEF)\n✦ 5★ → Star level maksimum\n\n📚 SISTEM SKILL LEVEL\n✦ Skill 1-3: Level 1 → 30\n✦ Skill 4: Selalu Level 1 (tidak ada upgrade)\n✦ Setiap skill level independen\n\n🎨 JENIS SKILL BOOK\n✦ 🟠 Hero Orange → Buku Skill Orange\n✦ 🟣 Hero Purple → Buku Skill Purple\n✦ 🔵 Hero Biru → Buku Skill Biru\n\n📊 MILESTONE KUNCI (Per Skill 1-3)\n✦ Level 1 → 5:     60 book\n✦ Level 1 → 10:    260 book\n✦ Level 1 → 20:    3,520 book\n✦ Level 1 → 30:    13,860 book\n\n💎 TOTAL BIAYA (Semua Skill 1-3)\n✦ Level 10:    780 book\n✦ Level 20:    10,560 book\n✦ Level 30:    41,580 book\n\n🎯 PRIORITAS SKILL (KRITIS!)\nLangkah 1: Periksa kualitas skill ke-3\nLangkah 2a: Jika skill ke-3 bagus → ke-3 → ke-1 → ke-2\nLangkah 2b: Jika skill ke-3 lemah → ke-1 → ke-2 → ke-3\nLangkah 3: Skill ke-4 selalu Level 1 (tidak perlu book)\n\n⚡ PRIORITAS STAR LEVEL\nHero Combat:\n✦ Minimum: 4★ (unlock skill cap pasukan)\n✦ Target: 5★ untuk top 5 hero\n\nHero Utilitas:\n✦ Biru: 3★ minimum (unlock skill ke-3)\n✦ Purple: 3-4★ (skill ke-3 + cap opsional)\n\nAturan Formasi:\n✦ SELALU capai 4★ minimum sebelum gunakan dalam formasi\n✦ Kapasitas pasukan = perbedaan CP besar\n\n═══════════════════════════════════════\n```\n\n---\n\n**Ingat**:\n- **Star level unlock skill** - Capai 4 bintang minimum untuk hero formasi!\n- **Selalu periksa skill ke-3 dulu** - Sering berisi buff terbaik!\n- **Skill ke-4 memberikan kapasitas pasukan penting** - ~5% membuat perbedaan CP besar!\n- **Skill 4 selalu Level 1** - Tidak perlu skill book!\n- **Manajemen resource adalah kunci** - Fokus pada kualitas daripada kuantitas!\n\nSemoga beruntung, Survivor! ⭐📚\n"])</script><script>self.__next_f.push([1,"a:T3962,"])</script><script>self.__next_f.push([1,"\n# ヒーロースキルと星レベルガイド ⭐\n\nDarkWar Survivalのヒーロー進行には、2つの相互接続されたシステムが含まれます:**星レベル**と**スキル**。この包括的なガイドでは、0星から5星までヒーローをアップグレードし、スキルを解放し、その潜在能力を最大化するために知っておく必要があるすべてをカバーします。\n\n---\n\n## 星レベルシステム\n\n### 星レベルの基本\n\n**コアメカニクス:**\n- ヒーローは**0星**から始まり、最大**5星**まで到達できます\n- 各星レベルは**5つのフラクション**に分割されます\n- 各フラクションを埋めるには**黄色の欠片(Yellow Shards)**が必要です\n- 5つのフラクションすべてが埋まると、ヒーローは次の星レベルに進みます\n\n**星レベルが重要な理由:**\n- **スキルは星レベルを獲得するにつれて段階的に解放されます**\n- **4番目のスキルは重要な部隊収容力ボーナスを提供します** (~5%増加)\n- ヒーローは編成で効果的であるために**最低4星**が必要です\n- 星レベルは戦闘力(CP)に直接影響します\n\n---\n\n### 黄色の欠片の要件\n\n次の表は、すべての星レベルでの各フラクションの正確な黄色の欠片コストを示しています:\n\n| 星レベル | フラクション1 | フラクション2 | フラクション3 | フラクション4 | フラクション5 | **必要な黄色の欠片合計** |\n|:----------:|:----------:|:----------:|:----------:|:----------:|:----------:|:--------------------:|\n| **0 → 1** | 1 | 1 | 2 | 3 | 5 | **12** |\n| **1 → 2** | 5 | 5 | 5 | 5 | 15 | **35** |\n| **2 → 3** | 15 | 15 | 15 | 15 | 50 | **110** |\n| **3 → 4** | 50 | 50 | 50 | 50 | 100 | **300** |\n| **4 → 5** | 100 | 100 | 100 | 100 | 100 | **500** |\n\n### 累積黄色の欠片コスト\n\n| 目標星レベル | 必要な黄色の欠片合計 |\n|:-----------------:|:----------------------------:|\n| **1星** | **12** |\n| **2星** | **47** (12 + 35) |\n| **3星** | **157** (47 + 110) |\n| **4星** | **457** (157 + 300) |\n| **5星** | **957** (457 + 500) |\n\n**ヒーローを完全に5星まで最大化するには、957個の黄色の欠片が必要です。**\n\n---\n\n### 星レベル別のスキル解放\n\n星を獲得するにつれて、スキルが段階的に解放されます:\n\n| 到達した星レベル | 解放されたスキル | 備考 |\n|:------------------:|:--------------:|:------|\n| **1星** | **1番目のスキル** | 基本スキル解放 |\n| **2星** | **2番目のスキル** | セカンダリスキル解放 |\n| **3星** | **3番目のスキル** | **重要なスキル** - 強力な開発や部隊バフが含まれることが多い |\n| **4星** | **4番目のスキル** | **ユニット収容力スキル** - 部隊上限増加(~5%) + ヒーロー攻撃力/防御力ボーナスを提供 |\n| **5星** | — | 最大星レベル到達 |\n\n**重要な注意事項:**\n- スキル1、2、3は**1から30**までレベルアップできます\n- **スキル4の最大レベルは1です**(それ以上アップグレードできません)\n- スキルブックでアップグレードする前に、その星レベルに到達してスキルを解放する必要があります\n\n---\n\n## スキルシステムの概要\n\n### スキルメカニクス\n\n**スキルの基本:**\n- すべてのヒーローには正確に**4つのスキル**があります\n- スキルは**レベル1**から始まり、**レベル30**までアップグレードできます(スキル4を除く)\n- **スキル4はレベル1でロック**されており、アップグレードできません\n- 各スキルレベルにはアップグレードのために**スキルブック**が必要です\n- スキルブックのタイプはヒーローのレアリティによって異なります\n\n**ヒーローレアリティとスキルブック:**\n\n| ヒーローレアリティ | スキルブックタイプ |\n|-------------|----------------|\n| 🟠 **オレンジ (S-Tier)** | オレンジスキルブック |\n| 🟣 **紫 (A-Tier)** | 紫スキルブック |\n| 🔵 **青 (B-Tier)** | 青スキルブック |\n\n**重要な注意事項:**\n- ヒーローのレアリティに**一致するスキルブック**を使用する必要があります\n- スキル1-3は独立してレベルアップします\n- すべてのスキル1-3は同じレベリングコスト構造に従います\n\n---\n\n## レベルごとのスキルブック要件\n\n次の表は、各スキルを1つのレベルから次のレベルにアップグレードするために必要な**正確なスキルブック数**を示しています:\n\n| 開始レベル | 目標レベル | 必要なスキルブック |\n|:----------:|:--------:|:--------------------:|\n| 1 | 2 | 10 |\n| 2 | 3 | 10 |\n| 3 | 4 | 20 |\n| 4 | 5 | 20 |\n| 5 | 6 | 30 |\n| 6 | 7 | 30 |\n| 7 | 8 | 40 |\n| 8 | 9 | 40 |\n| 9 | 10 | 60 |\n| 10 | 11 | 80 |\n| 11 | 12 | 120 |\n| 12 | 13 | 160 |\n| 13 | 14 | 200 |\n| 14 | 15 | 240 |\n| 15 | 16 | 280 |\n| 16 | 17 | 320 |\n| 17 | 18 | 360 |\n| 18 | 19 | 400 |\n| 19 | 20 | 460 |\n| 20 | 21 | 520 |\n| 21 | 22 | 580 |\n| 22 | 23 | 640 |\n| 23 | 24 | 700 |\n| 24 | 25 | 760 |\n| 25 | 26 | 820 |\n| 26 | 27 | 900 |\n| 27 | 28 | 1,000 |\n| 28 | 29 | 1,100 |\n| 29 | 30 | 1,200 |\n\n---\n\n## 累積スキルブックコスト\n\n特定のスキルレベルマイルストーンに到達するために必要な総投資を理解する:\n\n### マイルストーンコスト(スキルごと)\n\n| 目標レベル | 必要な総ブック数 | 累積合計 |\n|:------------:|:-------------------:|:---------------:|\n| **レベル5** | レベル2-5 | **60** |\n| **レベル10** | レベル2-10 | **260** |\n| **レベル15** | レベル2-15 | **1,220** |\n| **レベル20** | レベル2-20 | **3,520** |\n| **レベル25** | レベル2-25 | **7,360** |\n| **レベル30** | レベル2-30 | **13,860** |\n\n### スキル1-3の総コスト\n\n各ヒーローには独立してレベルアップする必要がある**3つのアップグレード可能なスキル**(スキル1-3)があるため:\n\n| 目標レベル | スキルごとのブック数 | スキル1-3用のブック数 |\n|:------------:|:--------------:|:-------------------:|\n| **レベル5** | 60 | **180** |\n| **レベル10** | 260 | **780** |\n| **レベル15** | 1,220 | **3,660** |\n| **レベル20** | 3,520 | **10,560** |\n| **レベル25** | 7,360 | **22,080** |\n| **レベル30** | 13,860 | **41,580** |\n\n**つまり、1人のヒーローのアップグレード可能なスキル(スキル1-3をレベル30に)を完全に最大化するには:**\n- 🟠 S-Tierヒーローの場合、**41,580個のオレンジスキルブック**\n- 🟣 A-Tierヒーローの場合、**41,580個の紫スキルブック**\n- 🔵 B-Tierヒーローの場合、**41,580個の青スキルブック**\n\n*覚えておいてください:スキル4は常にレベル1であり、アップグレードできません。*\n\n---\n\n## アップグレード戦略\n\n### 星レベル優先順位\n\n**最低星レベル要件:**\n\n1. **編成ヒーローは最低4星に到達**\n   - 重要な4番目のスキルを解放(部隊収容力ブースト)\n   - ~5%の部隊収容力増加は戦闘力(CP)に大きく影響します\n   - より高い部隊収容力を持つ編成は、実質的に高いCPを持ちます\n   - 4番目のスキルはヒーロー攻撃力/防御力ボーナスも提供します\n\n2. **トップ5メインヒーローを5星にプッシュ**\n   - ヒーローの潜在能力を最大化します\n   - エンドゲーム競技プレイに必要です\n\n3. **ユーティリティヒーローは3-4星で停止できます**\n   - 3番目のスキル解放はユーティリティ目的に十分な場合が多い\n   - 黄色の欠片は戦闘ヒーローに費やした方が良い\n\n### スキル優先システム\n\n**重要:常に3番目のスキルを最初にチェック!**\n\n**3番目のスキル**には、ヒーローにとって最も価値のあるバフが含まれることがよくあります。スキルブックを投資する前に、3番目のスキルが提供するものを確認してください:\n\n**3番目のスキルに強力なバフがある場合:**\n- 開発ブースト(研究、建設、訓練など)\n- ユニバーサル部隊バフ(ダメージ、防御、HPなど)\n- リソースボーナス\n\n**優先順位:**\n1. **3番目のスキルをレベル30に** ← ここに最初に集中\n2. 1番目のスキルをレベル30に\n3. 2番目のスキルをレベル30に\n4. 4番目のスキル(常にレベル1、アップグレード不要)\n\n**3番目のスキルに弱い/状況的なバフがある場合:**\n\n**優先順位:**\n1. **1番目のスキルをレベル30に** ← ここから始める\n2. **2番目のスキルをレベル30に** ← 次にこれ\n3. 3番目のスキルをレベル30に ← 低優先順位\n4. 4番目のスキル(常にレベル1、アップグレード不要)\n\n---\n\n### ヒーロータイプ戦略\n\n**トップ5戦闘ヒーロー:**\n- **星レベル:** **4-5星**にプッシュ(編成には最低4星)\n- **スキル優先順位:** 3番目のスキルを最初にチェックし、その後優先順位に従う\n- **スキル目標:** 競争力のある強さのために優先スキルで**レベル20+**を目指す\n- **エンドゲーム:** 優先スキルを**レベル30**にプッシュ\n\n**ユーティリティヒーロー(青と紫):**\n\n*青リソースヒーロー(Willow、Ruby、Selena、Bob、Musashimaru、Joe):*\n- **星レベル:** 3番目のスキルを解放するために**最低3星**に到達\n- **スキル優先順位:** **3番目のスキル**(リソースバフ)にレベル30まで専念\n- スキル1、2、4は低優先順位\n\n*紫ユーティリティヒーロー(Andre、Victor、Liz、Barnett):*\n- **星レベル:** **3-4星**に到達(部隊収容力のために4星推奨)\n- **スキル優先順位:** **3番目のスキル**(ユーティリティバフ)に最初にレベル30まで集中\n- 1番目と2番目のスキルはリソースが許せばレベルアップできます\n- 4番目のスキル(部隊収容力)は4星で解放されます\n\n**名誉の殿堂ヒーロー(紫戦闘):**\n- **星レベル:** 名誉の殿堂に入るには**5星**に到達する必要があります\n- **スキル優先順位:** 3番目のスキルには通常陣営バフがあるため、それに応じて優先順位を付けます\n- これらのヒーローは名誉の殿堂に入ると、陣営全体の戦闘ボーナスを提供します\n\n---\n\n### リソース管理\n\n**黄色の欠片のソース:**\n- ブラックマーケット\n- イベントと報酬\n- 特別イベント交換\n- トラックの護衛と略奪\n- アライアンス決闘報酬\n- サバイバル準備報酬\n- VIP特典\n\n**スキルブックのソース:**\n- ブラックマーケット\n- シャドウコールミッションの略奪\n- アライアンス決闘報酬\n- サバイバル準備報酬\n- イベントと報酬\n- 特別イベント交換\n- VIP特典\n\n**保存戦略:**\n- **黄色の欠片:** 戦闘ヒーローを最低4星にすることを優先する\n- **スキルブック:** 投資する前に常に3番目のスキル価値をチェック\n- 多くのヒーローにリソースを薄く広げすぎない\n- 次に移る前に1人のヒーローの進行を完了する\n- 最高のヒーローのために高ティアリソース(オレンジ)を節約する\n- 青/紫リソースはユーティリティヒーローにより自由に使用できます\n\n---\n\n## クイックリファレンス要約 📋\n\n```\n═══════════════════════════════════════\n    ヒーロースキルと星レベルガイド\n═══════════════════════════════════════\n\n⭐ 星レベルの基本\n✦ 0 → 5星最大\n✦ 星レベルごとに5フラクション\n✦ 星ごとに必要な黄色の欠片:\n  • 1★: 12黄色の欠片\n  • 2★: 35黄色の欠片(合計47)\n  • 3★: 110黄色の欠片(合計157)\n  • 4★: 300黄色の欠片(合計457)\n  • 5★: 500黄色の欠片(合計957)\n\n🔓 スキル解放\n✦ 1★ → 1番目のスキル\n✦ 2★ → 2番目のスキル\n✦ 3★ → 3番目のスキル(最も価値があることが多い!)\n✦ 4★ → 4番目のスキル(部隊上限+5%、攻撃力/防御力)\n✦ 5★ → 最大星レベル\n\n📚 スキルレベルシステム\n✦ スキル1-3: レベル1 → 30\n✦ スキル4: 常にレベル1(アップグレードなし)\n✦ 各スキルは独立してレベルアップ\n\n🎨 スキルブックタイプ\n✦ 🟠 オレンジヒーロー → オレンジスキルブック\n✦ 🟣 紫ヒーロー → 紫スキルブック\n✦ 🔵 青ヒーロー → 青スキルブック\n\n📊 主要マイルストーン(スキル1-3ごと)\n✦ レベル1 → 5:     60ブック\n✦ レベル1 → 10:    260ブック\n✦ レベル1 → 20:    3,520ブック\n✦ レベル1 → 30:    13,860ブック\n\n💎 総コスト(すべてのスキル1-3)\n✦ レベル10:    780ブック\n✦ レベル20:    10,560ブック\n✦ レベル30:    41,580ブック\n\n🎯 スキル優先順位(重要!)\nステップ1: 3番目のスキル品質をチェック\nステップ2a: 3番目のスキルが良い場合 → 3番目 → 1番目 → 2番目\nステップ2b: 3番目のスキルが弱い場合 → 1番目 → 2番目 → 3番目\nステップ3: スキル4は常にレベル1(ブック不要)\n\n⚡ 星レベル優先順位\n戦闘ヒーロー:\n✦ 最低: 4★(部隊上限スキル解放)\n✦ 目標: トップ5ヒーローを5★に\n\nユーティリティヒーロー:\n✦ 青: 最低3★(3番目のスキル解放)\n✦ 紫: 3-4★(3番目のスキル+オプション上限)\n\n編成ルール:\n✦ 編成で使用する前に常に最低4★に到達\n✦ 部隊収容力 = 大規模なCP差\n\n═══════════════════════════════════════\n```\n\n---\n\n**覚えておいてください**:\n- **星レベルがスキルを解放します** - 編成ヒーローは最低4星に到達!\n- **常に3番目のスキルを最初にチェック** - 最高のバフが含まれることが多い!\n- **4番目のスキルは重要な部隊収容力を提供** - ~5%は大規模なCP差を作ります!\n- **スキル4は常にレベル1** - スキルブック不要!\n- **リソース管理が鍵** - 量より質に集中!\n\n幸運を祈ります、サバイバー! ⭐📚\n"])</script><script>self.__next_f.push([1,"b:T3446,"])</script><script>self.__next_f.push([1,"\n# 영웅 스킬 및 성급 가이드 ⭐\n\nDarkWar Survival의 영웅 진행은 두 가지 상호 연결된 시스템을 포함합니다: **성급**과 **스킬**. 이 종합 가이드는 영웅을 0성에서 5성으로 업그레이드하고, 스킬을 잠금 해제하며, 잠재력을 극대화하는 데 필요한 모든 것을 다룹니다.\n\n---\n\n## 성급 시스템\n\n### 성급 기본 사항\n\n**핵심 메커니즘:**\n- 영웅은 **0성**에서 시작하여 최대 **5성**까지 도달할 수 있습니다\n- 각 성급은 **5개의 분할**로 나뉩니다\n- 각 분할은 채우기 위해 **노란 파편(Yellow Shards)**이 필요합니다\n- 5개의 분할이 모두 채워지면 영웅은 다음 성급으로 진급합니다\n\n**성급이 중요한 이유:**\n- **스킬은 성급을 얻으면서 점진적으로 잠금 해제됩니다**\n- **4번째 스킬은 중요한 병력 수용량 보너스를 제공합니다** (~5% 증가)\n- 영웅은 편성에서 효과적이려면 **최소 4성**이 필요합니다\n- 성급은 전투력(CP)에 직접적인 영향을 미칩니다\n\n---\n\n### 노란 파편 요구 사항\n\n다음 표는 모든 성급에서 각 분할에 대한 정확한 노란 파편 비용을 보여줍니다:\n\n| 성급 | 분할 1 | 분할 2 | 분할 3 | 분할 4 | 분할 5 | **총 노란 파편 필요** |\n|:----------:|:----------:|:----------:|:----------:|:----------:|:----------:|:--------------------:|\n| **0 → 1** | 1 | 1 | 2 | 3 | 5 | **12** |\n| **1 → 2** | 5 | 5 | 5 | 5 | 15 | **35** |\n| **2 → 3** | 15 | 15 | 15 | 15 | 50 | **110** |\n| **3 → 4** | 50 | 50 | 50 | 50 | 100 | **300** |\n| **4 → 5** | 100 | 100 | 100 | 100 | 100 | **500** |\n\n### 누적 노란 파편 비용\n\n| 목표 성급 | 필요한 총 노란 파편 |\n|:-----------------:|:----------------------------:|\n| **1성** | **12** |\n| **2성** | **47** (12 + 35) |\n| **3성** | **157** (47 + 110) |\n| **4성** | **457** (157 + 300) |\n| **5성** | **957** (457 + 500) |\n\n**영웅을 5성으로 완전히 최대화하려면 957개의 노란 파편이 필요합니다.**\n\n---\n\n### 성급별 스킬 잠금 해제\n\n영웅이 별을 얻으면서 스킬이 점진적으로 잠금 해제됩니다:\n\n| 도달한 성급 | 잠금 해제된 스킬 | 참고 |\n|:------------------:|:--------------:|:------|\n| **1성** | **1번째 스킬** | 기본 스킬 잠금 해제 |\n| **2성** | **2번째 스킬** | 보조 스킬 잠금 해제 |\n| **3성** | **3번째 스킬** | **중요한 스킬** - 강력한 개발 또는 병력 버프를 포함하는 경우가 많음 |\n| **4성** | **4번째 스킬** | **유닛 수용량 스킬** - 병력 한도 증가(~5%) + 영웅 공격력/방어력 보너스 제공 |\n| **5성** | — | 최대 성급 도달 |\n\n**중요 참고 사항:**\n- 스킬 1, 2, 3은 **1에서 30**까지 레벨을 올릴 수 있습니다\n- **스킬 4의 최대 레벨은 1입니다** (더 이상 업그레이드할 수 없음)\n- 스킬북으로 업그레이드하기 전에 해당 성급에 도달하여 스킬을 잠금 해제해야 합니다\n\n---\n\n## 스킬 시스템 개요\n\n### 스킬 메커니즘\n\n**스킬 기본 사항:**\n- 모든 영웅은 정확히 **4개의 스킬**을 가지고 있습니다\n- 스킬은 **레벨 1**에서 시작하여 **레벨 30**까지 업그레이드할 수 있습니다 (스킬 4 제외)\n- **스킬 4는 레벨 1에 잠겨** 있으며 업그레이드할 수 없습니다\n- 각 스킬 레벨은 업그레이드하기 위해 **스킬북**이 필요합니다\n- 스킬북 유형은 영웅 등급에 따라 다릅니다\n\n**영웅 등급 및 스킬북:**\n\n| 영웅 등급              | 스킬북 유형 |\n|--------------------|----------------|\n| 🟠 **주황 (S-Tier)** | 주황 스킬북 |\n| 🟣 **보라 (A-Tier)** | 보라 스킬북 |\n| 🔵 **파랑 (B-Tier)** | 파랑 스킬북 |\n\n**중요 참고 사항:**\n- 영웅의 등급에 **맞는 스킬북**을 사용해야 합니다\n- 스킬 1-3은 독립적으로 레벨이 올라갑니다\n- 모든 스킬 1-3은 동일한 레벨링 비용 구조를 따릅니다\n\n---\n\n## 레벨당 스킬북 요구 사항\n\n다음 표는 각 스킬을 한 레벨에서 다음 레벨로 업그레이드하는 데 필요한 **정확한 스킬북 수**를 보여줍니다:\n\n| 시작 레벨 | 목표 레벨 | 필요한 스킬북 |\n|:----------:|:--------:|:--------------------:|\n| 1 | 2 | 10 |\n| 2 | 3 | 10 |\n| 3 | 4 | 20 |\n| 4 | 5 | 20 |\n| 5 | 6 | 30 |\n| 6 | 7 | 30 |\n| 7 | 8 | 40 |\n| 8 | 9 | 40 |\n| 9 | 10 | 60 |\n| 10 | 11 | 80 |\n| 11 | 12 | 120 |\n| 12 | 13 | 160 |\n| 13 | 14 | 200 |\n| 14 | 15 | 240 |\n| 15 | 16 | 280 |\n| 16 | 17 | 320 |\n| 17 | 18 | 360 |\n| 18 | 19 | 400 |\n| 19 | 20 | 460 |\n| 20 | 21 | 520 |\n| 21 | 22 | 580 |\n| 22 | 23 | 640 |\n| 23 | 24 | 700 |\n| 24 | 25 | 760 |\n| 25 | 26 | 820 |\n| 26 | 27 | 900 |\n| 27 | 28 | 1,000 |\n| 28 | 29 | 1,100 |\n| 29 | 30 | 1,200 |\n\n---\n\n## 누적 스킬북 비용\n\n특정 스킬 레벨 이정표에 도달하는 데 필요한 총 투자를 이해하기:\n\n### 이정표 비용 (스킬당)\n\n| 목표 레벨 | 필요한 총 책 | 누적 총계 |\n|:------------:|:-------------------:|:---------------:|\n| **레벨 5** | 레벨 2-5 | **60** |\n| **레벨 10** | 레벨 2-10 | **260** |\n| **레벨 15** | 레벨 2-15 | **1,220** |\n| **레벨 20** | 레벨 2-20 | **3,520** |\n| **레벨 25** | 레벨 2-25 | **7,360** |\n| **레벨 30** | 레벨 2-30 | **13,860** |\n\n### 스킬 1-3의 총 비용\n\n각 영웅은 독립적으로 레벨을 올려야 하는 **3개의 업그레이드 가능한 스킬** (스킬 1-3)을 가지고 있으므로:\n\n| 목표 레벨 | 스킬당 책 | 스킬 1-3용 책 |\n|:------------:|:--------------:|:-------------------:|\n| **레벨 5** | 60 | **180** |\n| **레벨 10** | 260 | **780** |\n| **레벨 15** | 1,220 | **3,660** |\n| **레벨 20** | 3,520 | **10,560** |\n| **레벨 25** | 7,360 | **22,080** |\n| **레벨 30** | 13,860 | **41,580** |\n\n**즉, 한 영웅의 업그레이드 가능한 스킬(스킬 1-3을 레벨 30으로)을 완전히 최대화하려면:**\n- 🟠 S-Tier 영웅의 경우 **41,580개의 주황 스킬북**\n- 🟣 A-Tier 영웅의 경우 **41,580개의 보라 스킬북**\n- 🔵 B-Tier 영웅의 경우 **41,580개의 파랑 스킬북**\n\n*기억하세요: 스킬 4는 항상 레벨 1이며 업그레이드할 수 없습니다.*\n\n---\n\n## 업그레이드 전략\n\n### 성급 우선순위\n\n**최소 성급 요구 사항:**\n\n1. **편성 영웅은 최소 4성 도달**\n   - 중요한 4번째 스킬 잠금 해제 (병력 수용량 부스트)\n   - ~5% 병력 수용량 증가는 전투력(CP)에 크게 영향을 미칩니다\n   - 더 높은 병력 수용량을 가진 편성은 훨씬 높은 CP를 가집니다\n   - 4번째 스킬은 또한 영웅 공격력/방어력 보너스를 제공합니다\n\n2. **주요 5명의 영웅을 5성으로 푸시**\n   - 영웅 잠재력을 극대화합니다\n   - 엔드게임 경쟁 플레이에 필요합니다\n\n3. **유틸리티 영웅은 3-4성에서 멈출 수 있습니다**\n   - 3번째 스킬 잠금 해제는 유틸리티 목적으로 충분한 경우가 많습니다\n   - 노란 파편은 전투 영웅에 더 잘 사용됩니다\n\n### 스킬 우선순위 시스템\n\n**중요: 항상 3번째 스킬을 먼저 확인하세요!**\n\n**3번째 스킬**은 영웅에게 가장 가치 있는 버프를 포함하는 경우가 많습니다. 스킬북을 투자하기 전에 3번째 스킬이 제공하는 것을 확인하세요:\n\n**3번째 스킬에 강력한 버프가 있는 경우:**\n- 개발 부스트 (연구, 건설, 훈련 등)\n- 범용 병력 버프 (피해, 방어, HP 등)\n- 자원 보너스\n\n**우선순위 순서:**\n1. **3번째 스킬을 레벨 30으로** ← 여기에 먼저 집중\n2. 1번째 스킬을 레벨 30으로\n3. 2번째 스킬을 레벨 30으로\n4. 4번째 스킬 (항상 레벨 1, 업그레이드 필요 없음)\n\n**3번째 스킬에 약한/상황별 버프가 있는 경우:**\n\n**우선순위 순서:**\n1. **1번째 스킬을 레벨 30으로** ← 여기서 시작\n2. **2번째 스킬을 레벨 30으로** ← 그 다음\n3. 3번째 스킬을 레벨 30으로 ← 낮은 우선순위\n4. 4번째 스킬 (항상 레벨 1, 업그레이드 필요 없음)\n\n---\n\n### 영웅 유형 전략\n\n**상위 5명의 전투 영웅:**\n- **성급:** **4-5성**으로 푸시 (편성에 최소 4성)\n- **스킬 우선순위:** 3번째 스킬을 먼저 확인한 다음 우선순위 순서를 따르세요\n- **스킬 목표:** 경쟁력 있는 강도를 위해 우선순위 스킬에서 **레벨 20+**를 목표로 하세요\n- **엔드게임:** 우선순위 스킬을 **레벨 30**으로 푸시\n\n**유틸리티 영웅 (파랑 및 보라):**\n\n*파랑 자원 영웅 (Willow, Ruby, Selena, Bob, Musashimaru, Joe):*\n- **성급:** 3번째 스킬을 잠금 해제하기 위해 **최소 3성** 도달\n- **스킬 우선순위:** **3번째 스킬** (자원 버프)을 레벨 30으로 집중적으로\n- 스킬 1, 2, 4는 낮은 우선순위입니다\n\n*보라 유틸리티 영웅 (Andre, Victor, Liz, Barnett):*\n- **성급:** **3-4성** 도달 (병력 수용량을 위해 4성 권장)\n- **스킬 우선순위:** **3번째 스킬** (유틸리티 버프)을 먼저 레벨 30으로 집중\n- 1번째 및 2번째 스킬은 자원이 허용하는 경우 레벨을 올릴 수 있습니다\n- 4번째 스킬 (병력 수용량)은 4성에서 잠금 해제됩니다\n\n**명예의 전당 영웅 (보라 전투):**\n- **성급:** 명예의 전당에 입장하려면 **5성**에 도달해야 합니다\n- **스킬 우선순위:** 3번째 스킬에는 일반적으로 진영 버프가 있으므로 그에 따라 우선순위를 정하세요\n- 이 영웅들은 명예의 전당에 들어가면 진영 전체 전투 보너스를 제공합니다\n\n---\n\n### 자원 관리\n\n**노란 파편 소스:**\n- 블랙 마켓\n- 이벤트 및 보상\n- 특별 이벤트 교환\n- 트럭 호위 및 약탈\n- 연맹 대결 보상\n- 생존 준비 보상\n- VIP 혜택\n\n**스킬북 소스:**\n- 블랙 마켓\n- 섀도우 콜 임무 약탈\n- 연맹 대결 보상\n- 생존 준비 보상\n- 이벤트 및 보상\n- 특별 이벤트 교환\n- VIP 혜택\n\n**보존 전략:**\n- **노란 파편:** 전투 영웅을 최소 4성으로 만드는 데 우선순위를 두세요\n- **스킬북:** 투자하기 전에 항상 3번째 스킬 가치를 확인하세요\n- 많은 영웅들에게 자원을 너무 얇게 퍼뜨리지 마세요\n- 다음으로 이동하기 전에 한 영웅의 진행을 완료하세요\n- 최고의 영웅을 위해 높은 등급 자원 (주황)을 저장하세요\n- 파랑/보라 자원은 유틸리티 영웅에 더 자유롭게 사용할 수 있습니다\n\n---\n\n## 빠른 참조 요약 📋\n\n```\n═══════════════════════════════════════\n    영웅 스킬 및 성급 가이드\n═══════════════════════════════════════\n\n⭐ 성급 기본 사항\n✦ 0 → 5성 최대\n✦ 성급당 5개 분할\n✦ 성급당 필요한 노란 파편:\n  • 1★: 12 노란 파편\n  • 2★: 35 노란 파편 (총 47)\n  • 3★: 110 노란 파편 (총 157)\n  • 4★: 300 노란 파편 (총 457)\n  • 5★: 500 노란 파편 (총 957)\n\n🔓 스킬 잠금 해제\n✦ 1★ → 1번째 스킬\n✦ 2★ → 2번째 스킬\n✦ 3★ → 3번째 스킬 (종종 가장 가치 있음!)\n✦ 4★ → 4번째 스킬 (병력 한도 +5%, 공격력/방어력)\n✦ 5★ → 최대 성급\n\n📚 스킬 레벨 시스템\n✦ 스킬 1-3: 레벨 1 → 30\n✦ 스킬 4: 항상 레벨 1 (업그레이드 없음)\n✦ 각 스킬은 독립적으로 레벨업\n\n🎨 스킬북 유형\n✦ 🟠 주황 영웅 → 주황 스킬북\n✦ 🟣 보라 영웅 → 보라 스킬북\n✦ 🔵 파랑 영웅 → 파랑 스킬북\n\n📊 주요 이정표 (스킬 1-3당)\n✦ 레벨 1 → 5:     60 책\n✦ 레벨 1 → 10:    260 책\n✦ 레벨 1 → 20:    3,520 책\n✦ 레벨 1 → 30:    13,860 책\n\n💎 총 비용 (모든 스킬 1-3)\n✦ 레벨 10:    780 책\n✦ 레벨 20:    10,560 책\n✦ 레벨 30:    41,580 책\n\n🎯 스킬 우선순위 (중요!)\n단계 1: 3번째 스킬 품질 확인\n단계 2a: 3번째 스킬이 좋으면 → 3번째 → 1번째 → 2번째\n단계 2b: 3번째 스킬이 약하면 → 1번째 → 2번째 → 3번째\n단계 3: 스킬 4는 항상 레벨 1 (책 필요 없음)\n\n⚡ 성급 우선순위\n전투 영웅:\n✦ 최소: 4★ (병력 한도 스킬 잠금 해제)\n✦ 목표: 상위 5명의 영웅을 5★로\n\n유틸리티 영웅:\n✦ 파랑: 최소 3★ (3번째 스킬 잠금 해제)\n✦ 보라: 3-4★ (3번째 스킬 + 선택적 한도)\n\n편성 규칙:\n✦ 편성에서 사용하기 전에 항상 최소 4★ 도달\n✦ 병력 수용량 = 엄청난 CP 차이\n\n═══════════════════════════════════════\n```\n\n---\n\n**기억하세요**:\n- **성급은 스킬을 잠금 해제합니다** - 편성 영웅은 최소 4성에 도달하세요!\n- **항상 3번째 스킬을 먼저 확인하세요** - 종종 최고의 버프를 포함합니다!\n- **4번째 스킬은 중요한 병력 수용량을 제공합니다** - ~5%는 엄청난 CP 차이를 만듭니다!\n- **스킬 4는 항상 레벨 1입니다** - 스킬북 필요 없음!\n- **자원 관리가 핵심입니다** - 양보다 질에 집중하세요!\n\n행운을 빕니다, 생존자! ⭐📚\n"])</script><script>self.__next_f.push([1,"c:T2d02,"])</script><script>self.__next_f.push([1,"\n# Hero Skills and Star Levels Guide ⭐\n\nHero progression in DarkWar Survival involves two interconnected systems: **Star Levels** and **Skills**. This comprehensive guide covers everything you need to know about upgrading your heroes from 0 stars to 5 stars, unlocking their skills, and maximizing their potential.\n\n---\n\n## Star Level System\n\n### Star Level Basics\n\n**Core Mechanics:**\n- Heroes start at **0 stars** and can reach a maximum of **5 stars**\n- Each star level is divided into **5 fractions**\n- Each fraction requires **Yellow Fragments (Yellow Shards)** to fill\n- Once all 5 fractions are filled, the hero advances to the next star level\n\n**Why Star Levels Matter:**\n- **Skills unlock progressively** as you gain star levels\n- **4th skill provides crucial troop capacity bonuses** (~5% increase)\n- Heroes need **minimum 4 stars** to be effective in formations\n- Star level directly impacts combat power (CP)\n\n---\n\n### Yellow Fragment Requirements\n\nThe following table shows the exact yellow fragment cost for each fraction at every star level:\n\n| Star Level | Fraction 1 | Fraction 2 | Fraction 3 | Fraction 4 | Fraction 5 | **Total YF Required** |\n|:----------:|:----------:|:----------:|:----------:|:----------:|:----------:|:--------------------:|\n| **0 → 1** | 1 | 1 | 2 | 3 | 5 | **12** |\n| **1 → 2** | 5 | 5 | 5 | 5 | 15 | **35** |\n| **2 → 3** | 15 | 15 | 15 | 15 | 50 | **110** |\n| **3 → 4** | 50 | 50 | 50 | 50 | 100 | **300** |\n| **4 → 5** | 100 | 100 | 100 | 100 | 100 | **500** |\n\n### Cumulative Yellow Fragment Costs\n\n| Target Star Level | Total Yellow Fragments Needed |\n|:-----------------:|:----------------------------:|\n| **1 Star** | **12** |\n| **2 Stars** | **47** (12 + 35) |\n| **3 Stars** | **157** (47 + 110) |\n| **4 Stars** | **457** (157 + 300) |\n| **5 Stars** | **957** (457 + 500) |\n\n**To fully max a hero to 5 stars requires 957 Yellow Fragments.**\n\n---\n\n### Skill Unlocking by Star Level\n\nSkills unlock progressively as your hero gains stars:\n\n| Star Level Reached | Skill Unlocked | Notes |\n|:------------------:|:--------------:|:------|\n| **1 Star** | **1st Skill** | Basic skill unlocked |\n| **2 Stars** | **2nd Skill** | Secondary skill unlocked |\n| **3 Stars** | **3rd Skill** | **Critical skill** - Often contains powerful development or troop buffs |\n| **4 Stars** | **4th Skill** | **Unit capacity skill** - Provides troop cap increase (~5%) + hero ATK/DEF bonuses |\n| **5 Stars** | — | Maximum star level reached |\n\n**Important Notes:**\n- Skills 1, 2, and 3 can be leveled from **1 to 30**\n- **Skill 4 maximum level is 1** (cannot be upgraded further)\n- You must unlock a skill by reaching its star level before you can upgrade it with skill books\n\n---\n\n## Skill System Overview\n\n### Skill Mechanics\n\n**Skill Basics:**\n- Every hero has exactly **4 skills**\n- Skills start at **Level 1** and can be upgraded to **Level 30** (except Skill 4)\n- **Skill 4 is locked at Level 1** and cannot be upgraded\n- Each skill level requires **skill books** to upgrade\n- Skill book type depends on hero rarity\n\n**Hero Rarity \u0026 Skill Books:**\n\n| Hero Rarity | Skill Book Type |\n|-------------|----------------|\n| 🟠 **Orange (S-Tier)** | Orange Skill Books |\n| 🟣 **Purple (A-Tier)** | Purple Skill Books |\n| 🔵 **Blue (B-Tier)** | Blue Skill Books |\n\n**Important Notes:**\n- You must use the **matching skill book** for your hero's rarity\n- Skills 1-3 level up independently\n- All skills 1-3 follow the same leveling cost structure\n\n---\n\n## Skill Book Requirements Per Level\n\nThe following table shows the **exact number of skill books required** to upgrade each skill from one level to the next:\n\n| From Level | To Level | Skill Books Required |\n|:----------:|:--------:|:--------------------:|\n| 1 | 2 | 10 |\n| 2 | 3 | 10 |\n| 3 | 4 | 20 |\n| 4 | 5 | 20 |\n| 5 | 6 | 30 |\n| 6 | 7 | 30 |\n| 7 | 8 | 40 |\n| 8 | 9 | 40 |\n| 9 | 10 | 60 |\n| 10 | 11 | 80 |\n| 11 | 12 | 120 |\n| 12 | 13 | 160 |\n| 13 | 14 | 200 |\n| 14 | 15 | 240 |\n| 15 | 16 | 280 |\n| 16 | 17 | 320 |\n| 17 | 18 | 360 |\n| 18 | 19 | 400 |\n| 19 | 20 | 460 |\n| 20 | 21 | 520 |\n| 21 | 22 | 580 |\n| 22 | 23 | 640 |\n| 23 | 24 | 700 |\n| 24 | 25 | 760 |\n| 25 | 26 | 820 |\n| 26 | 27 | 900 |\n| 27 | 28 | 1,000 |\n| 28 | 29 | 1,100 |\n| 29 | 30 | 1,200 |\n\n---\n\n## Cumulative Skill Book Costs\n\nUnderstanding the total investment required to reach certain skill level milestones:\n\n### Milestone Costs (Per Skill)\n\n| Target Level | Total Books Required | Cumulative Total |\n|:------------:|:-------------------:|:---------------:|\n| **Level 5** | Levels 2-5 | **60** |\n| **Level 10** | Levels 2-10 | **260** |\n| **Level 15** | Levels 2-15 | **1,220** |\n| **Level 20** | Levels 2-20 | **3,520** |\n| **Level 25** | Levels 2-25 | **7,360** |\n| **Level 30** | Levels 2-30 | **13,860** |\n\n### Total Cost for Skills 1-3\n\nSince each hero has **3 upgradeable skills** (Skills 1-3) that need to be leveled independently:\n\n| Target Level | Books Per Skill | Books for Skills 1-3 |\n|:------------:|:--------------:|:-------------------:|\n| **Level 5** | 60 | **180** |\n| **Level 10** | 260 | **780** |\n| **Level 15** | 1,220 | **3,660** |\n| **Level 20** | 3,520 | **10,560** |\n| **Level 25** | 7,360 | **22,080** |\n| **Level 30** | 13,860 | **41,580** |\n\n**This means to fully max out one hero's upgradeable skills (Skills 1-3 to Level 30), you need:**\n- 🟠 **41,580 Orange Skill Books** for an S-Tier hero\n- 🟣 **41,580 Purple Skill Books** for an A-Tier hero\n- 🔵 **41,580 Blue Skill Books** for a B-Tier hero\n\n*Remember: Skill 4 is always Level 1 and cannot be upgraded.*\n\n---\n\n## Upgrade Strategy\n\n### Star Level Priority\n\n**Minimum Star Level Requirements:**\n\n1. **Reach 4 Stars Minimum** for formation heroes\n   - Unlocks the critical 4th skill (troop capacity boost)\n   - ~5% troop capacity increase significantly impacts combat power (CP)\n   - Formations with higher troop capacity have substantially higher CP\n   - 4th skill also provides hero ATK/DEF bonuses\n\n2. **Push to 5 Stars** for your top 5 main heroes\n   - Maximizes hero potential\n   - Required for endgame competitive play\n\n3. **Utility heroes can stop at 3-4 stars**\n   - 3rd skill unlocked is often sufficient for utility purposes\n   - Yellow fragments are better spent on combat heroes\n\n### Skill Priority System\n\n**CRITICAL: Always Check the 3rd Skill First!**\n\nThe **3rd skill** often contains the most valuable buffs for a hero. Before investing skill books, examine what the 3rd skill provides:\n\n**If 3rd Skill Has Strong Buffs:**\n- Development boosts (research, construction, training, etc.)\n- Universal troop buffs (damage, defense, HP, etc.)\n- Resource bonuses\n\n**Priority Order:**\n1. **3rd Skill to Level 30** ← Focus here first\n2. 1st Skill to Level 30\n3. 2nd Skill to Level 30\n4. 4th Skill (always Level 1, no upgrade needed)\n\n**If 3rd Skill Has Weak/Situational Buffs:**\n\n**Priority Order:**\n1. **1st Skill to Level 30** ← Start here\n2. **2nd Skill to Level 30** ← Then this\n3. 3rd Skill to Level 30 ← Lower priority\n4. 4th Skill (always Level 1, no upgrade needed)\n\n---\n\n### Hero Type Strategies\n\n**Top 5 Combat Heroes:**\n- **Star Level:** Push to **4-5 stars** (minimum 4 stars for formations)\n- **Skill Priority:** Check 3rd skill first, then follow priority order\n- **Skill Target:** Aim for **Level 20+** on priority skills for competitive strength\n- **Endgame:** Push priority skills to **Level 30**\n\n**Utility Heroes (Blue \u0026 Purple):**\n\n*Blue Resource Heroes (Willow, Ruby, Selena, Bob, Musashimaru, Joe):*\n- **Star Level:** Reach **3 stars minimum** to unlock 3rd skill\n- **Skill Priority:** Focus exclusively on **3rd skill** (resource buff) to Level 30\n- Skills 1, 2, and 4 are low priority\n\n*Purple Utility Heroes (Andre, Victor, Liz, Barnett):*\n- **Star Level:** Reach **3-4 stars** (4 stars recommended for troop capacity)\n- **Skill Priority:** Focus on **3rd skill** (utility buff) to Level 30 first\n- 1st and 2nd skills can be leveled if resources permit\n- 4th skill (troop capacity) unlocks at 4 stars\n\n**Hall of Fame Heroes (Purple Combat):**\n- **Star Level:** Must reach **5 stars** to enter Hall of Fame\n- **Skill Priority:** 3rd skill typically has faction buffs, prioritize accordingly\n- These heroes provide faction-wide combat bonuses once in Hall of Fame\n\n---\n\n### Resource Management\n\n**Yellow Fragment Sources:**\n- Black markets\n- Events and rewards\n- Special event exchanges\n- Escorting and looting trucks\n- Alliance duel rewards\n- Survival preparedness rewards\n- VIP benefits\n\n**Skill Book Sources:**\n- Black markets\n- Looting shadow call missions\n- Alliance duel rewards\n- Survival preparedness rewards\n- Events and rewards\n- Special event exchanges\n- VIP benefits\n\n**Conservation Strategy:**\n- **Yellow Fragments:** Prioritize getting combat heroes to 4 stars minimum\n- **Skill Books:** Always check 3rd skill value before investing\n- Don't spread resources too thin across many heroes\n- Complete one hero's progression before moving to the next\n- Save higher-tier resources (Orange) for your absolute best heroes\n- Blue/Purple resources can be more liberal for utility heroes\n\n---\n\n## Quick Reference Summary 📋\n\n```\n═══════════════════════════════════════\n    HERO SKILLS \u0026 STAR LEVELS GUIDE\n═══════════════════════════════════════\n\n⭐ STAR LEVEL BASICS\n✦ 0 → 5 stars maximum\n✦ 5 fractions per star level\n✦ Yellow Fragments required per star:\n  • 1★: 12 YF\n  • 2★: 35 YF (47 total)\n  • 3★: 110 YF (157 total)\n  • 4★: 300 YF (457 total)\n  • 5★: 500 YF (957 total)\n\n🔓 SKILL UNLOCKING\n✦ 1★ → 1st Skill\n✦ 2★ → 2nd Skill\n✦ 3★ → 3rd Skill (Often most valuable!)\n✦ 4★ → 4th Skill (Troop cap +5%, ATK/DEF)\n✦ 5★ → Maximum star level\n\n📚 SKILL LEVEL SYSTEM\n✦ Skills 1-3: Level 1 → 30\n✦ Skill 4: Always Level 1 (no upgrade)\n✦ Each skill levels independently\n\n🎨 SKILL BOOK TYPES\n✦ 🟠 Orange Heroes → Orange Skill Books\n✦ 🟣 Purple Heroes → Purple Skill Books\n✦ 🔵 Blue Heroes → Blue Skill Books\n\n📊 KEY MILESTONES (Per Skill 1-3)\n✦ Level 1 → 5:     60 books\n✦ Level 1 → 10:    260 books\n✦ Level 1 → 20:    3,520 books\n✦ Level 1 → 30:    13,860 books\n\n💎 TOTAL COST (All Skills 1-3)\n✦ Level 10:    780 books\n✦ Level 20:    10,560 books\n✦ Level 30:    41,580 books\n\n🎯 SKILL PRIORITY (CRITICAL!)\nStep 1: Check 3rd skill quality\nStep 2a: If 3rd skill good → 3rd → 1st → 2nd\nStep 2b: If 3rd skill weak → 1st → 2nd → 3rd\nStep 3: Skill 4 always Level 1 (no books needed)\n\n⚡ STAR LEVEL PRIORITY\nCombat Heroes:\n✦ Minimum: 4★ (unlock troop cap skill)\n✦ Target: 5★ for top 5 heroes\n\nUtility Heroes:\n✦ Blue: 3★ minimum (unlock 3rd skill)\n✦ Purple: 3-4★ (3rd skill + optional cap)\n\nFormation Rule:\n✦ ALWAYS reach 4★ minimum before using in formations\n✦ Troop capacity = massive CP difference\n\n═══════════════════════════════════════\n```\n\n---\n\n**Remember**:\n- **Star levels unlock skills** - Reach 4 stars minimum for formation heroes!\n- **Always check 3rd skill first** - It often contains the best buffs!\n- **4th skill provides crucial troop capacity** - ~5% makes huge CP difference!\n- **Skill 4 is always Level 1** - No skill books needed!\n- **Resource management is key** - Focus on quality over quantity!\n\nGood luck, Survivor! ⭐📚\n"])</script><script>self.__next_f.push([1,"d:T3164,"])</script><script>self.__next_f.push([1,"\n# Gabay sa Hero Skills at Star Levels ⭐\n\nAng hero progression sa DarkWar Survival ay nagsasangkot ng dalawang magkakaugnay na sistema: **Star Levels** at **Skills**. Ang komprehensibong gabay na ito ay sumasaklaw sa lahat ng kailangan mong malaman tungkol sa pag-upgrade ng iyong mga hero mula 0 stars hanggang 5 stars, pag-unlock ng kanilang skills, at pagmaximize ng kanilang potensyal.\n\n---\n\n## Star Level System\n\n### Star Level Basics\n\n**Core Mechanics:**\n- Ang mga hero ay nagsisimula sa **0 stars** at maaaring umabot sa maximum na **5 stars**\n- Ang bawat star level ay nahahati sa **5 fractions**\n- Ang bawat fraction ay nangangailangan ng **Yellow Fragments (Yellow Shards)** upang mapunan\n- Kapag napuno na ang lahat ng 5 fractions, ang hero ay umaakyat sa susunod na star level\n\n**Bakit Mahalaga ang Star Levels:**\n- **Ang mga skill ay nag-unlock nang progresibo** habang nakakakuha ka ng star levels\n- **Ang 4th skill ay nagbibigay ng crucial troop capacity bonuses** (~5% pagtaas)\n- Kailangan ng mga hero ng **minimum 4 stars** upang maging epektibo sa mga formation\n- Ang star level ay direktang nakakaapekto sa combat power (CP)\n\n---\n\n### Yellow Fragment Requirements\n\nAng sumusunod na table ay nagpapakita ng eksaktong yellow fragment cost para sa bawat fraction sa bawat star level:\n\n| Star Level | Fraction 1 | Fraction 2 | Fraction 3 | Fraction 4 | Fraction 5 | **Total YF Required** |\n|:----------:|:----------:|:----------:|:----------:|:----------:|:----------:|:--------------------:|\n| **0 → 1** | 1 | 1 | 2 | 3 | 5 | **12** |\n| **1 → 2** | 5 | 5 | 5 | 5 | 15 | **35** |\n| **2 → 3** | 15 | 15 | 15 | 15 | 50 | **110** |\n| **3 → 4** | 50 | 50 | 50 | 50 | 100 | **300** |\n| **4 → 5** | 100 | 100 | 100 | 100 | 100 | **500** |\n\n### Cumulative Yellow Fragment Costs\n\n| Target Star Level | Total Yellow Fragments Needed |\n|:-----------------:|:----------------------------:|\n| **1 Star** | **12** |\n| **2 Stars** | **47** (12 + 35) |\n| **3 Stars** | **157** (47 + 110) |\n| **4 Stars** | **457** (157 + 300) |\n| **5 Stars** | **957** (457 + 500) |\n\n**Upang ganap na i-max ang isang hero sa 5 stars ay nangangailangan ng 957 Yellow Fragments.**\n\n---\n\n### Skill Unlocking by Star Level\n\nAng mga skill ay nag-unlock nang progresibo habang nakakakuha ng stars ang iyong hero:\n\n| Star Level Reached | Skill Unlocked | Notes |\n|:------------------:|:--------------:|:------|\n| **1 Star** | **1st Skill** | Basic skill unlocked |\n| **2 Stars** | **2nd Skill** | Secondary skill unlocked |\n| **3 Stars** | **3rd Skill** | **Critical skill** - Kadalasang naglalaman ng malakas na development o troop buffs |\n| **4 Stars** | **4th Skill** | **Unit capacity skill** - Nagbibigay ng troop cap increase (~5%) + hero ATK/DEF bonuses |\n| **5 Stars** | — | Maximum star level reached |\n\n**Mahalagang Mga Tala:**\n- Ang skills 1, 2, at 3 ay maaaring i-level mula **1 hanggang 30**\n- **Ang maximum level ng Skill 4 ay 1** (hindi na maaaring i-upgrade pa)\n- Kailangan mong i-unlock ang skill sa pamamagitan ng pag-abot sa star level nito bago mo ito ma-upgrade gamit ang skill books\n\n---\n\n## Skill System Overview\n\n### Skill Mechanics\n\n**Skill Basics:**\n- Ang bawat hero ay may eksaktong **4 skills**\n- Ang mga skill ay nagsisimula sa **Level 1** at maaaring i-upgrade hanggang **Level 30** (maliban sa Skill 4)\n- **Ang Skill 4 ay nakalock sa Level 1** at hindi maaaring i-upgrade\n- Ang bawat skill level ay nangangailangan ng **skill books** upang i-upgrade\n- Ang uri ng skill book ay depende sa hero rarity\n\n**Hero Rarity \u0026 Skill Books:**\n\n| Hero Rarity | Skill Book Type |\n|-------------|----------------|\n| 🟠 **Orange (S-Tier)** | Orange Skill Books |\n| 🟣 **Purple (A-Tier)** | Purple Skill Books |\n| 🔵 **Blue (B-Tier)** | Blue Skill Books |\n\n**Mahalagang Mga Tala:**\n- Kailangan mong gumamit ng **matching skill book** para sa rarity ng iyong hero\n- Ang skills 1-3 ay nag-level up nang independently\n- Ang lahat ng skills 1-3 ay sumusunod sa parehong leveling cost structure\n\n---\n\n## Skill Book Requirements Per Level\n\nAng sumusunod na table ay nagpapakita ng **eksakto na bilang ng skill books na kailangan** upang i-upgrade ang bawat skill mula sa isang level hanggang sa susunod:\n\n| From Level | To Level | Skill Books Required |\n|:----------:|:--------:|:--------------------:|\n| 1 | 2 | 10 |\n| 2 | 3 | 10 |\n| 3 | 4 | 20 |\n| 4 | 5 | 20 |\n| 5 | 6 | 30 |\n| 6 | 7 | 30 |\n| 7 | 8 | 40 |\n| 8 | 9 | 40 |\n| 9 | 10 | 60 |\n| 10 | 11 | 80 |\n| 11 | 12 | 120 |\n| 12 | 13 | 160 |\n| 13 | 14 | 200 |\n| 14 | 15 | 240 |\n| 15 | 16 | 280 |\n| 16 | 17 | 320 |\n| 17 | 18 | 360 |\n| 18 | 19 | 400 |\n| 19 | 20 | 460 |\n| 20 | 21 | 520 |\n| 21 | 22 | 580 |\n| 22 | 23 | 640 |\n| 23 | 24 | 700 |\n| 24 | 25 | 760 |\n| 25 | 26 | 820 |\n| 26 | 27 | 900 |\n| 27 | 28 | 1,000 |\n| 28 | 29 | 1,100 |\n| 29 | 30 | 1,200 |\n\n---\n\n## Cumulative Skill Book Costs\n\nPag-unawa sa kabuuang investment na kailangan upang maabot ang tiyak na skill level milestones:\n\n### Milestone Costs (Per Skill)\n\n| Target Level | Total Books Required | Cumulative Total |\n|:------------:|:-------------------:|:---------------:|\n| **Level 5** | Levels 2-5 | **60** |\n| **Level 10** | Levels 2-10 | **260** |\n| **Level 15** | Levels 2-15 | **1,220** |\n| **Level 20** | Levels 2-20 | **3,520** |\n| **Level 25** | Levels 2-25 | **7,360** |\n| **Level 30** | Levels 2-30 | **13,860** |\n\n### Total Cost for Skills 1-3\n\nDahil ang bawat hero ay may **3 upgradeable skills** (Skills 1-3) na kailangang i-level nang independently:\n\n| Target Level | Books Per Skill | Books for Skills 1-3 |\n|:------------:|:--------------:|:-------------------:|\n| **Level 5** | 60 | **180** |\n| **Level 10** | 260 | **780** |\n| **Level 15** | 1,220 | **3,660** |\n| **Level 20** | 3,520 | **10,560** |\n| **Level 25** | 7,360 | **22,080** |\n| **Level 30** | 13,860 | **41,580** |\n\n**Ibig sabihin nito upang ganap na i-max out ang mga upgradeable skills ng isang hero (Skills 1-3 sa Level 30), kailangan mo ng:**\n- 🟠 **41,580 Orange Skill Books** para sa isang S-Tier hero\n- 🟣 **41,580 Purple Skill Books** para sa isang A-Tier hero\n- 🔵 **41,580 Blue Skill Books** para sa isang B-Tier hero\n\n*Tandaan: Ang Skill 4 ay palaging Level 1 at hindi maaaring i-upgrade.*\n\n---\n\n## Upgrade Strategy\n\n### Star Level Priority\n\n**Minimum Star Level Requirements:**\n\n1. **Umabot sa 4 Stars Minimum** para sa formation heroes\n   - Nag-unlock ng critical 4th skill (troop capacity boost)\n   - ~5% troop capacity increase ay significant na nakakaapekto sa combat power (CP)\n   - Ang mga formation na may mas mataas na troop capacity ay may substantially mas mataas na CP\n   - Ang 4th skill ay nagbibigay din ng hero ATK/DEF bonuses\n\n2. **I-push sa 5 Stars** ang iyong top 5 main heroes\n   - Nagmamaximize ng hero potential\n   - Kailangan para sa endgame competitive play\n\n3. **Ang utility heroes ay maaaring huminto sa 3-4 stars**\n   - Ang 3rd skill unlocked ay kadalasang sapat para sa utility purposes\n   - Ang yellow fragments ay mas magandang gastusin sa combat heroes\n\n### Skill Priority System\n\n**CRITICAL: Laging Suriin ang 3rd Skill Muna!**\n\nAng **3rd skill** ay kadalasang naglalaman ng pinaka-valuable buffs para sa hero. Bago mag-invest ng skill books, suriin kung ano ang ibinibigay ng 3rd skill:\n\n**Kung ang 3rd Skill ay May Malakas na Buffs:**\n- Development boosts (research, construction, training, atbp.)\n- Universal troop buffs (damage, defense, HP, atbp.)\n- Resource bonuses\n\n**Priority Order:**\n1. **3rd Skill sa Level 30** ← Focus dito muna\n2. 1st Skill sa Level 30\n3. 2nd Skill sa Level 30\n4. 4th Skill (palaging Level 1, walang kailangang upgrade)\n\n**Kung ang 3rd Skill ay May Mahina/Situational Buffs:**\n\n**Priority Order:**\n1. **1st Skill sa Level 30** ← Magsimula dito\n2. **2nd Skill sa Level 30** ← Pagkatapos nito\n3. 3rd Skill sa Level 30 ← Mas mababang priority\n4. 4th Skill (palaging Level 1, walang kailangang upgrade)\n\n---\n\n### Hero Type Strategies\n\n**Top 5 Combat Heroes:**\n- **Star Level:** I-push sa **4-5 stars** (minimum 4 stars para sa formations)\n- **Skill Priority:** Suriin ang 3rd skill muna, pagkatapos ay sundin ang priority order\n- **Skill Target:** Mag-aim ng **Level 20+** sa priority skills para sa competitive strength\n- **Endgame:** I-push ang priority skills sa **Level 30**\n\n**Utility Heroes (Blue \u0026 Purple):**\n\n*Blue Resource Heroes (Willow, Ruby, Selena, Bob, Musashimaru, Joe):*\n- **Star Level:** Umabot sa **3 stars minimum** upang i-unlock ang 3rd skill\n- **Skill Priority:** Mag-focus nang eksklusibo sa **3rd skill** (resource buff) sa Level 30\n- Ang skills 1, 2, at 4 ay low priority\n\n*Purple Utility Heroes (Andre, Victor, Liz, Barnett):*\n- **Star Level:** Umabot sa **3-4 stars** (4 stars recommended para sa troop capacity)\n- **Skill Priority:** Mag-focus sa **3rd skill** (utility buff) sa Level 30 muna\n- Ang 1st at 2nd skills ay maaaring i-level kung payagan ng resources\n- Ang 4th skill (troop capacity) ay nag-unlock sa 4 stars\n\n**Hall of Fame Heroes (Purple Combat):**\n- **Star Level:** Dapat umabot sa **5 stars** upang makapasok sa Hall of Fame\n- **Skill Priority:** Ang 3rd skill ay karaniwang may faction buffs, mag-prioritize nang naaayon\n- Ang mga hero na ito ay nagbibigay ng faction-wide combat bonuses kapag nasa Hall of Fame na\n\n---\n\n### Resource Management\n\n**Yellow Fragment Sources:**\n- Black markets\n- Events at rewards\n- Special event exchanges\n- Pag-escort at pag-loot ng trucks\n- Alliance duel rewards\n- Survival preparedness rewards\n- VIP benefits\n\n**Skill Book Sources:**\n- Black markets\n- Pag-loot ng shadow call missions\n- Alliance duel rewards\n- Survival preparedness rewards\n- Events at rewards\n- Special event exchanges\n- VIP benefits\n\n**Conservation Strategy:**\n- **Yellow Fragments:** Unahin ang pagdadala ng combat heroes sa 4 stars minimum\n- **Skill Books:** Laging suriin ang 3rd skill value bago mag-invest\n- Huwag magkalat ng resources nang labis sa maraming heroes\n- Tapusin ang progression ng isang hero bago lumipat sa susunod\n- I-save ang mas mataas na tier resources (Orange) para sa iyong pinakamahusay na heroes\n- Ang Blue/Purple resources ay maaaring mas maluwag para sa utility heroes\n\n---\n\n## Quick Reference Summary 📋\n\n```\n═══════════════════════════════════════\n    HERO SKILLS \u0026 STAR LEVELS GUIDE\n═══════════════════════════════════════\n\n⭐ STAR LEVEL BASICS\n✦ 0 → 5 stars maximum\n✦ 5 fractions per star level\n✦ Yellow Fragments required per star:\n  • 1★: 12 YF\n  • 2★: 35 YF (47 total)\n  • 3★: 110 YF (157 total)\n  • 4★: 300 YF (457 total)\n  • 5★: 500 YF (957 total)\n\n🔓 SKILL UNLOCKING\n✦ 1★ → 1st Skill\n✦ 2★ → 2nd Skill\n✦ 3★ → 3rd Skill (Often most valuable!)\n✦ 4★ → 4th Skill (Troop cap +5%, ATK/DEF)\n✦ 5★ → Maximum star level\n\n📚 SKILL LEVEL SYSTEM\n✦ Skills 1-3: Level 1 → 30\n✦ Skill 4: Always Level 1 (no upgrade)\n✦ Each skill levels independently\n\n🎨 SKILL BOOK TYPES\n✦ 🟠 Orange Heroes → Orange Skill Books\n✦ 🟣 Purple Heroes → Purple Skill Books\n✦ 🔵 Blue Heroes → Blue Skill Books\n\n📊 KEY MILESTONES (Per Skill 1-3)\n✦ Level 1 → 5:     60 books\n✦ Level 1 → 10:    260 books\n✦ Level 1 → 20:    3,520 books\n✦ Level 1 → 30:    13,860 books\n\n💎 TOTAL COST (All Skills 1-3)\n✦ Level 10:    780 books\n✦ Level 20:    10,560 books\n✦ Level 30:    41,580 books\n\n🎯 SKILL PRIORITY (CRITICAL!)\nStep 1: Check 3rd skill quality\nStep 2a: If 3rd skill good → 3rd → 1st → 2nd\nStep 2b: If 3rd skill weak → 1st → 2nd → 3rd\nStep 3: Skill 4 always Level 1 (no books needed)\n\n⚡ STAR LEVEL PRIORITY\nCombat Heroes:\n✦ Minimum: 4★ (unlock troop cap skill)\n✦ Target: 5★ for top 5 heroes\n\nUtility Heroes:\n✦ Blue: 3★ minimum (unlock 3rd skill)\n✦ Purple: 3-4★ (3rd skill + optional cap)\n\nFormation Rule:\n✦ ALWAYS reach 4★ minimum before using in formations\n✦ Troop capacity = massive CP difference\n\n═══════════════════════════════════════\n```\n\n---\n\n**Tandaan**:\n- **Ang star levels ay nag-unlock ng skills** - Umabot sa 4 stars minimum para sa formation heroes!\n- **Laging suriin ang 3rd skill muna** - Kadalasang naglalaman ito ng best buffs!\n- **Ang 4th skill ay nagbibigay ng crucial troop capacity** - ~5% ay gumagawa ng malaking CP difference!\n- **Ang Skill 4 ay palaging Level 1** - Walang kailangang skill books!\n- **Ang resource management ay susi** - Mag-focus sa quality kaysa quantity!\n\nGood luck, Survivor! ⭐📚\n"])</script><script>self.__next_f.push([1,"e:T2895,"])</script><script>self.__next_f.push([1,"\n# 英雄技能和星级指南 ⭐\n\nDarkWar Survival中的英雄进展涉及两个相互关联的系统:**星级**和**技能**。本综合指南涵盖了您需要了解的关于将英雄从0星升级到5星、解锁技能以及最大化其潜力的所有内容。\n\n---\n\n## 星级系统\n\n### 星级基础知识\n\n**核心机制:**\n- 英雄从**0星**开始,最多可以达到**5星**\n- 每个星级分为**5个分段**\n- 每个分段需要**黄色碎片(Yellow Shards)**来填充\n- 一旦所有5个分段都被填满,英雄就会晋升到下一个星级\n\n**星级为何重要:**\n- **技能会随着星级的获得逐步解锁**\n- **第4技能提供关键的部队容量加成** (~5%增加)\n- 英雄需要**至少4星**才能在编队中有效\n- 星级直接影响战斗力(CP)\n\n---\n\n### 黄色碎片需求\n\n下表显示了每个星级每个分段的确切黄色碎片成本:\n\n| 星级 | 分段1 | 分段2 | 分段3 | 分段4 | 分段5 | **所需黄色碎片总计** |\n|:----------:|:----------:|:----------:|:----------:|:----------:|:----------:|:--------------------:|\n| **0 → 1** | 1 | 1 | 2 | 3 | 5 | **12** |\n| **1 → 2** | 5 | 5 | 5 | 5 | 15 | **35** |\n| **2 → 3** | 15 | 15 | 15 | 15 | 50 | **110** |\n| **3 → 4** | 50 | 50 | 50 | 50 | 100 | **300** |\n| **4 → 5** | 100 | 100 | 100 | 100 | 100 | **500** |\n\n### 累计黄色碎片成本\n\n| 目标星级 | 所需黄色碎片总数 |\n|:-----------------:|:----------------------------:|\n| **1星** | **12** |\n| **2星** | **47** (12 + 35) |\n| **3星** | **157** (47 + 110) |\n| **4星** | **457** (157 + 300) |\n| **5星** | **957** (457 + 500) |\n\n**将英雄完全升至5星需要957个黄色碎片。**\n\n---\n\n### 按星级解锁技能\n\n技能会随着英雄获得星级而逐步解锁:\n\n| 达到的星级 | 解锁的技能 | 备注 |\n|:------------------:|:--------------:|:------|\n| **1星** | **第1技能** | 基础技能解锁 |\n| **2星** | **第2技能** | 次要技能解锁 |\n| **3星** | **第3技能** | **关键技能** - 通常包含强大的发展或部队增益 |\n| **4星** | **第4技能** | **单位容量技能** - 提供部队上限增加(~5%) + 英雄攻击/防御加成 |\n| **5星** | — | 达到最大星级 |\n\n**重要说明:**\n- 技能1、2、3可以从**1升到30级**\n- **技能4最高等级为1**(无法进一步升级)\n- 您必须通过达到其星级来解锁技能,然后才能使用技能书升级\n\n---\n\n## 技能系统概述\n\n### 技能机制\n\n**技能基础知识:**\n- 每个英雄都有**4个技能**\n- 技能从**1级**开始,可以升级到**30级**(技能4除外)\n- **技能4锁定在1级**且无法升级\n- 每个技能等级都需要**技能书**来升级\n- 技能书类型取决于英雄稀有度\n\n**英雄稀有度与技能书:**\n\n| 英雄稀有度 | 技能书类型 |\n|-------------|----------------|\n| 🟠 **橙色 (S-Tier)** | 橙色技能书 |\n| 🟣 **紫色 (A-Tier)** | 紫色技能书 |\n| 🔵 **蓝色 (B-Tier)** | 蓝色技能书 |\n\n**重要说明:**\n- 您必须使用与英雄稀有度**匹配的技能书**\n- 技能1-3独立升级\n- 所有技能1-3遵循相同的升级成本结构\n\n---\n\n## 每级技能书需求\n\n下表显示了将每个技能从一个等级升级到下一个等级所需的**确切技能书数量**:\n\n| 起始等级 | 目标等级 | 所需技能书 |\n|:----------:|:--------:|:--------------------:|\n| 1 | 2 | 10 |\n| 2 | 3 | 10 |\n| 3 | 4 | 20 |\n| 4 | 5 | 20 |\n| 5 | 6 | 30 |\n| 6 | 7 | 30 |\n| 7 | 8 | 40 |\n| 8 | 9 | 40 |\n| 9 | 10 | 60 |\n| 10 | 11 | 80 |\n| 11 | 12 | 120 |\n| 12 | 13 | 160 |\n| 13 | 14 | 200 |\n| 14 | 15 | 240 |\n| 15 | 16 | 280 |\n| 16 | 17 | 320 |\n| 17 | 18 | 360 |\n| 18 | 19 | 400 |\n| 19 | 20 | 460 |\n| 20 | 21 | 520 |\n| 21 | 22 | 580 |\n| 22 | 23 | 640 |\n| 23 | 24 | 700 |\n| 24 | 25 | 760 |\n| 25 | 26 | 820 |\n| 26 | 27 | 900 |\n| 27 | 28 | 1,000 |\n| 28 | 29 | 1,100 |\n| 29 | 30 | 1,200 |\n\n---\n\n## 累计技能书成本\n\n了解达到特定技能等级里程碑所需的总投资:\n\n### 里程碑成本(每个技能)\n\n| 目标等级 | 所需总书籍 | 累计总数 |\n|:------------:|:-------------------:|:---------------:|\n| **5级** | 2-5级 | **60** |\n| **10级** | 2-10级 | **260** |\n| **15级** | 2-15级 | **1,220** |\n| **20级** | 2-20级 | **3,520** |\n| **25级** | 2-25级 | **7,360** |\n| **30级** | 2-30级 | **13,860** |\n\n### 技能1-3的总成本\n\n由于每个英雄有**3个可升级的技能**(技能1-3)需要独立升级:\n\n| 目标等级 | 每个技能的书 | 技能1-3的书 |\n|:------------:|:--------------:|:-------------------:|\n| **5级** | 60 | **180** |\n| **10级** | 260 | **780** |\n| **15级** | 1,220 | **3,660** |\n| **20级** | 3,520 | **10,560** |\n| **25级** | 7,360 | **22,080** |\n| **30级** | 13,860 | **41,580** |\n\n**这意味着要将一个英雄的可升级技能(技能1-3到30级)完全升满,您需要:**\n- 🟠 S-Tier英雄需要**41,580本橙色技能书**\n- 🟣 A-Tier英雄需要**41,580本紫色技能书**\n- 🔵 B-Tier英雄需要**41,580本蓝色技能书**\n\n*请记住:技能4始终为1级且无法升级。*\n\n---\n\n## 升级策略\n\n### 星级优先级\n\n**最低星级要求:**\n\n1. **编队英雄至少达到4星**\n   - 解锁关键的第4技能(部队容量提升)\n   - ~5%的部队容量增加显著影响战斗力(CP)\n   - 具有更高部队容量的编队具有大幅更高的CP\n   - 第4技能还提供英雄攻击/防御加成\n\n2. **将前5名主要英雄推至5星**\n   - 最大化英雄潜力\n   - 终局竞技游戏所需\n\n3. **实用英雄可以停在3-4星**\n   - 解锁第3技能通常足以满足实用目的\n   - 黄色碎片最好花在战斗英雄上\n\n### 技能优先级系统\n\n**关键:始终先检查第3技能!**\n\n**第3技能**通常包含英雄最有价值的增益。在投资技能书之前,检查第3技能提供什么:\n\n**如果第3技能有强大的增益:**\n- 发展提升(研究、建设、训练等)\n- 通用部队增益(伤害、防御、HP等)\n- 资源加成\n\n**优先顺序:**\n1. **第3技能到30级** ← 首先关注这里\n2. 第1技能到30级\n3. 第2技能到30级\n4. 第4技能(始终为1级,无需升级)\n\n**如果第3技能有弱/情境性增益:**\n\n**优先顺序:**\n1. **第1技能到30级** ← 从这里开始\n2. **第2技能到30级** ← 然后这个\n3. 第3技能到30级 ← 较低优先级\n4. 第4技能(始终为1级,无需升级)\n\n---\n\n### 英雄类型策略\n\n**前5名战斗英雄:**\n- **星级:** 推至**4-5星**(编队最少4星)\n- **技能优先级:** 先检查第3技能,然后遵循优先顺序\n- **技能目标:** 瞄准优先技能的**20级+**以获得竞争力\n- **终局:** 将优先技能推至**30级**\n\n**实用英雄(蓝色和紫色):**\n\n*蓝色资源英雄(Willow、Ruby、Selena、Bob、Musashimaru、Joe):*\n- **星级:** 至少达到**3星**以解锁第3技能\n- **技能优先级:** 专注于**第3技能**(资源增益)到30级\n- 技能1、2、4优先级较低\n\n*紫色实用英雄(Andre、Victor、Liz、Barnett):*\n- **星级:** 达到**3-4星**(建议4星以获得部队容量)\n- **技能优先级:** 首先专注于**第3技能**(实用增益)到30级\n- 如果资源允许,可以升级第1和第2技能\n- 第4技能(部队容量)在4星解锁\n\n**名人堂英雄(紫色战斗):**\n- **星级:** 必须达到**5星**才能进入名人堂\n- **技能优先级:** 第3技能通常有派系增益,据此设置优先级\n- 这些英雄一旦进入名人堂,就会提供派系范围的战斗加成\n\n---\n\n### 资源管理\n\n**黄色碎片来源:**\n- 黑市\n- 事件和奖励\n- 特殊事件兑换\n- 护送和掠夺卡车\n- 联盟决斗奖励\n- 生存准备奖励\n- VIP福利\n\n**技能书来源:**\n- 黑市\n- 掠夺暗影召唤任务\n- 联盟决斗奖励\n- 生存准备奖励\n- 事件和奖励\n- 特殊事件兑换\n- VIP福利\n\n**保护策略:**\n- **黄色碎片:** 优先让战斗英雄至少达到4星\n- **技能书:** 投资前始终检查第3技能价值\n- 不要在太多英雄身上分散资源\n- 在转向下一个之前完成一个英雄的进展\n- 为您最好的英雄保存高级资源(橙色)\n- 蓝色/紫色资源可以更自由地用于实用英雄\n\n---\n\n## 快速参考摘要 📋\n\n```\n═══════════════════════════════════════\n    英雄技能和星级指南\n═══════════════════════════════════════\n\n⭐ 星级基础知识\n✦ 0 → 5星最大值\n✦ 每个星级5个分段\n✦ 每个星级所需黄色碎片:\n  • 1★: 12黄色碎片\n  • 2★: 35黄色碎片(总计47)\n  • 3★: 110黄色碎片(总计157)\n  • 4★: 300黄色碎片(总计457)\n  • 5★: 500黄色碎片(总计957)\n\n🔓 技能解锁\n✦ 1★ → 第1技能\n✦ 2★ → 第2技能\n✦ 3★ → 第3技能(通常最有价值!)\n✦ 4★ → 第4技能(部队上限+5%,攻击/防御)\n✦ 5★ → 最大星级\n\n📚 技能等级系统\n✦ 技能1-3: 1级 → 30级\n✦ 技能4: 始终为1级(无升级)\n✦ 每个技能独立升级\n\n🎨 技能书类型\n✦ 🟠 橙色英雄 → 橙色技能书\n✦ 🟣 紫色英雄 → 紫色技能书\n✦ 🔵 蓝色英雄 → 蓝色技能书\n\n📊 关键里程碑(每个技能1-3)\n✦ 1级 → 5级:     60本书\n✦ 1级 → 10级:    260本书\n✦ 1级 → 20级:    3,520本书\n✦ 1级 → 30级:    13,860本书\n\n💎 总成本(所有技能1-3)\n✦ 10级:    780本书\n✦ 20级:    10,560本书\n✦ 30级:    41,580本书\n\n🎯 技能优先级(关键!)\n步骤1: 检查第3技能质量\n步骤2a: 如果第3技能好 → 第3 → 第1 → 第2\n步骤2b: 如果第3技能弱 → 第1 → 第2 → 第3\n步骤3: 技能4始终为1级(不需要书)\n\n⚡ 星级优先级\n战斗英雄:\n✦ 最低: 4★(解锁部队上限技能)\n✦ 目标: 前5名英雄升至5★\n\n实用英雄:\n✦ 蓝色: 最低3★(解锁第3技能)\n✦ 紫色: 3-4★(第3技能+可选上限)\n\n编队规则:\n✦ 在编队中使用前始终至少达到4★\n✦ 部队容量 = 巨大的CP差异\n\n═══════════════════════════════════════\n```\n\n---\n\n**请记住**:\n- **星级解锁技能** - 编队英雄至少达到4星!\n- **始终先检查第3技能** - 它通常包含最好的增益!\n- **第4技能提供关键的部队容量** - ~5%会产生巨大的CP差异!\n- **技能4始终为1级** - 不需要技能书!\n- **资源管理是关键** - 专注于质量而非数量!\n\n祝你好运,幸存者! ⭐📚\n"])</script><script>self.__next_f.push([1,"f:T4a10,"])</script><script>self.__next_f.push([1,"\n# دليل المعدات البطل البرتقالية 🟠\n\nالمعدات البطل البرتقالية هي واحدة من أقوى الطرق لتعزيز أدائك القتالي في DarkWar Survival. يغطي هذا الدليل نظام ترقية المعدات، تقدم المستوى الأحمر، والموارد المطلوبة في كل مرحلة.\n\n**ملاحظة:** هناك **4 أنواع من المعدات البطل البرتقالية** في اللعبة. جميع أنواع المعدات تتبع نفس نظام التعزيز والتكاليف وتقدم الإحصائيات الموضحة في هذا الدليل.\n\n---\n\n## نظام تقدم الترقية\n\nالمعدات البطل البرتقالية تتبع مسار ترقية منظم مع **مرحلتين متميزتين:**\n\n**مسار الترقية الكامل:**\n\n1. **المرحلة 1: المستويات العادية** (المستوى 0 → المستوى 10)\n2. **انتقال الاختراق** (المستوى 10 → المستوى الأحمر 1)\n   - التكلفة: 100 نواة + 10 مخططات DX\n3. **المرحلة 2: المستويات الحمراء** (الأحمر 1 → الأحمر 5)\n\n### المرحلة 1: نظام المستوى العادي (المستوى 0–10)\n\nقبل الوصول إلى المستويات الحمراء، يجب أن تتقدم المعدات عبر نظام المستوى العادي:\n\n**التعزيز (المستويات 0–100):**\n- يمكن **تعزيز** المعدات من المستوى 0 إلى المستوى 100\n- التعزيز يستخدم **خامات التعزيز**\n- يزيد إحصائيات المعدات بشكل تدريجي\n\n**الترقية (المستوى 0–10):**\n- يمكن **ترقية** المعدات عبر 10 مستويات عادية\n- كل ترقية تتطلب **نوى الطاقة**\n- تكاليف نوى الطاقة تزيد بمقدار 10 لكل مستوى\n- كل ترقية تمنح مكافآت إحصائية\n\n**المكافآت الإحصائية لكل ترقية مستوى عادي:**\n\n| فئة الإحصائية | المكافأة لكل مستوى |\n|---------------|:--------------:|\n| تعزيز السمة الأساسية | +10%  | +40% | +40% | +16 |\n| ティア4 → ティア5 | 50 | +50% | +50% | +20 |\n| ティア5 → ティア6 | 60 | +60% | +60% | +24 |\n| ティア6 → ティア7 | 70 | +70% | +70% | +28 |\n| ティア7 → ティア8 | 80 | +80% | +80% | +32 |\n| ティア8 → ティア9 | 90 | +90% | +90% | +36 |\n| ティア9 → ティア10 | 100 | +100% | +100% | +40 |\n| **合計 (ティア0 → ティア10)** | **550** | **+100%** | **+100%** | **+40** |\n\n**レッドティアシステムへのブレイクスルーを行う前に、ティア10を完了する必要があります。**\n\n---\n\n### ブレイクスルー: ティア10 → レッドティア1\n\n**ノーマルティア10**を完了した後、装備をレッドティアに変換するために特別な**ブレイクスルー**を実行する必要があります。\n\n**ブレイクスルーコスト:**\n- **100 パワーコア**\n- **10 DX設計図**\n\n**ブレイクスルー能力値ボーナス:**\n\n| 能力値カテゴリ | ボーナス |\n|---------------|:-------:|\n| 基礎属性ブースト | +20% |\n| 装備戦闘力ブースト | +20% |\n| 部隊収容力 | +6 |\n\nこのブレイクスルーにより、ノーマルティア10装備が**レッドティア1パーツ**に変換され、レッドティア強化システムへのアクセスが解放されます。\n\n---\n\n### フェーズ2: レッドティア強化システム (レッド1–5)\n\nブレイクスルーが完了すると、装備はレッドティアシステムに入ります。**各レッドティアは、ブレイクスルーに到達するために5つの強化ステップが必要です:**\n\n**強化フロー:**\n- レッドティア [N] パーツ → ステップ1 → ステップ2 → ステップ3 → ステップ4 → ステップ5 (ブレイクスルー) → レッドティア [N+1] パーツ\n\n5つのステップのそれぞれが累積的な能力値の増加を提供します。5番目のステップは、ティアを完了する**ブレイクスルー**です。\n\n**完全なレッドティア進行:**\n\n- **レッドティア1:** パーツ → (5ステップ) → ブレイクスルー\n- **レッドティア2:** パーツ → (5ステップ) → ブレイクスルー\n- **レッドティア3:** パーツ → (5ステップ) → ブレイクスルー\n- **レッドティア4:** パーツ → (5ステップ) → ブレイクスルー\n- **レッドティア5:** パーツ → (5ステップ) → ブレイクスルー\n\n---\n\n## 共通能力値増加 (すべてのレッドティア)\n\n**すべてのレッドティア (1–5) は、ステップごとに同じ能力値増加を提供します:**\n\n| 能力値カテゴリ | ステップごとの増加 |\n|---------------|:------------------:|\n| ヒーロー攻撃力 | +240 |\n| ヒーロー攻撃力ボーナス | +0.96% |\n| 部隊ダメージ | +0.64% |\n| 基礎属性ブースト | +8% |\n| 装備戦闘力ブースト | +8% |\n| 部隊収容力 | +5 |\n\n**ティアごとの総累積増加 (5ステップ):**\n\n| 能力値カテゴリ | 総増加 |\n|---------------|:------:|\n| ヒーロー攻撃力 | +1,200 |\n| ヒーロー攻撃力ボーナス | +4.8% |\n| 部隊ダメージ | +3.2% |\n| 基礎属性ブースト | +40% |\n| 装備戦闘力ブースト | +40% |\n| 部隊収容力 | +25 |\n\n---\n\n## レッドティア1: 強化詳細\n\n### レッドティア1強化コスト\n\n| ステップ | パワーコア | ブースト鉱石 | DX設計図 |\n|:--------:|:----------:|:------------:|:--------:|\n| 1 | 50 | 15,000 | — |\n| 2 | 50 | 15,000 | — |\n| 3 | 50 | 15,000 | — |\n| 4 | 50 | 15,000 | — |\n| 5 (
