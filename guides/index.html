رة الثالثة.\n\n### أبطال إنتاج الموارد\n\n**ويلو (Willow)**\n- التخصص: تعزيز إنتاج الحديد\n- الغرض: يزيد من إنتاج الحديد من قاعدتك\n\n**روبي (Ruby)**\n- التخصص: تعزيز إنتاج الخشب\n- الغرض: يزيد من إنتاج الخشب من قاعدتك\n\n**سيلينا (Selena)**\n- التخصص: تعزيز إنتاج الكهرباء\n- الغرض: يزيد من إنتاج الكهرباء من قاعدتك\n\n### أبطال جمع الموارد\n\n**بوب (Bob)**\n- التخصص: تعزيز جمع الحديد\n- الغرض: يزيد من الحديد المجمع من بلاطات الحقل\n\n**موساشيمارو (Musashimaru)**\n- التخصص: تعزيز جمع الخشب\n- الغرض: يزيد من الخشب المجمع من بلاطات الحقل\n\n**جو (Joe)**\n- التخصص: تعزيز جمع الكهرباء\n- الغرض: يزيد من الكهرباء المجمعة من بلاطات الحقل\n\n**مهم:** ارفع مستوى هؤلاء الأبطال الستة إلى **المستوى 40** على الأقل لفتح مهاراتهم الرابعة. بينما تصل مهاراتهم الثالثة (تعزيزات الموارد) إلى الحد الأقصى عند المستوى 30، فإن الوصول إلى المستوى 40 يفتح المهارة الرابعة التي تزيد من سعة الوحدات عند إدراجها في التشكيلات، مما يعظم فائدتهم الإجمالية.\n\n---\n\n## الأبطال الأرجوانية (A-Tier) 🟣\n\nتنقسم الأبطال الأرجوانية إلى فئتين: **المنفعة** و**الدعم القتالي**.\n\n### أبطال المنفعة\n\nيوفر هؤلاء الأبطال تعزيزات اللعب الأساسية. ارفع مستواهم إلى **المستوى 40** على الأقل لفتح مهاراتهم الرابعة. بينما تصل مهاراتهم الثالثة (تعزيزات المنفعة) إلى الحد الأقصى عند المستوى 30، فإن الوصول إلى المستوى 40 يفتح المهارة الرابعة التي تزيد من سعة الوحدات، مما يجعلهم أكثر قيمة في التشكيلات.\n\n**أندريه (Andre)**\n- التخصص: تعزيز سرعة البحث\n- الأولوية: عالية - يسرع جميع أبحاث التكنولوجيا\n\n**فيكتور (Victor)**\n- التخصص: تقليل تكلفة الطاقة وتعزيز سرعة المسيرة ضد الوحوش\n- الأولوية: عالية - ضروري لصيد الوحوش بكفاءة\n\n**ليز (Liz)**\n- التخصص: تعزيز سرعة الشفاء\n- الأولوية: متوسطة - يقلل من وقت التعافي في المستشفى\n\n**بارنيت (Barnett)**\n- التخصص: تعزيز سرعة تدريب القوات\n- الأولوية: عالية - يسرع بناء الجيش\n\n### أبطال الدعم القتالي (قاعة الشهرة)\n\nيسمح نظام قاعة الشهرة **لأي بطل وصل إلى مستوى 5 نجوم** بالدخول وتوفير تعزيزات قتالية إضافية لفصيله المعني. عادة ما تستخدم الأبطال الأرجوانية لهذا الغرض لأنها أسهل في الحصول عليها وترقيتها إلى 5 نجوم.\n\n**أبطال أرجوانية شائعة لقاعة الشهرة:**\n\n**فصيل المقاتل:**\n- **فرهاد (Farhad)**\n\n**فصيل الرامي:**\n- **سيسيليا (Cecilia)**\n- **كايلي (Kylie)**\n\n**فصيل الراكب:**\n- **سكارليت (Scarlett)**\n- **إيدي (Eddie)**\n\n**نصيحة:** رفع مستوى أبطال قاعة الشهرة يزيد من فعالية قتال فصيلك. يمكن لأي بطل 5 نجوم دخول قاعة الشهرة - هؤلاء الأبطال الأرجوانية مجرد خيارات شائعة بسبب سهولة الوصول.\n\n---\n\n## الأبطال البرتقالية (S-Tier) 🟠\n\nالأبطال البرتقالية هم الأقوى ويتم تقسيمهم حسب الفصيل والدور.\n\n### فصيل المقاتل 🗡️\n\n#### أبطال المنفعة\n\n**كاثرين \u0026 ريكس (Catherine \u0026 Rex)**\n- التخصص: تعزيز عائد الطعام في مهام الرادار وكمية مهام الرادار المجانية\n- الاستخدام: انشرهما معًا لتحقيق أقصى كفاءة لمهمة الرادار\n\n**غاي (Guy)**\n- التخصص: طاقة مجانية، سرعة استعادة الطاقة، وتعزيز كسب الطعام الخامل\n- الاستخدام: ضروري لتوليد الموارد بمرور الوقت\n\n#### الأبطال القتالية (حسب الموسم)\n\n**تريستان (Tristan) - الموسم 1)**\n- التعزيزات: دفاع المقاتل، هجوم قوات المقاتل، وتعزيز ضرر المعركة\n- الأفضل لـ: التشكيلات الدفاعية مع هجمات مضادة قوية\n\n**فرانسيس (Francis) - الموسم 2)**\n- التعزيزات: صحة المقاتل وتعزيز ضرر المعركة\n- الأفضل لـ: التشكيلات المرتكزة على الدبابات مع قابلية البقاء العالية\n\n**لان (Lan) - الموسم 3)**\n- التعزيزات: هجوم المقاتل وتعزيز ضرر الهجوم المضاد\n- الأفضل لـ: استراتيجيات الهجوم المضاد العدوانية\n\n**نوح (Noah) - الموسم 4)**\n- التعزيزات: تعزيز ضرر المقاتل ويقلل من ضرر الهجوم المستلم\n- الأفضل لـ: الهجوم المتوازن وتخفيف الضرر\n\n**أنجيلا (Angela) - الموسم 5)**\n- التعزيزات: الهجمات العادية للمقاتل، الهجمات المضادة، وتعزيز ضرر المهارة\n- الأفضل لـ: أقصى إنتاج للضرر عبر جميع أنواع الهجوم\n\n---\n\n### فصيل الرامي 🏹\n\n#### أبطال المنفعة\n\n**إيفانز (Evans)**\n- التخصص: معدات مجانية وتعزيز ضرر المركبات\n- الاستخدام: ضروري لزراعة المعدات والهجمات القائمة على المركبات\n\n**ميغان (Megan)**\n- التخصص: مدة البناء المجانية، تعزيز سرعة البناء، وتقليل تكلفة موارد البناء\n- الاستخدام: حاسم لتطوير القاعدة وترقيات المباني\n\n#### الأبطال القتالية (حسب الموسم)\n\n**ناتاشا (Natasha) - الموسم 1)**\n- التعزيزات: دفاع الرامي، هجوم قوات الرامي، وتعزيز ضرر المعركة\n- الأفضل لـ: التشكيلات الدفاعية مع قوة نطاق قوية\n\n**مارغريت (Margaret) - الموسم 2)**\n- التعزيزات: صحة الرامي وتعزيز ضرر المعركة\n- الأفضل لـ: تشكيلات الرامي المتينة\n\n**داريان (Darian) - الموسم 3)**\n- التعزيزات: هجوم الرامي وتعزيز ضرر مهارة القوات\n- الأفضل لـ: استراتيجيات الضرر القائمة على المهارة\n\n**روزا (Rosa) - الموسم 4)**\n- التعزيزات: تعزيز ضرر الرامي وتقليل ضرر الهجوم المضاد\n- الأفضل لـ: التشكيلات الهجومية مع حماية الهجوم المضاد\n\n**شادو (Shadow) - الموسم 5)**\n- التعزيزات: الهجمات العادية للرامي، الهجمات المضادة، وتعزيز ضرر المهارة\n- الأفضل لـ: أقصى إنتاج للضرر عبر جميع أنواع الهجوم\n\n---\n\n### فصيل الراكب 🐎\n\n#### أبطال المنفعة\n\n**كوين (Quinn)**\n- التخصص: يقلل من تكاليف التدريب، تعزيز سرعة التدريب، وتعزيز نقاط مبارزة التحالف\n- الاستخدام: ضروري لبناء الجيش وأحداث التحالف\n\n**كورليوني (Corleone)**\n- التخصص: مدة البحث المجانية، تعزيز سرعة البحث، وتقليل تكلفة موارد البحث\n- الاستخدام: حاسم للتقدم التكنولوجي\n\n#### الأبطال القتالية (حسب الموسم)\n\n**سايروس (Cyrus) - الموسم 1)**\n- التعزيزات: دفاع الراكب، هجوم قوات الراكب، وتعزيز ضرر المعركة\n- الأفضل لـ: تشكيلات الفرسان الدفاعية\n\n**مارسيا (Marcia) - الموسم 2)**\n- التعزيزات: صحة الراكب وتعزيز ضرر المعركة\n- الأفضل لـ: جيوش الراكب عالية المتانة\n\n**كاترينا (Katrina) - الموسم 3)**\n- التعزيزات: هجوم الراكب وتعزيز ضرر الهجوم العادي للقوات\n- الأفضل لـ: استراتيجيات تركز على الهجوم الأساسي\n\n**لوكاس (Lucas) - الموسم 4)**\n- التعزيزات: تعزيز ضرر الراكب ويقلل من ضرر المهارة المستلم\n- الأفضل لـ: التشكيلات الهجومية مع حماية ضرر المهارة\n\n**ريان (Ryan) - الموسم 5)**\n- التعزيزات: الهجمات العادية للراكب، الهجمات المضادة، وتعزيز ضرر المهارة\n- الأفضل لـ: أقصى إنتاج للضرر عبر جميع أنواع الهجوم\n\n---\n\n## ملخص مرجعي سريع 📋\n\n```\n═══════════════════════════════════════\n         دليل معلومات الأبطال\n═══════════════════════════════════════\n\n🔵 الأبطال الأزرق (B-Tier، المستوى إلى 40)\nالموارد:\n✦ Willow (الحديد)، Ruby (الخشب)، Selena (الكهرباء)\n✦ Bob (الحديد)، Musashimaru (الخشب)، Joe (الكهرباء)\n\n🟣 الأبطال الأرجوانية (A-Tier، المستوى إلى 40)\nالمنفعة:\n✦ Andre (البحث)، Victor (الطاقة/المسيرة)\n✦ Liz (الشفاء)، Barnett (التدريب)\n\nقاعة الشهرة:\n✦ المقاتل: Farhad\n✦ الرامي: Cecilia، Kylie\n✦ الراكب: Scarlett، Eddie\n\n🟠 الأبطال البرتقالية (S-Tier، حسب الفصيل)\n\nالمقاتل 🗡️\nالمنفعة: Catherine \u0026 Rex، Guy\nالقتال: Tristan، Francis، Lan، Noah، Angela\n\nالرامي 🏹\nالمنفعة: Evans، Megan\nالقتال: Natasha، Margaret، Darian، Rosa، Shadow\n\nالراكب 🐎\nالمنفعة: Quinn، Corleone\nالقتال: Cyrus، Marcia، Katrina، Lucas، Ryan\n\n═══════════════════════════════════════\n```\n\n---\n\n## استراتيجية تحسين الطعام 🌾\n\n**قاعدة الخمسة الأوائل:**\n\nلتعظيم كفاءة الطعام (يستخدم الطعام لرفع مستوى الأبطال)، اتبع هذه الاستراتيجية:\n\n1. **أطعم أفضل 5 أبطال لديك فقط** - يجب أن يكونوا أقوى أبطالك الذين تستخدمهم في التشكيلات\n2. **استخدم مركز التدريب لجميع الأبطال الآخرين** - يساوي مركز التدريب تلقائيًا مستويات الأبطال الآخرين لتطابق أفضل 5 لديك دون إنفاق الطعام\n3. **قيود مركز التدريب** - الحد الأقصى 15 فتحة بطل متاحة\n\n**استثناء لأبطال المنفعة:**\n\nنظرًا لأن مركز التدريب لديه مساحة محدودة (15 فتحة)، يجب عليك **إطعام أبطال المنفعة الأزرق والأرجوانية يدويًا حتى المستوى 40** خارج مركز التدريب. يشمل هذا:\n- أبطال الموارد الزرقاء (Willow، Ruby، Selena، Bob، Musashimaru، Joe)\n- أبطال المنفعة الأرجوانية (Andre، Victor، Liz، Barnett)\n\nتضمن هذه الاستراتيجية الحفاظ على تعزيزات المنفعة القوية مع الحفاظ على الطعام لأبطالك القتاليين الرئيسيين.\n\n---\n\n**تذكر**: الأبطال هم أعظم أصولك! اختر بحكمة، واستثمر بشكل استراتيجي، وابنِ الفريق النهائي للسيطرة على الأراضي القاحلة!\n\nحظ سعيد، أيها القائد! 🦸\n"])</script><script>self.__next_f.push([1,"17:T22a9,"])</script><script>self.__next_f.push([1,"\n# Panduan Informasi Hero 🦸\n\nMemahami hero Anda sangat penting untuk sukses di DarkWar Survival. Panduan komprehensif ini mencakup semua tipe hero, spesialisasi mereka, dan cara menggunakannya secara efektif untuk meningkatkan gameplay Anda.\n\n---\n\n## Hero Blue (B-Tier) 🔵\n\nHero blue sangat penting untuk **produksi dan pengumpulan resource**. Hero ini harus di-level hingga setidaknya **Level 30** untuk memaksimalkan manfaat skill ke-3 mereka.\n\n### Hero Produksi Resource\n\n**Willow**\n- Spesialisasi: Boost produksi besi\n- Tujuan: Meningkatkan output besi dari base Anda\n\n**Ruby**\n- Spesialisasi: Boost produksi kayu\n- Tujuan: Meningkatkan output kayu dari base Anda\n\n**Selena**\n- Spesialisasi: Boost produksi listrik\n- Tujuan: Meningkatkan output listrik dari base Anda\n\n### Hero Pengumpulan Resource\n\n**Bob**\n- Spesialisasi: Boost pengumpulan besi\n- Tujuan: Meningkatkan besi yang dikumpulkan dari field tiles\n\n**Musashimaru**\n- Spesialisasi: Boost pengumpulan kayu\n- Tujuan: Meningkatkan kayu yang dikumpulkan dari field tiles\n\n**Joe**\n- Spesialisasi: Boost pengumpulan listrik\n- Tujuan: Meningkatkan listrik yang dikumpulkan dari field tiles\n\n**Penting:** Level 6 hero ini hingga setidaknya **Level 40** untuk membuka skill ke-4 mereka. Meskipun skill ke-3 mereka (buff resource) maksimal di Level 30, mencapai Level 40 membuka skill ke-4 yang meningkatkan troop capacity ketika dimasukkan dalam formasi, memaksimalkan utilitas keseluruhan mereka.\n\n---\n\n## Hero Purple (A-Tier) 🟣\n\nHero purple terbagi menjadi dua kategori: **Utility** dan **Combat Support**.\n\n### Hero Utility\n\nHero ini memberikan boost gameplay yang esensial. Level mereka hingga setidaknya **Level 40** untuk membuka skill ke-4 mereka. Meskipun skill ke-3 mereka (buff utility) maksimal di Level 30, mencapai Level 40 membuka skill ke-4 yang meningkatkan unit capacity, membuat mereka lebih berharga dalam formasi.\n\n**Andre**\n- Spesialisasi: Boost kecepatan riset\n- Prioritas: Tinggi - Mempercepat semua riset teknologi\n\n**Victor**\n- Spesialisasi: Pengurangan biaya energy dan boost kecepatan march melawan monster\n- Prioritas: Tinggi - Esensial untuk perburuan monster yang efisien\n\n**Liz**\n- Spesialisasi: Boost kecepatan penyembuhan\n- Prioritas: Sedang - Mengurangi waktu pemulihan hospital\n\n**Barnett**\n- Spesialisasi: Boost kecepatan pelatihan pasukan\n- Prioritas: Tinggi - Mempercepat pembangunan tentara\n\n### Hero Combat Support (Hall of Fame)\n\nSistem Hall of Fame memungkinkan **hero mana pun yang telah mencapai 5 star level** untuk masuk dan memberikan buff combat tambahan ke faction masing-masing. Hero purple umumnya digunakan untuk tujuan ini karena lebih mudah didapat dan di-upgrade ke 5 bintang.\n\n**Hero Purple Umum untuk Hall of Fame:**\n\n**Faction Fighter:**\n- **Farhad**\n\n**Faction Shooter:**\n- **Cecilia**\n- **Kylie**\n\n**Faction Rider:**\n- **Scarlett**\n- **Eddie**\n\n**Tip:** Meningkatkan level hero Hall of Fame meningkatkan efektivitas combat faction Anda. Hero 5 bintang mana pun dapat masuk Hall of Fame—hero purple ini hanya pilihan populer karena aksesibilitas.\n\n---\n\n## Hero Orange (S-Tier) 🟠\n\nHero orange adalah yang paling kuat dan dibagi berdasarkan faction dan peran.\n\n### Faction Fighter 🗡️\n\n#### Hero Utility\n\n**Catherine \u0026 Rex**\n- Spesialisasi: Boost hasil makanan di misi radar dan jumlah tugas radar gratis\n- Penggunaan: Deploy bersama untuk efisiensi misi radar maksimum\n\n**Guy**\n- Spesialisasi: Energy gratis, kecepatan recovery energy, dan boost perolehan makanan idle\n- Penggunaan: Esensial untuk generasi resource seiring waktu\n\n#### Hero Combat (Berdasarkan Season)\n\n**Tristan (Season 1)**\n- Buff: Pertahanan fighter, serangan pasukan fighter, dan boost damage pertempuran\n- Terbaik Untuk: Formasi defensif dengan counterattack kuat\n\n**Francis (Season 2)**\n- Buff: HP fighter dan boost damage pertempuran\n- Terbaik Untuk: Formasi fokus tank dengan survivability tinggi\n\n**Lan (Season 3)**\n- Buff: Serangan fighter dan boost damage counterattack\n- Terbaik Untuk: Strategi counterattack agresif\n\n**Noah (Season 4)**\n- Buff: Boost damage fighter dan mengurangi damage serangan yang diterima\n- Terbaik Untuk: Offense seimbang dan mitigasi damage\n\n**Angela (Season 5)**\n- Buff: Serangan normal fighter, counterattack, dan boost damage skill\n- Terbaik Untuk: Output damage maksimum di semua tipe serangan\n\n---\n\n### Faction Shooter 🏹\n\n#### Hero Utility\n\n**Evans**\n- Spesialisasi: Gear gratis dan boost damage kendaraan\n- Penggunaan: Esensial untuk farming gear dan serangan berbasis kendaraan\n\n**Megan**\n- Spesialisasi: Durasi konstruksi gratis, boost kecepatan konstruksi, dan pengurangan biaya resource konstruksi\n- Penggunaan: Kritis untuk pengembangan base dan upgrade bangunan\n\n#### Hero Combat (Berdasarkan Season)\n\n**Natasha (Season 1)**\n- Buff: Pertahanan shooter, serangan pasukan shooter, dan boost damage pertempuran\n- Terbaik Untuk: Formasi defensif dengan kekuatan jarak jauh yang kuat\n\n**Margaret (Season 2)**\n- Buff: HP shooter dan boost damage pertempuran\n- Terbaik Untuk: Formasi shooter yang tahan lama\n\n**Darian (Season 3)**\n- Buff: Serangan shooter dan boost damage skill pasukan\n- Terbaik Untuk: Strategi damage berbasis skill\n\n**Rosa (Season 4)**\n- Buff: Boost damage shooter dan pengurangan damage counterattack\n- Terbaik Untuk: Formasi ofensif dengan perlindungan counterattack\n\n**Shadow (Season 5)**\n- Buff: Serangan normal shooter, counterattack, dan boost damage skill\n- Terbaik Untuk: Output damage maksimum di semua tipe serangan\n\n---\n\n### Faction Rider 🐎\n\n#### Hero Utility\n\n**Quinn**\n- Spesialisasi: Mengurangi biaya pelatihan, boost kecepatan pelatihan, dan boost poin duel aliansi\n- Penggunaan: Esensial untuk pembangunan tentara dan event aliansi\n\n**Corleone**\n- Spesialisasi: Durasi riset gratis, boost kecepatan riset, dan pengurangan biaya resource riset\n- Penggunaan: Kritis untuk kemajuan teknologi\n\n#### Hero Combat (Berdasarkan Season)\n\n**Cyrus (Season 1)**\n- Buff: Pertahanan rider, serangan pasukan rider, dan boost damage pertempuran\n- Terbaik Untuk: Formasi kavaleri defensif\n\n**Marcia (Season 2)**\n- Buff: HP rider dan boost damage pertempuran\n- Terbaik Untuk: Tentara rider dengan durabilitas tinggi\n\n**Katrina (Season 3)**\n- Buff: Serangan rider dan boost damage serangan normal pasukan\n- Terbaik Untuk: Strategi fokus serangan dasar\n\n**Lucas (Season 4)**\n- Buff: Boost damage rider dan mengurangi damage skill yang diterima\n- Terbaik Untuk: Formasi ofensif dengan perlindungan damage skill\n\n**Ryan (Season 5)**\n- Buff: Serangan normal rider, counterattack, dan boost damage skill\n- Terbaik Untuk: Output damage maksimum di semua tipe serangan\n\n---\n\n## Ringkasan Referensi Cepat 📋\n\n```\n═══════════════════════════════════════\n         PANDUAN INFORMASI HERO\n═══════════════════════════════════════\n\n🔵 HERO BLUE (B-Tier, Level ke 40)\nResource:\n✦ Willow (Besi), Ruby (Kayu), Selena (Listrik)\n✦ Bob (Besi), Musashimaru (Kayu), Joe (Listrik)\n\n🟣 HERO PURPLE (A-Tier, Level ke 40)\nUtility:\n✦ Andre (Riset), Victor (Energy/March)\n✦ Liz (Penyembuhan), Barnett (Pelatihan)\n\nHall of Fame:\n✦ Fighter: Farhad\n✦ Shooter: Cecilia, Kylie\n✦ Rider: Scarlett, Eddie\n\n🟠 HERO ORANGE (S-Tier, Berdasarkan Faction)\n\nFIGHTER 🗡️\nUtility: Catherine \u0026 Rex, Guy\nCombat: Tristan, Francis, Lan, Noah, Angela\n\nSHOOTER 🏹\nUtility: Evans, Megan\nCombat: Natasha, Margaret, Darian, Rosa, Shadow\n\nRIDER 🐎\nUtility: Quinn, Corleone\nCombat: Cyrus, Marcia, Katrina, Lucas, Ryan\n\n═══════════════════════════════════════\n```\n\n---\n\n## Strategi Optimasi Makanan 🌾\n\n**Aturan Top 5:**\n\nUntuk memaksimalkan efisiensi makanan (makanan digunakan untuk level up hero), ikuti strategi ini:\n\n1. **Beri makan hanya top 5 hero Anda** - Ini harus hero terkuat yang Anda gunakan dalam formasi\n2. **Gunakan Training Center untuk semua hero lainnya** - Training Center secara otomatis menyamakan level hero lain dengan top 5 Anda tanpa menghabiskan makanan\n3. **Keterbatasan Training Center** - Maksimum 15 slot hero tersedia\n\n**Pengecualian untuk Hero Utility:**\n\nKarena Training Center memiliki ruang terbatas (15 slot), Anda harus **secara manual memberi makan hero utility Blue dan Purple hingga Level 40** di luar Training Center. Ini termasuk:\n- Hero resource blue (Willow, Ruby, Selena, Bob, Musashimaru, Joe)\n- Hero utility purple (Andre, Victor, Liz, Barnett)\n\nStrategi ini memastikan Anda mempertahankan buff utility yang kuat sambil menyimpan makanan untuk hero combat utama Anda.\n\n---\n\n**Ingat**: Hero adalah aset terbesar Anda! Pilih dengan bijak, investasi secara strategis, dan bangun tim ultimate untuk dominasi di wasteland!\n\nSemoga beruntung, Commander! 🦸\n"])</script><script>self.__next_f.push([1,"18:T2c47,"])</script><script>self.__next_f.push([1,"\n# ヒーロー情報ガイド 🦸\n\nDarkWar Survivalで成功するには、ヒーローを理解することが重要です。この包括的なガイドは、すべてのヒーロータイプ、特化、そしてゲームプレイを向上させるために効果的に使用する方法をカバーしています。\n\n---\n\n## 青レアリティ英雄 (B-Tier) 🔵\n\n青レアリティ英雄は**資源生産と採集**に不可欠です。これらのヒーローは、3番目スキルの恩恵を最大化するために、最低でも**レベル30**までレベルアップする必要があります。\n\n### 資源生産ヒーロー\n\n**ウィロー (Willow)**\n- 特化: 鉄生産ブースト\n- 目的: 基地からの鉄の生産量を増加\n\n**ルビー (Ruby)**\n- 特化: 木材生産ブースト\n- 目的: 基地からの木材の生産量を増加\n\n**セレナ (Selena)**\n- 特化: 電力生産ブースト\n- 目的: 基地からの電力の生産量を増加\n\n### 資源採集ヒーロー\n\n**ボブ (Bob)**\n- 特化: 鉄採集ブースト\n- 目的: フィールドタイルから収集する鉄を増加\n\n**ムサシマル (Musashimaru)**\n- 特化: 木材採集ブースト\n- 目的: フィールドタイルから収集する木材を増加\n\n**ジョー (Joe)**\n- 特化: 電力採集ブースト\n- 目的: フィールドタイルから収集する電力を増加\n\n**重要:** これら6人のヒーローを最低**レベル40**までレベルアップして、4番目のスキルをアンロックしてください。3番目のスキル(資源バフ)はレベル30で最大化されますが、レベル40に達すると、編成に含まれている場合にユニット収容力を増加させる4番目のスキルがアンロックされ、全体的な有用性が最大化されます。\n\n---\n\n## 紫レアリティ英雄 (A-Tier) 🟣\n\n紫レアリティ英雄は、**ユーティリティ**と**戦闘サポート**の2つのカテゴリーに分かれます。\n\n### ユーティリティヒーロー\n\nこれらのヒーローは必須のゲームプレイブーストを提供します。4番目のスキルをアンロックするために、最低**レベル40**までレベルアップしてください。3番目のスキル(ユーティリティバフ)はレベル30で最大化されますが、レベル40に達すると、ユニット収容力を増加させる4番目のスキルがアンロックされ、編成でより価値のあるものになります。\n\n**アンドレ (Andre)**\n- 特化: 研究速度ブースト\n- 優先度: 高 - すべての技術研究を加速\n\n**ビクター (Victor)**\n- 特化: エネルギーコスト削減とモンスターに対する行軍速度ブースト\n- 優先度: 高 - 効率的なモンスター狩りに不可欠\n\n**リズ (Liz)**\n- 特化: 治療速度ブースト\n- 優先度: 中 - 病院の回復時間を短縮\n\n**バーネット (Barnett)**\n- 特化: 部隊訓練速度ブースト\n- 優先度: 高 - 軍隊の構築を加速\n\n### 戦闘サポートヒーロー (名誉の殿堂)\n\n名誉の殿堂システムは、**5星レベルに達したすべてのヒーロー**が入場し、それぞれの陣営に追加の戦闘バフを提供することができます。紫レアリティ英雄は入手しやすく、5星にアップグレードしやすいため、この目的で一般的に使用されます。\n\n**名誉の殿堂のための一般的な紫レアリティ英雄:**\n\n**ファイター陣営:**\n- **ファハド (Farhad)**\n\n**シューター陣営:**\n- **セシリア (Cecilia)**\n- **カイリー (Kylie)**\n\n**ライダー陣営:**\n- **スカーレット (Scarlett)**\n- **エディ (Eddie)**\n\n**ヒント:** 名誉の殿堂ヒーローをレベルアップすると、陣営の戦闘効果が向上します。5星ヒーローは誰でも名誉の殿堂に入場でき、これらの紫レアリティ英雄は入手しやすさのために人気のある選択肢に過ぎません。\n\n---\n\n## オレンジレアリティ英雄 (S-Tier) 🟠\n\nオレンジレアリティ英雄は最も強力で、陣営と役割によって分けられます。\n\n### ファイター陣営 🗡️\n\n#### ユーティリティヒーロー\n\n**キャサリン \u0026 レックス (Catherine \u0026 Rex)**\n- 特化: レーダーミッションでの食料収穫量ブーストと無料レーダータスク数量\n- 使用法: 最大レーダーミッション効率のために一緒に配置\n\n**ガイ (Guy)**\n- 特化: 無料エネルギー、エネルギー回復速度、放置食料獲得ブースト\n- 使用法: 時間経過による資源生成に不可欠\n\n#### 戦闘ヒーロー (シーズン別)\n\n**トリスタン (Tristan) - シーズン1)**\n- バフ: ファイター防御、ファイター部隊攻撃、戦闘ダメージブースト\n- 最適化: 強力な反撃を持つ防御編成\n\n**フランシス (Francis) - シーズン2)**\n- バフ: ファイターHP、戦闘ダメージブースト\n- 最適化: 高い生存力を持つタンク中心編成\n\n**ラン (Lan) - シーズン3)**\n- バフ: ファイター攻撃、反撃ダメージブースト\n- 最適化: 攻撃的な反撃戦略\n\n**ノア (Noah) - シーズン4)**\n- バフ: ファイターダメージブースト、受ける攻撃ダメージ削減\n- 最適化: バランスの取れた攻撃とダメージ軽減\n\n**アンジェラ (Angela) - シーズン5)**\n- バフ: ファイター通常攻撃、反撃、スキルダメージブースト\n- 最適化: すべての攻撃タイプで最大ダメージ出力\n\n---\n\n### シューター陣営 🏹\n\n#### ユーティリティヒーロー\n\n**エヴァンス (Evans)**\n- 特化: 無料ギアと車両ダメージブースト\n- 使用法: ギアファーミングと車両ベースの攻撃に不可欠\n\n**メガン (Megan)**\n- 特化: 無料建設期間、建設速度ブースト、建設資源コスト削減\n- 使用法: 基地開発と建物アップグレードに重要\n\n#### 戦闘ヒーロー (シーズン別)\n\n**ナターシャ (Natasha) - シーズン1)**\n- バフ: シューター防御、シューター部隊攻撃、戦闘ダメージブースト\n- 最適化: 強力な遠距離火力を持つ防御編成\n\n**マーガレット (Margaret) - シーズン2)**\n- バフ: シューターHP、戦闘ダメージブースト\n- 最適化: 耐久性のあるシューター編成\n\n**ダリアン (Darian) - シーズン3)**\n- バフ: シューター攻撃、部隊スキルダメージブースト\n- 最適化: スキルベースのダメージ戦略\n\n**ローザ (Rosa) - シーズン4)**\n- バフ: シューターダメージブースト、反撃ダメージ削減\n- 最適化: 反撃保護を持つ攻撃編成\n\n**シャドウ (Shadow) - シーズン5)**\n- バフ: シューター通常攻撃、反撃、スキルダメージブースト\n- 最適化: すべての攻撃タイプで最大ダメージ出力\n\n---\n\n### ライダー陣営 🐎\n\n#### ユーティリティヒーロー\n\n**クイン (Quinn)**\n- 特化: 訓練コスト削減、訓練速度ブースト、同盟対決ポイントブースト\n- 使用法: 軍隊構築と同盟イベントに不可欠\n\n**コルレオーネ (Corleone)**\n- 特化: 無料研究期間、研究速度ブースト、研究資源コスト削減\n- 使用法: 技術進歩に重要\n\n#### 戦闘ヒーロー (シーズン別)\n\n**サイラス (Cyrus) - シーズン1)**\n- バフ: ライダー防御、ライダー部隊攻撃、戦闘ダメージブースト\n- 最適化: 防御騎兵編成\n\n**マルシア (Marcia) - シーズン2)**\n- バフ: ライダーHP、戦闘ダメージブースト\n- 最適化: 高い耐久性のライダー軍隊\n\n**カトリーナ (Katrina) - シーズン3)**\n- バフ: ライダー攻撃、部隊通常攻撃ダメージブースト\n- 最適化: 基本攻撃中心戦略\n\n**ルーカス (Lucas) - シーズン4)**\n- バフ: ライダーダメージブースト、受けるスキルダメージ削減\n- 最適化: スキルダメージ保護を持つ攻撃編成\n\n**ライアン (Ryan) - シーズン5)**\n- バフ: ライダー通常攻撃、反撃、スキルダメージブースト\n- 最適化: すべての攻撃タイプで最大ダメージ出力\n\n---\n\n## クイックリファレンス要約 📋\n\n```\n═══════════════════════════════════════\n         ヒーロー情報ガイド\n═══════════════════════════════════════\n\n🔵 青レアリティ英雄 (B-Tier、レベル40まで)\n資源:\n✦ ウィロー (鉄)、ルビー (木材)、セレナ (電力)\n✦ ボブ (鉄)、ムサシマル (木材)、ジョー (電力)\n\n🟣 紫レアリティ英雄 (A-Tier、レベル40まで)\nユーティリティ:\n✦ アンドレ (研究)、ビクター (エネルギー/行軍)\n✦ リズ (治療)、バーネット (訓練)\n\n名誉の殿堂:\n✦ ファイター: ファハド\n✦ シューター: セシリア、カイリー\n✦ ライダー: スカーレット、エディ\n\n🟠 オレンジレアリティ英雄 (S-Tier、陣営別)\n\nファイター 🗡️\nユーティリティ: キャサリン \u0026 レックス、ガイ\n戦闘: トリスタン、フランシス、ラン、ノア、アンジェラ\n\nシューター 🏹\nユーティリティ: エヴァンス、メガン\n戦闘: ナターシャ、マーガレット、ダリアン、ローザ、シャドウ\n\nライダー 🐎\nユーティリティ: クイン、コルレオーネ\n戦闘: サイラス、マルシア、カトリーナ、ルーカス、ライアン\n\n═══════════════════════════════════════\n```\n\n---\n\n## 食料最適化戦略 🌾\n\n**トップ5のルール:**\n\n食料効率を最大化するには(食料はヒーローのレベルアップに使用されます)、この戦略に従ってください:\n\n1. **トップ5のヒーローのみに食料を与える** - 編成で使用する最強のヒーローである必要があります\n2. **他のすべてのヒーローには訓練センターを使用** - 訓練センターは食料を消費せずに、他のヒーローのレベルをトップ5に自動的に均等化します\n3. **訓練センターの制限** - 最大15のヒーロースロットが利用可能\n\n**ユーティリティヒーローの例外:**\n\n訓練センターには限られたスペース(15スロット)があるため、**青と紫のユーティリティヒーローを訓練センターの外で手動でレベル40まで育成する必要があります**。これには以下が含まれます:\n- 青い資源ヒーロー (ウィロー、ルビー、セレナ、ボブ、ムサシマル、ジョー)\n- 紫のユーティリティヒーロー (アンドレ、ビクター、リズ、バーネット)\n\nこの戦略は、主要な戦闘ヒーローのための食料を保存しながら、強力なユーティリティバフを維持することを保証します。\n\n---\n\n**覚えておいてください**: ヒーローはあなたの最大の資産です!賢く選択し、戦略的に投資し、荒野を支配するための究極のチームを構築しましょう!\n\n幸運を祈ります、コマンダー! 🦸\n"])</script><script>self.__next_f.push([1,"19:T25dc,"])</script><script>self.__next_f.push([1,"\n# 영웅 정보 가이드 🦸\n\nDarkWar Survival에서 성공하려면 영웅을 이해하는 것이 중요합니다. 이 종합 가이드는 모든 영웅 유형, 특성화 및 게임플레이를 향상시키기 위해 효과적으로 사용하는 방법을 다룹니다.\n\n---\n\n## 파란 등급 영웅 (B-Tier) 🔵\n\n파란 등급 영웅은 **자원 생산 및 채집**에 필수적입니다. 이 영웅들은 3번째 스킬 혜택을 최대화하려면 최소 **레벨 30**까지 레벨을 올려야 합니다.\n\n### 자원 생산 영웅\n\n**윌로우 (Willow)**\n- 특성화: 철 생산 증가\n- 목적: 기지에서 철 생산량 증가\n\n**루비 (Ruby)**\n- 특성화: 목재 생산 증가\n- 목적: 기지에서 목재 생산량 증가\n\n**셀레나 (Selena)**\n- 특성화: 전기 생산 증가\n- 목적: 기지에서 전기 생산량 증가\n\n### 자원 채집 영웅\n\n**밥 (Bob)**\n- 특성화: 철 채집 증가\n- 목적: 필드 타일에서 수집하는 철 증가\n\n**무사시마루 (Musashimaru)**\n- 특성화: 목재 채집 증가\n- 목적: 필드 타일에서 수집하는 목재 증가\n\n**조 (Joe)**\n- 특성화: 전기 채집 증가\n- 목적: 필드 타일에서 수집하는 전기 증가\n\n**중요:** 이 6명의 영웅을 최소 **레벨 40**까지 레벨업하여 4번째 스킬을 잠금 해제하세요. 3번째 스킬(자원 버프)은 레벨 30에 최대화되지만, 레벨 40에 도달하면 편성에 포함될 때 병력 수용량을 증가시키는 4번째 스킬이 잠금 해제되어 전체 유틸리티가 극대화됩니다.\n\n---\n\n## 보라 등급 영웅 (A-Tier) 🟣\n\n보라 등급 영웅은 **유틸리티**와 **전투 지원** 두 가지 카테고리로 나뉩니다.\n\n### 유틸리티 영웅\n\n이 영웅들은 필수 게임플레이 부스트를 제공합니다. 4번째 스킬을 잠금 해제하려면 최소 **레벨 40**까지 레벨업하세요. 3번째 스킬(유틸리티 버프)은 레벨 30에 최대화되지만, 레벨 40에 도달하면 병력 수용량을 증가시키는 4번째 스킬이 잠금 해제되어 편성에서 더 가치 있게 됩니다.\n\n**안드레 (Andre)**\n- 특성화: 연구 속도 증가\n- 우선순위: 높음 - 모든 기술 연구 속도 향상\n\n**빅터 (Victor)**\n- 특성화: 에너지 비용 감소 및 몬스터에 대한 행군 속도 증가\n- 우선순위: 높음 - 효율적인 몬스터 사냥에 필수\n\n**리즈 (Liz)**\n- 특성화: 치료 속도 증가\n- 우선순위: 중간 - 병원 회복 시간 단축\n\n**바넷 (Barnett)**\n- 특성화: 병력 훈련 속도 증가\n- 우선순위: 높음 - 군대 구축 가속\n\n### 전투 지원 영웅 (명예의 전당)\n\n명예의 전당 시스템은 **5성급에 도달한 모든 영웅**이 입장하여 각 진영에 추가 전투 버프를 제공할 수 있습니다. 보라 등급 영웅은 5성으로 획득 및 업그레이드가 쉽기 때문에 이 목적으로 일반적으로 사용됩니다.\n\n**명예의 전당을 위한 일반적인 보라 등급 영웅:**\n\n**파이터 진영:**\n- **파하드 (Farhad)**\n\n**슈터 진영:**\n- **세실리아 (Cecilia)**\n- **카일리 (Kylie)**\n\n**라이더 진영:**\n- **스칼렛 (Scarlett)**\n- **에디 (Eddie)**\n\n**팁:** 명예의 전당 영웅을 레벨업하면 진영의 전투 효과가 증가합니다. 5성급 영웅은 누구나 명예의 전당에 입장할 수 있으며, 이 보라 등급 영웅들은 접근성 때문에 인기 있는 선택일 뿐입니다.\n\n---\n\n## 주황 등급 영웅 (S-Tier) 🟠\n\n주황 등급 영웅은 가장 강력하며 진영과 역할로 나뉩니다.\n\n### 파이터 진영 🗡️\n\n#### 유틸리티 영웅\n\n**캐서린 \u0026 렉스 (Catherine \u0026 Rex)**\n- 특성화: 레이더 임무에서 식량 수확량 증가 및 무료 레이더 작업 수량\n- 사용법: 최대 레이더 임무 효율을 위해 함께 배치\n\n**카이 (Guy)**\n- 특성화: 무료 에너지, 에너지 회복 속도 및 방치 식량 획득 증가\n- 사용법: 시간 경과에 따른 자원 생성에 필수\n\n#### 전투 영웅 (시즌별)\n\n**트리스탄 (Tristan) - 시즌 1**\n- 버프: 파이터 방어력, 파이터 병력 공격력 및 전투 피해 증가\n- 최적화: 강력한 반격을 가진 방어 편성\n\n**프란시스 (Francis) - 시즌 2**\n- 버프: 파이터 체력 및 전투 피해 증가\n- 최적화: 높은 생존력을 가진 탱크 중심 편성\n\n**란 (Lan) - 시즌 3**\n- 버프: 파이터 공격력 및 반격 피해 증가\n- 최적화: 공격적인 반격 전략\n\n**노아 (Noah) - 시즌 4**\n- 버프: 파이터 피해 증가 및 받는 공격 피해 감소\n- 최적화: 균형 잡힌 공격 및 피해 완화\n\n**안젤라 (Angela) - 시즌 5**\n- 버프: 파이터 일반 공격, 반격 및 스킬 피해 증가\n- 최적화: 모든 공격 유형에서 최대 피해량\n\n---\n\n### 슈터 진영 🏹\n\n#### 유틸리티 영웅\n\n**에반스 (Evans)**\n- 특성화: 무료 기어 및 차량 피해 증가\n- 사용법: 기어 파밍 및 차량 기반 공격에 필수\n\n**메간 (Megan)**\n- 특성화: 무료 건설 기간, 건설 속도 증가 및 건설 자원 비용 감소\n- 사용법: 기지 개발 및 건물 업그레이드에 중요\n\n#### 전투 영웅 (시즌별)\n\n**나타샤 (Natasha) - 시즌 1**\n- 버프: 슈터 방어력, 슈터 병력 공격력 및 전투 피해 증가\n- 최적화: 강력한 원거리 화력을 가진 방어 편성\n\n**마가릿 (Margaret) - 시즌 2**\n- 버프: 슈터 체력 및 전투 피해 증가\n- 최적화: 내구성 있는 슈터 편성\n\n**다리안 (Darian) - 시즌 3**\n- 버프: 슈터 공격력 및 병력 스킬 피해 증가\n- 최적화: 스킬 기반 피해 전략\n\n**로사 (Rosa) - 시즌 4**\n- 버프: 슈터 피해 증가 및 반격 피해 감소\n- 최적화: 반격 보호를 가진 공격 편성\n\n**섀도우 (Shadow) - 시즌 5**\n- 버프: 슈터 일반 공격, 반격 및 스킬 피해 증가\n- 최적화: 모든 공격 유형에서 최대 피해량\n\n---\n\n### 라이더 진영 🐎\n\n#### 유틸리티 영웅\n\n**퀸 (Quinn)**\n- 특성화: 훈련 비용 감소, 훈련 속도 증가 및 연맹 대결 포인트 증가\n- 사용법: 군대 구축 및 연맹 이벤트에 필수\n\n**클리앙 (Corleone)**\n- 특성화: 무료 연구 기간, 연구 속도 증가 및 연구 자원 비용 감소\n- 사용법: 기술 발전에 중요\n\n#### 전투 영웅 (시즌별)\n\n**사이러스 (Cyrus) - 시즌 1**\n- 버프: 라이더 방어력, 라이더 병력 공격력 및 전투 피해 증가\n- 최적화: 방어 기병 편성\n\n**마르시아 (Marcia) - 시즌 2**\n- 버프: 라이더 체력 및 전투 피해 증가\n- 최적화: 높은 내구성의 라이더 군대\n\n**카트리나 (Katrina) - 시즌 3**\n- 버프: 라이더 공격력 및 병력 일반 공격 피해 증가\n- 최적화: 기본 공격 중심 전략\n\n**루카스 (Lucas) - 시즌 4**\n- 버프: 라이더 피해 증가 및 받는 스킬 피해 감소\n- 최적화: 스킬 피해 보호를 가진 공격 편성\n\n**라이언 (Ryan) - 시즌 5**\n- 버프: 라이더 일반 공격, 반격 및 스킬 피해 증가\n- 최적화: 모든 공격 유형에서 최대 피해량\n\n---\n\n## 빠른 참조 요약 📋\n\n```\n═══════════════════════════════════════\n         영웅 정보 가이드\n═══════════════════════════════════════\n\n🔵 파란 등급 영웅 (B-Tier, 레벨 40까지)\n자원:\n✦ 윌로우 (철), 루비 (목재), 셀레나 (전기)\n✦ 밥 (철), 무사시마루 (목재), 조 (전기)\n\n🟣 보라 등급 영웅 (A-Tier, 레벨 40까지)\n유틸리티:\n✦ 안드레 (연구), 빅터 (에너지/행군)\n✦ 리즈 (치료), 바넷 (훈련)\n\n명예의 전당:\n✦ 파이터: 파하드\n✦ 슈터: 세실리아, 카일리\n✦ 라이더: 스카렛, 에디\n\n🟠 주황 등급 영웅 (S-Tier, 진영별)\n\n파이터 🗡️\n유틸리티: 캐서린 \u0026 렉스, 가이\n전투: 트리스탄, 프란시스, 란, 노아, 안젤라\n\n슈터 🏹\n유틸리티: 에반스, 메건\n전투: 나타샤, 마가릿, 다리안, 로사, 섀도우\n\n라이더 🐎\n유틸리티: 퀸, 코를레오네\n전투: 사이러스, 마르시아, 카트리나, 루카스, 라이언\n\n═══════════════════════════════════════\n```\n\n---\n\n## 식량 최적화 전략 🌾\n\n**상위 5명 규칙:**\n\n식량 효율을 최대화하려면(식량은 영웅 레벨업에 사용됨) 다음 전략을 따르세요:\n\n1. **상위 5명의 영웅만 먹이기** - 편성에 사용하는 가장 강력한 영웅이어야 합니다\n2. **다른 모든 영웅에 대해 훈련 센터 사용** - 훈련 센터는 식량을 소비하지 않고 다른 영웅의 레벨을 상위 5명과 자동으로 동일하게 만듭니다\n3. **훈련 센터 제한** - 최대 15개의 영웅 슬롯 사용 가능\n\n**유틸리티 영웅 예외:**\n\n훈련 센터는 제한된 공간(15슬롯)을 가지고 있으므로 **파란 등급 및 보라 등급 유틸리티 영웅을 훈련 센터 밖에서 수동으로 레벨 40까지 먹여야 합니다**. 여기에는 다음이 포함됩니다:\n- 파란 등급 자원 영웅 (윌로우, 루비, 셀레나, 밥, 무사시마루, 조)\n- 보라 등급 유틸리티 영웅 (안드레, 빅터, 리즈, 바넷)\n\n이 전략은 주요 전투 영웅을 위한 식량을 보존하면서 강력한 유틸리티 버프를 유지하도록 보장합니다.\n\n---\n\n**기억하세요**: 영웅은 당신의 가장 큰 자산입니다! 현명하게 선택하고, 전략적으로 투자하며, 황무지를 지배할 최고의 팀을 구축하세요!\n\n행운을 빕니다, 커맨더! 🦸\n"])</script><script>self.__next_f.push([1,"1a:T212a,"])</script><script>self.__next_f.push([1,"\n# Hero Information Guide 🦸\n\nUnderstanding your heroes is crucial for success in DarkWar Survival. This comprehensive guide covers all hero types, their specializations, and how to use them effectively to boost your gameplay.\n\n---\n\n## Blue Heroes (B-Tier) 🔵\n\nBlue heroes are essential for **resource production and gathering**. These heroes should be leveled to at least **Level 30** to maximize their 3rd skill benefits.\n\n### Resource Production Heroes\n\n**Willow**\n- Specialization: Iron production boost\n- Purpose: Increases iron output from your base\n\n**Ruby**\n- Specialization: Wood production boost\n- Purpose: Increases wood output from your base\n\n**Selena**\n- Specialization: Electricity production boost\n- Purpose: Increases electricity output from your base\n\n### Resource Gathering Heroes\n\n**Bob**\n- Specialization: Iron gathering boost\n- Purpose: Increases iron collected from field tiles\n\n**Musashimaru**\n- Specialization: Wood gathering boost\n- Purpose: Increases wood collected from field tiles\n\n**Joe**\n- Specialization: Electricity gathering boost\n- Purpose: Increases electricity collected from field tiles\n\n**Important:** Level these 6 heroes to at least **Level 40** to unlock their 4th skills. While their 3rd skills (resource buffs) max out at Level 30, reaching Level 40 unlocks the 4th skill which increases unit capacity when included in formations, maximizing their overall utility.\n\n---\n\n## Purple Heroes (A-Tier) 🟣\n\nPurple heroes split into two categories: **Utility** and **Combat Support**.\n\n### Utility Heroes\n\nThese heroes provide essential gameplay boosts. Level them to at least **Level 40** to unlock their 4th skills. While their 3rd skills (utility buffs) max out at Level 30, reaching Level 40 unlocks the 4th skill which increases unit capacity, making them more valuable in formations.\n\n**Andre**\n- Specialization: Research speed boost\n- Priority: High - Speeds up all technology research\n\n**Victor**\n- Specialization: Energy cost reduction and march speed boost against monsters\n- Priority: High - Essential for efficient monster hunting\n\n**Liz**\n- Specialization: Healing speed boost\n- Priority: Medium - Reduces hospital recovery time\n\n**Barnett**\n- Specialization: Troop training speed boost\n- Priority: High - Accelerates army building\n\n### Combat Support Heroes (Hall of Fame)\n\nThe Hall of Fame system allows **any hero who has reached 5-star level** to enter and provide additional combat buffs to their respective faction. Purple heroes are commonly used for this purpose as they're easier to obtain and upgrade to 5 stars.\n\n**Common Purple Heroes for Hall of Fame:**\n\n**Fighter Faction:**\n- **Farhad**\n\n**Shooter Faction:**\n- **Cecilia**\n- **Kylie**\n\n**Rider Faction:**\n- **Scarlett**\n- **Eddie**\n\n**Tip:** Leveling up Hall of Fame heroes increases your faction's combat effectiveness. Any 5-star hero can enter the Hall of Fame—these purple heroes are just popular choices due to accessibility.\n\n---\n\n## Orange Heroes (S-Tier) 🟠\n\nOrange heroes are the most powerful and are divided by faction and role.\n\n### Fighter Faction 🗡️\n\n#### Utility Heroes\n\n**Catherine \u0026 Rex**\n- Specialization: Food yield boost in radar missions and free radar task quantity\n- Usage: Deploy together for maximum radar mission efficiency\n\n**Guy**\n- Specialization: Free energy, energy recovery speed, and idle food gain boost\n- Usage: Essential for resource generation over time\n\n#### Combat Heroes (By Season)\n\n**Tristan (Season 1)**\n- Buffs: Fighter defense, fighter troop attack, and battle damage boost\n- Best For: Defensive formations with strong counterattacks\n\n**Francis (Season 2)**\n- Buffs: Fighter HP and battle damage boost\n- Best For: Tank-focused formations with high survivability\n\n**Lan (Season 3)**\n- Buffs: Fighter attack and counterattack damage boost\n- Best For: Aggressive counterattack strategies\n\n**Noah (Season 4)**\n- Buffs: Fighter damage boost and reduces attack damage taken\n- Best For: Balanced offense and damage mitigation\n\n**Angela (Season 5)**\n- Buffs: Fighter normal attacks, counterattacks, and skill damage boost\n- Best For: Maximum damage output across all attack types\n\n---\n\n### Shooter Faction 🏹\n\n#### Utility Heroes\n\n**Evans**\n- Specialization: Free gears and vehicle damage boost\n- Usage: Essential for gear farming and vehicle-based attacks\n\n**Megan**\n- Specialization: Free construction duration, construction speed boost, and construction resource cost reduction\n- Usage: Critical for base development and building upgrades\n\n#### Combat Heroes (By Season)\n\n**Natasha (Season 1)**\n- Buffs: Shooter defense, shooter troop attack, and battle damage boost\n- Best For: Defensive formations with strong ranged power\n\n**Margaret (Season 2)**\n- Buffs: Shooter HP and battle damage boost\n- Best For: Durable shooter formations\n\n**Darian (Season 3)**\n- Buffs: S  Best For: Basic attack-focused strategies\n\n**Lucas (Season 4)**\n- Buffs: Rider damage boost at binabawasan ang skill damage taken\n- Best For: Offensive formations na may skill damage protection\n\n**Ryan (Season 5)**\n- Buffs: Rider normal attacks, counterattacks, at skill damage boost\n- Best For: Maximum damage output across all attack types\n\n---\n\n## Quick Reference Summary 📋\n\n```\n═══════════════════════════════════════\n         HERO INFORMATION GUIDE\n═══════════════════════════════════════\n\n🔵 BLUE HEROES (B-Tier, Level to 40)\nResources:\n✦ Willow (Iron), Ruby (Wood), Selena (Electricity)\n✦ Bob (Iron), Musashimaru (Wood), Joe (Electricity)\n\n🟣 PURPLE HEROES (A-Tier, Level to 40)\nUtility:\n✦ Andre (Research), Victor (Energy/March)\n✦ Liz (Healing), Barnett (Training)\n\nHall of Fame:\n✦ Fighter: Farhad\n✦ Shooter: Cecilia, Kylie\n✦ Rider: Scarlett, Eddie\n\n🟠 ORANGE HEROES (S-Tier, By Faction)\n\nFIGHTER 🗡️\nUtility: Catherine \u0026 Rex, Guy\nCombat: Tristan, Francis, Lan, Noah, Angela\n\nSHOOTER 🏹\nUtility: Evans, Megan\nCombat: Natasha, Margaret, Darian, Rosa, Shadow\n\nRIDER 🐎\nUtility: Quinn, Corleone\nCombat: Cyrus, Marcia, Katrina, Lucas, Ryan\n\n═══════════════════════════════════════\n```\n\n---\n\n## Food Optimization Strategy 🌾\n\n**The Top 5 Rule:**\n\nPara ma-maximize ang food efficiency (food ay ginagamit para i-level up ang heroes), sundin ang strategy na ito:\n\n1. **Feed lang ang top 5 heroes mo** - Dapat ang pinaka-strongest heroes mo na ginagamit sa formations\n2. **Gamitin ang Training Center para sa lahat ng ibang heroes** - Ang Training Center ay automatic na nag-e-equalize ng level ng ibang heroes para tumugma sa top 5 mo nang hindi gumagastos ng food\n3. **Training Center limitation** - Maximum 15 hero slots available lang\n\n**Exception para sa Utility Heroes:**\n\nDahil ang Training Center ay may limited space (15 slots), dapat mong **manually feed ang Blue at Purple utility heroes to Level 40** outside ng Training Center. Kasama dito:\n- Blue resource heroes (Willow, Ruby, Selena, Bob, Musashimaru, Joe)\n- Purple utility heroes (Andre, Victor, Liz, Barnett)\n\nAng strategy na ito ay nagsisiguro na nag-maintain ka ng strong utility buffs habang nag-preserve ng food para sa main combat heroes mo.\n\n---\n\n**Remember**: Ang heroes ay greatest asset mo! Pumili nang matalino, mag-invest strategically, at bumuo ng ultimate team para sa dominance sa wasteland!\n\nGood luck, Commander! 🦸\n"])</script><script>self.__next_f.push([1,"1c:T1fbd,"])</script><script>self.__next_f.push([1,"\n# 英雄信息指南 🦸\n\n在DarkWar Survival中取得成功,理解你的英雄至关重要。本综合指南涵盖所有英雄类型、专业化以及如何有效使用它们来提升你的游戏玩法。\n\n---\n\n## 蓝色稀有度英雄 (B-Tier) 🔵\n\n蓝色稀有度英雄对于**资源生产和采集**至关重要。这些英雄应该升级到至少**30级**以最大化其第3技能收益。\n\n### 资源生产英雄\n\n**薇洛 (Willow)**\n- 专业化: 铁矿生产加成\n- 用途: 增加基地的铁矿产出\n\n**露比 (Ruby)**\n- 专业化: 木材生产加成\n- 用途: 增加基地的木材产出\n\n**塞莱娜 (Selena)**\n- 专业化: 电力生产加成\n- 用途: 增加基地的电力产出\n\n### 资源采集英雄\n\n**鲍勃 (Bob)**\n- 专业化: 铁矿采集加成\n- 用途: 增加从野外地块收集的铁矿\n\n**武藏丸 (Musashimaru)**\n- 专业化: 木材采集加成\n- 用途: 增加从野外地块收集的木材\n\n**乔 (Joe)**\n- 专业化: 电力采集加成\n- 用途: 增加从野外地块收集的电力\n\n**重要:** 将这6个英雄至少升级到**40级**以解锁第4技能。虽然第3技能(资源增益)在30级达到最大,但达到40级会解锁第4技能,该技能在编入队伍时增加部队容量,最大化其整体实用性。\n\n---\n\n## 紫色稀有度英雄 (A-Tier) 🟣\n\n紫色稀有度英雄分为两类:**实用型**和**战斗支援**。\n\n### 实用型英雄\n\n这些英雄提供必要的游戏增益。将它们升级到至少**40级**以解锁第4技能。虽然第3技能(实用增益)在30级达到最大,但达到40级会解锁增加部队容量的第4技能,使它们在编队中更有价值。\n\n**安德烈 (Andre)**\n- 专业化: 研究速度加成\n- 优先级: 高 - 加速所有科技研究\n\n**维克多 (Victor)**\n- 专业化: 能量成本降低和对怪物的行军速度加成\n- 优先级: 高 - 高效猎怪的必备英雄\n\n**莉兹 (Liz)**\n- 专业化: 治疗速度加成\n- 优先级: 中 - 减少医院恢复时间\n\n**巴内特 (Barnett)**\n- 专业化: 部队训练速度加成\n- 优先级: 高 - 加速军队建设\n\n### 战斗支援英雄 (名誉殿堂)\n\n名誉殿堂系统允许**任何达到5星级的英雄**进入并为各自的兵种提供额外的战斗增益。紫色英雄因为更容易获得和升级到5星而通常用于此目的。\n\n**常用的名誉殿堂紫色英雄:**\n\n**战士兵种:**\n- **法哈德 (Farhad)**\n\n**射手兵种:**\n- **塞西莉亚 (Cecilia)**\n- **凯莉 (Kylie)**\n\n**骑兵兵种:**\n- **斯嘉丽 (Scarlett)**\n- **艾迪 (Eddie)**\n\n**提示:** 升级名誉殿堂英雄会提高你兵种的战斗效果。任何5星英雄都可以进入名誉殿堂——这些紫色英雄只是因为易获得性而成为热门选择。\n\n---\n\n## 橙色稀有度英雄 (S-Tier) 🟠\n\n橙色英雄是最强大的,按兵种和角色划分。\n\n### 战士兵种 🗡️\n\n#### 实用型英雄\n\n**凯瑟琳 \u0026 雷克斯 (Catherine \u0026 Rex)**\n- 专业化: 雷达任务中的食物收获加成和免费雷达任务数量\n- 用途: 一起部署以实现最大雷达任务效率\n\n**盖伊 (Guy)**\n- 专业化: 免费能量、能量恢复速度和闲置食物获得加成\n- 用途: 随时间推移的资源生成必备\n\n#### 战斗英雄 (按赛季)\n\n**特里斯坦 (Tristan) - 赛季1)**\n- 增益: 战士防御、战士部队攻击和战斗伤害加成\n- 最适合: 具有强大反击的防御阵型\n\n**弗朗西斯 (Francis) - 赛季2)**\n- 增益: 战士生命值和战斗伤害加成\n- 最适合: 以坦克为中心的高生存力阵型\n\n**兰 (Lan) - 赛季3)**\n- 增益: 战士攻击和反击伤害加成\n- 最适合: 进攻性反击策略\n\n**诺亚 (Noah) - 赛季4)**\n- 增益: 战士伤害加成并减少受到的攻击伤害\n- 最适合: 平衡的进攻和伤害缓解\n\n**安吉拉 (Angela) - 赛季5)**\n- 增益: 战士普通攻击、反击和技能伤害加成\n- 最适合: 所有攻击类型的最大伤害输出\n\n---\n\n### 射手兵种 🏹\n\n#### 实用型英雄\n\n**埃文斯 (Evans)**\n- 专业化: 免费装备和车辆伤害加成\n- 用途: 装备农场和基于车辆的攻击必备\n\n**梅根 (Megan)**\n- 专业化: 免费建设时间、建设速度加成和建设资源成本降低\n- 用途: 对基地发展和建筑升级至关重要\n\n#### 战斗英雄 (按赛季)\n\n**娜塔莎 (Natasha) - 赛季1)**\n- 增益: 射手防御、射手部队攻击和战斗伤害加成\n- 最适合: 具有强大远程火力的防御阵型\n\n**玛格丽特 (Margaret) - 赛季2)**\n- 增益: 射手生命值和战斗伤害加成\n- 最适合: 持久的射手阵型\n\n**达里安 (Darian) - 赛季3)**\n- 增益: 射手攻击和部队技能伤害加成\n- 最适合: 基于技能的伤害策略\n\n**罗莎 (Rosa) - 赛季4)**\n- 增益: 射手伤害加成并减少反击伤害\n- 最适合: 具有反击保护的进攻阵型\n\n**暗影 (Shadow) - 赛季5)**\n- 增益: 射手普通攻击、反击和技能伤害加成\n- 最适合: 所有攻击类型的最大伤害输出\n\n---\n\n### 骑兵兵种 🐎\n\n#### 实用型英雄\n\n**奎因 (Quinn)**\n- 专业化: 降低训练成本、训练速度加成和联盟对决积分加成\n- 用途: 军队建设和联盟活动必备\n\n**科里昂 (Corleone)**\n- 专业化: 免费研究时间、研究速度加成和研究资源成本降低\n- 用途: 对技术进步至关重要\n\n#### 战斗英雄 (按赛季)\n\n**塞勒斯 (Cyrus) - 赛季1)**\n- 增益: 骑兵防御、骑兵部队攻击和战斗伤害加成\n- 最适合: 防御性骑兵阵型\n\n**玛西娅 (Marcia) - 赛季2)**\n- 增益: 骑兵生命值和战斗伤害加成\n- 最适合: 高耐久性的骑兵军队\n\n**卡特琳娜 (Katrina) - 赛季3)**\n- 增益: 骑兵攻击和部队普通攻击伤害加成\n- 最适合: 基本攻击为中心的策略\n\n**卢卡斯 (Lucas) - 赛季4)**\n- 增益: 骑兵伤害加成并减少受到的技能伤害\n- 最适合: 具有技能伤害保护的进攻阵型\n\n**瑞安 (Ryan) - 赛季5)**\n- 增益: 骑兵普通攻击、反击和技能伤害加成\n- 最适合: 所有攻击类型的最大伤害输出\n\n---\n\n## 快速参考总结 📋\n\n```\n═══════════════════════════════════════\n         英雄信息指南\n═══════════════════════════════════════\n\n🔵 蓝色稀有度英雄 (B-Tier,升至40级)\n资源:\n✦ 薇洛 (铁矿)、露比 (木材)、塞莱娜 (电力)\n✦ 鲍勃 (铁矿)、武藏丸 (木材)、乔 (电力)\n\n🟣 紫色稀有度英雄 (A-Tier,升至40级)\n实用型:\n✦ 安德烈 (研究)、维克多 (能量/行军)\n✦ 莉兹 (治疗)、巴内特 (训练)\n\n名誉殿堂:\n✦ 战士: 法哈德\n✦ 射手: 塞西莉亚、凯莉\n✦ 骑兵: 斯嘉丽、艾迪\n\n🟠 橙色稀有度英雄 (S-Tier,按兵种)\n\n战士 🗡️\n实用型: 凯瑟琳 \u0026 雷克斯、盖伊\n战斗: 特里斯坦、弗朗西斯、兰、诺亚、安吉拉\n\n射手 🏹\n实用型: 埃文斯、梅根\n战斗: 娜塔莎、玛格丽特、达里安、罗莎、暗影\n\n骑兵 🐎\n实用型: 奎因、科里昂\n战斗: 塞勒斯、玛西娅、卡特琳娜、卢卡斯、瑞安\n\n═══════════════════════════════════════\n```\n\n---\n\n## 食物优化策略 🌾\n\n**前5名法则:**\n\n要最大化食物效率(食物用于英雄升级),遵循此策略:\n\n1. **只喂养前5名英雄** - 应该是你在编队中使用的最强英雄\n2. **对所有其他英雄使用训练中心** - 训练中心自动将其他英雄的等级均衡到前5名,无需消耗食物\n3. **训练中心限制** - 最多可用15个英雄位\n\n**实用型英雄例外:**\n\n由于训练中心空间有限(15个位置),你应该**手动喂养蓝色和紫色实用型英雄到40级**,不使用训练中心。包括:\n- 蓝色资源英雄 (薇洛、露比、塞莱娜、鲍勃、武藏丸、乔)\n- 紫色实用型英雄 (安德烈、维克多、莉兹、巴内特)\n\n此策略确保你在为主要战斗英雄保留食物的同时,保持强大的实用增益。\n\n---\n\n**记住**: 英雄是你最大的资产!明智选择,战略投资,打造终极团队以主宰荒野!\n\n祝你好运,指挥官! 🦸\n"])</script><script>self.__next_f.push([1,"1d:T198c,"])</script><script>self.__next_f.push([1,"\n# تحسين قوة القوات الأولى ⚔️\n\nتعظيم قوتك القتالية يتطلب التركيز على أربعة مجالات رئيسية: **كمية القوات**، **جودة القوات**، **التعزيزات**، **تحسين الطعام**. اتبع هذه الاستراتيجيات الأساسية لبناء أقوى جيش ممكن.\n\n---\n\n## 1. كمية القوات (Quantity of Units) 🏰\n\nزد العدد الإجمالي للقوات التي يمكنك نشرها:\n\n### الإجراءات الرئيسية\n\n**ترقية المركز العسكري**\n  - يزيد مباشرة من قدرة قواتك\n\n**بحث زيادة سعة القوات**\n  - موجود في مركز البحث\n  - كل مستوى يزيد من السعة القصوى للقوات\n\n**ترقية معدات الأبطال البرتقالية بنوى الطاقة**\n  - استخدم نوى الطاقة لترقية المعدات الأسطورية (البرتقالية)\n  - توفر مكافآت إضافية لسعة القوات\n\n**رفع مستويات نجوم الأبطال**\n  - زد تصنيفات نجوم الأبطال\n  - المستويات النجمية الأعلى تعزز سعة القوات\n\n---\n\n## 2. جودة القوات (Quality of Units) 🎯\n\nركز أبحاثك لتعظيم الفعالية:\n\n### قاعدة التخصص\n\n**ابحث فقط لفصيل رئيسي واحد:**\n- المقاتل\n- الرامي\n- الراكب\n\n**لا تبحث جميع الفصائل بالتساوي.** اختر فصيلك الرئيسي وكرس كل الأبحاث العسكرية لذلك الفصيل الواحد للحصول على أقصى قوة.\n\n---\n\n## 3. التعزيزات (Buffs) 💪\n\nضاعف قوتك القتالية بالتعزيزات الاستراتيجية:\n\n### معدات الأبطال البرتقالية\n\n**معدات الأبطال توفر مكافآت لهجوم القوات وسعة القوات**\n- ركز فقط على معدات أفضل 5 أبطال رئيسيين لتحسين استخدام نوى الطاقة والبلورات الزرقاء\n\n### الأسلحة الحصرية\n\n**الأسلحة الحصرية توفر مكافآت لهجوم القوات (DMG) وصحة القوات (HP)**\n- استخدم دائمًا الأبطال الذين لديهم أسلحة حصرية في تشكيلتك\n\n### تعظيم المهارة الثالثة\n\nالأبطال التاليون لديهم تعزيزات قوية متعلقة بالقوات في مهاراتهم الثالثة:\n\n**فصيل المقاتل:**\n- **تريستان**\n- **فرانسيس**\n- **لان**\n\n**فصيل الرامي:**\n- **ناتاشا**\n- **مارغريت**\n- **داريان**\n\n**فصيل الراكب:**\n- **سايروس**\n- **مارسيا**\n- **كاترينا**\n\n**الأولوية:** عظّم مستويات المهارة الثالثة لهؤلاء الأبطال إلى أعلى مستوى ممكن.\n\n### مناصب العاصمة\n\n**استخدم المناصب العاصمة مثل المارشال الأعلى لتعظيم CP مؤقتًا**\n- قدم لهذه المناصب قبل المعارك أو الأحداث المهمة\n\n---\n\n## 4. تحسين الطعام (Food Optimization) 🌾\n\nأدر الطعام بكفاءة لتعظيم قوة الأبطال:\n\n### قاعدة أفضل 5\n\n**أطعم فقط أفضل 5 أبطال لديك**\n- لا تضيع الطعام على الأبطال خارج أفضل 5 لديك\n\n### مركز التدريب\n\n**استخدم مركز التدريب لمساواة مستويات الأبطال الآخرين بأفضل 5 أبطال لديك**\n- هذا يسمح لك بأن يكون لديك العديد من الأبطال في مستويات تنافسية دون إطعامهم جميعًا\n\n### حدود مستوى الأبطال حسب الندرة\n\n**الأبطال الأزرق (نادر):**\n- أطعم فقط حتى **المستوى 40**\n- توقف عن الترقية عند 40\n\n**الأبطال الأرجوانية (ملحمي):**\n- أطعم الأبطال الأرجوانية المفيدة فقط حتى **المستوى 40**\n- مثال: أندريه\n- لا يستحق استثمار الطعام بعد المستوى 40\n\n### استخراج الطعام\n\n**يمكنك استخراج الطعام الذي تم إطعامه للأبطال في مركز التدريب**\n- يسمح لك باسترداد الطعام من الأبطال الذين لم تعد تستخدمهم\n- استخدم هذا لإعادة تخصيص الموارد لأبطال أفضل\n\n---\n\n## ملخص مرجعي سريع 📋\n\n```\n═══════════════════════════════════════\n        تحسين قوة القوات\n═══════════════════════════════════════\n\n1️⃣ الكمية\n✦ ترقية المركز العسكري\n✦ بحث زيادة سعة القوات\n✦ ترقية المعدات البرتقالية بنوى الطاقة\n✦ رفع مستويات نجوم الأبطال\n\n2️⃣ الجودة\n✦ اختر فصيل واحد (المقاتل/الرامي/الراكب)\n✦ ابحث فقط فصيلك الرئيسي\n\n3️⃣ التعزيزات\n✦ ترقية والتركيز على معدات أفضل 5 أبطال البرتقالية\n✦ استخدم الأبطال بالأسلحة الحصرية\n✦ عظّم مستويات المهارة الثالثة:\n  - المقاتل: تريستان، فرانسيس، لان\n  - الرامي: ناتاشا، مارغريت، داريان\n  - الراكب: سايروس، مارسيا، كاترينا\n✦ استخدم مناصب العاصمة (المارشال الأعلى)\n\n4️⃣ تحسين الطعام\n✦ أطعم فقط أفضل 5 أبطال\n✦ استخدم مركز التدريب لمساواة الآخرين\n✦ الأبطال الأزرق: حد عند المستوى 40\n✦ الأبطال الأرجوانية: حد عند المستوى 40 (مثال: أندريه)\n✦ استخرج الطعام من الأبطال غير المستخدمة\n\n═══════════════════════════════════════\n```\n\n---\n\n**تذكر**: ركز على فصيل واحد، استثمر في أفضل أبطالك، واستخدم كل تعزيز متاح. هذه المبادئ الأساسية ستعظم فعاليتك القتالية!\n\nحظ سعيد، أيها الناجي! ⚔️\n"])</script><script>self.__next_f.push([1,"1e:T126d,"])</script><script>self.__next_f.push([1,"\n# Optimasi Kekuatan Pasukan Utama ⚔️\n\nMemaksimalkan kekuatan tempur Anda memerlukan fokus pada empat area utama: **Jumlah Pasukan**, **Kualitas Pasukan**, **Buff**, dan **Optimasi Makanan**. Ikuti strategi penting ini untuk membangun pasukan terkuat.\n\n---\n\n## 1. Jumlah Pasukan (Quantity of Units) 🏰\n\nTingkatkan jumlah total pasukan yang dapat Anda kirim ke pertempuran:\n\n### Tindakan Utama\n\n**Upgrade Military Center**\n  - Langsung meningkatkan kapasitas pasukan Anda\n\n**Riset Peningkatan Kapasitas Pasukan**\n  - Ditemukan di Research Center\n  - Setiap level meningkatkan kapasitas pasukan maksimum\n\n**Promosikan Equipment Hero Orange dengan Power Core**\n  - Gunakan power core untuk upgrade equipment legendaris (orange)\n  - Memberikan bonus kapasitas pasukan tambahan\n\n**Naikkan Level Bintang Hero**\n  - Tingkatkan rating bintang hero\n  - Level bintang yang lebih tinggi meningkatkan kapasitas pasukan\n\n---\n\n## 2. Kualitas Pasukan (Quality of Units) 🎯\n\nFokuskan riset Anda untuk memaksimalkan efektivitas:\n\n### Aturan Spesialisasi\n\n**Riset hanya untuk SATU faksi utama:**\n- Fighter\n- Shooter\n- Rider\n\n**JANGAN riset semua faksi secara merata.** Pilih faksi utama Anda dan dedikasikan semua riset militer untuk faksi tunggal itu untuk kekuatan maksimum.\n\n---\n\n## 3. Buff 💪\n\nGandakan kekuatan tempur Anda dengan buff strategis:\n\n### Equipment Hero Orange\n\n**Equipment Hero memberikan bonus Troop DMG dan Troop Capacity**\n- Fokus hanya pada equipment 5 hero utama untuk mengoptimalkan penggunaan power core dan blue crystal\n\n### Senjata Eksklusif\n\n**Senjata eksklusif memberikan bonus Troop DMG dan Troop HP**\n- Selalu gunakan hero yang memiliki senjata eksklusif dalam formasi Anda\n\n### Maksimalkan Skill ke-3\n\nHero berikut memiliki buff terkait pasukan yang kuat di skill ke-3 mereka:\n\n**Faksi Fighter:**\n- **Tristan**\n- **Francis**\n- **Lan**\n\n**Faksi Shooter:**\n- **Natasha**\n- **Margaret**\n- **Darian**\n\n**Faksi Rider:**\n- **Sirus**\n- **Marcia**\n- **Katrina**\n\n**Prioritas:** Maksimalkan level skill ke-3 hero-hero ini ke level tertinggi yang memungkinkan.\n\n### Jabatan Ibu Kota\n\n**Gunakan posisi ibu kota seperti Marsekal Agung untuk memaksimalkan CP sementara**\n- Ajukan untuk jabatan ini sebelum pertempuran atau event penting\n\n---\n\n## 4. Optimasi Makanan (Food Optimization) 🌾\n\nKelola makanan secara efisien untuk memaksimalkan kekuatan hero:\n\n### Aturan Top 5\n\n**Hanya beri makan 5 hero teratas Anda**\n- Jangan buang makanan untuk hero di luar 5 utama Anda\n\n### Training Center\n\n**Gunakan Training Center untuk menyamakan level hero lain dengan 5 hero teratas Anda**\n- Ini memungkinkan Anda memiliki banyak hero di level kompetitif tanpa memberi makan semuanya\n\n### Batas Level Hero Berdasarkan Rarity\n\n**Hero Blue (Rare):**\n- Beri makan hanya sampai **Level 40**\n- Berhenti leveling di 40\n\n**Hero Purple (Epic):**\n- Beri makan hero purple yang berguna hanya sampai **Level 40**\n- Contoh: Andre\n- Tidak worth menginvestasikan makanan melebihi level 40\n\n### Ekstraksi Makanan\n\n**Anda dapat mengekstrak makanan yang telah diberikan ke hero di Training Center**\n- Memungkinkan Anda untuk memulihkan makanan dari hero yang tidak lagi Anda gunakan\n- Gunakan ini untuk mengalokasikan kembali sumber daya ke hero yang lebih baik\n\n---\n\n## Ringkasan Referensi Cepat 📋\n\n```\n═══════════════════════════════════════\n     OPTIMASI KEKUATAN PASUKAN\n═══════════════════════════════════════\n\n1️⃣ JUMLAH\n✦ Upgrade Military Center\n✦ Riset Peningkatan Kapasitas Pasukan\n✦ Promosikan equipment orange dengan power core\n✦ Naikkan level bintang hero\n\n2️⃣ KUALITAS\n✦ Pilih SATU faksi (Fighter/Shooter/Rider)\n✦ Riset HANYA faksi utama Anda\n\n3️⃣ BUFF\n✦ Upgrade dan fokus pada equipment orange 5 hero teratas\n✦ Gunakan hero dengan senjata eksklusif\n✦ Maksimalkan level skill ke-3:\n  - Fighter: Tristan, Francis, Lan\n  - Shooter: Natasha, Margaret, Darian\n  - Rider: Sirus, Marcia, Katrina\n✦ Gunakan jabatan ibu kota (Marsekal Agung)\n\n4️⃣ OPTIMASI MAKANAN\n✦ Beri makan HANYA 5 hero teratas\n✦ Gunakan Training Center untuk menyamakan yang lain\n✦ Hero blue: Batas di level 40\n✦ Hero purple: Batas di level 40 (contoh: Andre)\n✦ Ekstrak makanan dari hero yang tidak digunakan\n\n═══════════════════════════════════════\n```\n\n---\n\n**Ingat**: Fokus pada satu faksi, investasi pada hero terbaik Anda, dan gunakan setiap buff yang tersedia. Prinsip-prinsip inti ini akan memaksimalkan efektivitas tempur Anda!\n\nSemoga beruntung, Survivor! ⚔️\n"])</script><script>self.__next_f.push([1,"1f:T1554,"])</script><script>self.__next_f.push([1,"\n# 1軍戦闘力最適化 ⚔️\n\n戦闘力を最大化するには、4つの重要な領域に集中する必要があります：**部隊数量**、**部隊品質**、**バフ**、**食料最適化**。これらの必須戦略に従って最強の軍隊を構築しましょう。\n\n---\n\n## 1. 部隊数量（Quantity of Units）🏰\n\n出撃可能な部隊の総数を増やす：\n\n### 主要行動\n\n**軍事センターをアップグレード**\n  - 部隊収容力を直接増加させます\n\n**部隊収容力増加の研究**\n  - 研究センターで実施\n  - 各レベルごとに最大部隊収容力が増加します\n\n**パワーコアでオレンジ英雄装備を昇格**\n  - パワーコアを使用して伝説（オレンジ）装備をアップグレード\n  - 追加の部隊収容力ボーナスを提供\n\n**英雄の星レベルを上げる**\n  - 英雄の星評価を上げる\n  - 高い星レベルは部隊収容力を増加させます\n\n---\n\n## 2. 部隊品質（Quality of Units）🎯\n\n効率性を最大化するために研究に集中：\n\n### 専門化の法則\n\n**1つの主力兵種のみ研究する：**\n- ファイター\n- シューター\n- ライダー\n\n**すべての兵種を均等に研究しないでください。** 主力兵種を選択し、すべての軍事研究をその単一兵種に集中して最大の戦闘力を得ましょう。\n\n---\n\n## 3. バフ（Buffs）💪\n\n戦略的バフで戦闘力を倍増：\n\n### オレンジ英雄装備\n\n**英雄装備は部隊攻撃力と部隊収容力ボーナスを提供します**\n- パワーコアとブルークリスタルの使用を最適化するために、トップ5の主力英雄の装備のみに集中\n\n### 専用武器\n\n**専用武器は部隊攻撃力（DMG）と部隊体力（HP）ボーナスを提供します**\n- 常に専用武器を持つ英雄を編成に使用してください\n\n### 3番目スキルの最大化\n\n以下の英雄は3番目スキルに強力な部隊関連バフを持っています：\n\n**ファイター兵種：**\n- **トリスタン**\n- **フランシス**\n- **ラン**\n\n**シューター兵種：**\n- **ナターシャ**\n- **マーガレット**\n- **ダリアン**\n\n**ライダー兵種：**\n- **サイラス**\n- **マルシア**\n- **カトリーナ**\n\n**優先順位：** これらの英雄の3番目スキルレベルを可能な限り最高レベルまで最優先で上げてください。\n\n### 首都官職\n\n**大元帥などの首都官職を活用して戦闘力（CP）を一時的に最大化**\n- 重要な戦闘やイベントの前にこれらの官職に申請してください\n\n---\n\n## 4. 食料最適化（Food Optimization）🌾\n\n食料を効率的に管理して英雄の力を最大化：\n\n### トップ5の法則\n\n**トップ5の英雄にのみ食料を集中投資**\n- 主力5名以外の英雄に食料を無駄にしないでください\n\n### 訓練センター\n\n**訓練センターを使用して他の英雄のレベルをトップ5と同じにする**\n- すべての英雄に食料を与えずに競争力のあるレベルを維持できます\n\n### レアリティ別英雄レベル制限\n\n**青レアリティ英雄（レア）：**\n- **レベル40まで**のみ育成\n- 40でレベルアップを停止\n\n**紫レアリティ英雄（エピック）：**\n- 有用な紫レアリティ英雄のみ**レベル40まで**育成\n- 例：アンドレ\n- レベル40以上に食料を投資する価値はありません\n\n### 食料回収\n\n**訓練センターで英雄に投入した食料を回収できます**\n- もう使用しない英雄から食料を回収できます\n- より良い英雄にリソースを再配分するために使用してください\n\n---\n\n## クイックリファレンス要約 📋\n\n```\n═══════════════════════════════════════\n        1軍戦闘力最適化\n═══════════════════════════════════════\n\n1️⃣ 部隊数量\n✦ 軍事センターをアップグレード\n✦ 部隊収容力増加の研究\n✦ パワーコアでオレンジ装備を昇格\n✦ 英雄の星レベルを上げる\n\n2️⃣ 部隊品質\n✦ 1つの兵種を選択（ファイター/シューター/ライダー）\n✦ 主力兵種のみ研究\n\n3️⃣ バフ\n✦ トップ5英雄のオレンジ装備をアップグレードして集中\n✦ 専用武器を持つ英雄を使用\n✦ 3番目スキルレベルを最大化：\n  - ファイター：トリスタン、フランシス、ラン\n  - シューター：ナターシャ、マーガレット、ダリアン\n  - ライダー：サイラス、マルシア、カトリーナ\n✦ 首都官職を活用（大元帥）\n\n4️⃣ 食料最適化\n✦ トップ5英雄にのみ食料を投資\n✦ 訓練センターで他の英雄レベルを均等化\n✦ 青英雄：レベル40制限\n✦ 紫英雄：レベル40制限（例：アンドレ）\n✦ 未使用英雄から食料を回収\n\n═══════════════════════════════════════\n```\n\n---\n\n**覚えておいてください**：1つの兵種に集中し、最高の英雄に投資し、利用可能なすべてのバフを活用してください。これらの核心原則があなたの戦闘効率を最大化します！\n\n幸運を祈ります、生存者！ ⚔️\n"])</script><script>self.__next_f.push([1,"20:T1462,"])</script><script>self.__next_f.push([1,"\n# 1군 전투력 최적화 ⚔️\n\n전투력을 극대화하려면 네 가지 핵심 영역에 집중해야 합니다: **병력 수량**, **병력 품질**, **버프**, **식량 최적화**. 이 필수 전략들을 따라 최강의 군대를 구축하세요.\n\n---\n\n## 1. 병력 수량 (Quantity of Units) 🏰\n\n출격 가능한 병력의 총 수를 늘리세요:\n\n### 주요 행동\n\n- **군사 센터 업그레이드**\n  - 병력 수용량을 직접적으로 증가시킵니다\n\n- **병력 수용량 증가 연구**\n  - 연구 센터에서 진행\n  - 각 레벨마다 최대 병력 수용량이 증가합니다\n\n- **에너지 코어로 주황 영웅 장비 승급**\n  - 에너지 코어를 사용하여 전설(주황) 장비를 업그레이드\n  - 추가 병력 수용량 보너스 제공\n\n- **영웅 성급(★) 상승**\n  - 영웅 성급 등급 증가\n  - 높은 성급은 병력 수용량을 증가시킵니다\n\n---\n\n## 2. 병력 품질 (Quality of Units) 🎯\n\n효율성을 극대화하기 위해 연구에 집중하세요:\n\n### 특화 법칙\n\n**단 하나의 주력 병종에 대해서만 연구하세요:**\n- 파이터\n- 슈터\n- 라이더\n\n**모든 병종을 균등하게 연구하지 마세요.** 주력 병종을 선택하고 모든 군사 연구를 그 단일 병종에 집중하여 최대 전투력을 얻으세요.\n\n---\n\n## 3. 버프 (Buffs) 💪\n\n전략적 버프로 전투력을 배가시키세요:\n\n### 주황 영웅 장비\n\n**영웅 장비는 병력 공격력과 병력 수용량 보너스를 제공합니다**\n- 에너지 코어와 블루 크리스탈 사용을 최적화하기 위해 상위 5명의 주력 영웅 장비에만 집중하세요\n\n### 전용 무기\n\n**전용 무기는 병력 공격력(DMG)과 병력 체력(HP) 보너스를 제공합니다**\n- 항상 전용 무기를 보유한 영웅을 편성에 사용하세요\n\n### 3번째 스킬 극대화\n\n다음 영웅들은 3번째 스킬에 강력한 병력 관련 버프를 보유하고 있습니다:\n\n**파이터 병종:**\n- **트리스탄**\n- **프란시스**\n- **란**\n\n**슈터 병종:**\n- **나타샤**\n- **마가릿**\n- **다리안**\n\n**라이더 병종:**\n- **사이러스**\n- **마르시아**\n- **카트리나**\n\n**우선순위:** 이 영웅들의 3번째 스킬 레벨을 가능한 최고 레벨까지 최우선으로 올리세요.\n\n### 수도 관직\n\n- **대원수 등의 수도 관직을 활용하여 전투력(CP)을 일시적으로 극대화하세요**\n- 중요한 전투나 이벤트 전에 이 관직에 신청하세요\n\n---\n\n## 4. 식량 최적화 (Food Optimization) 🌾\n\n식량을 효율적으로 관리하여 영웅의 힘을 극대화하세요:\n\n### 상위 5명 법칙\n\n- **상위 5명의 영웅에게만 식량을 집중 투자하세요**\n- 주력 5명 외의 영웅에게 식량을 낭비하지 마세요\n\n### 훈련 센터\n\n- **훈련 센터를 사용하여 다른 영웅들의 레벨을 상위 5명과 동일하게 맞추세요**\n- 모든 영웅에게 식량을 주지 않고도 경쟁력 있는 레벨을 유지할 수 있습니다\n\n### 등급별 영웅 레벨 제한\n\n**파란 등급 영웅 (일반):**\n- **레벨 40까지만** 육성\n- 40에서 레벨업 중단\n\n**보라 등급 영웅 (희귀):**\n- 유용한 보라 등급 영웅만 **레벨 40까지** 육성\n- 예시: 안드레이\n- 레벨 40 이상으로 식량을 투자할 가치가 없습니다\n\n### 식량 회수\n\n- **훈련 센터에서 영웅에게 투입한 식량을 회수할 수 있습니다**\n- 더 이상 사용하지 않는 영웅에게서 식량을 회수할 수 있습니다\n- 더 나은 영웅에게 자원을 재분배하는 데 사용하세요\n\n---\n\n## 빠른 참조 요약 📋\n\n```\n═══════════════════════════════════════\n        병력 전투력 최적화\n═══════════════════════════════════════\n\n1️⃣ 병력 수량\n✦ 군사 센터 업그레이드\n✦ 병력 수용량 증가 연구\n✦ 에너지 코어로 주황 장비 승급\n✦ 영웅 성급 상승\n\n2️⃣ 병력 품질\n✦ 하나의 병종 선택 (파이터/슈터/라이더)\n✦ 주력 병종에 대해서만 연구\n\n3️⃣ 버프\n✦ 상위 5명 영웅의 주황 장비 업그레이드 및 집중\n✦ 전용 무기 보유 영웅 사용\n✦ 3번째 스킬 레벨 극대화:\n  - 파이터: 트리스탄, 프란시스, 란\n  - 슈터: 나타샤, 마가릿, 다리안\n  - 라이더: 사이러스, 마르시아, 카트리나\n✦ 수도 관직 활용 (대원수)\n\n4️⃣ 식량 최적화\n✦ 상위 5명 영웅에게만 식량 투자\n✦ 훈련 센터로 다른 영웅 레벨 동일화\n✦ 파란 영웅: 레벨 40 제한\n✦ 보라 영웅: 레벨 40 제한 (예: 안드레이)\n✦ 미사용 영웅에게서 식량 회수\n\n═══════════════════════════════════════\n```\n\n---\n\n**기억하세요**: 하나의 병종에 집중하고, 최고의 영웅에게 투자하며, 사용 가능한 모든 버프를 활용하세요. 이러한 핵심 원칙들이 당신의 전투 효율성을 극대화할 것입니다!\n\n행운을 빕니다, 생존자님! ⚔️\n"])</script><script>self.__next_f.push([1,"21:T10be,"])</script><script>self.__next_f.push([1,"\n# Formation1 Power Optimization ⚔️\n\nMaximizing your combat power requires focusing on four key areas: **Quantity**, **Quality**, **Buffs**, and **Food Optimization**. Follow these essential strategies to build the strongest army possible.\n\n---\n\n## 1. Quantity of Units 🏰\n\nIncrease the total number of troops you can field:\n\n### Key Actions\n\n**Upgrade Military Center**\n  - Directly increases your troop capacity\n\n**Research Troop Cap Increase**\n  - Found in the Research Center\n  - Each level increases maximum troop capacity\n\n**Promote Orange Hero Equipment with Power Cores**\n  - Use power cores to upgrade legendary (orange) equipment\n  - Provides additional troop capacity bonuses\n\n**Level Up Heroes' Star Levels**\n  - Increase hero star ratings\n  - Higher star levels boost troop capacity\n\n---\n\n## 2. Quality of Units 🎯\n\nFocus your research to maximize effectiveness:\n\n### The Specialization Rule\n\n**Research only for ONE main faction:**\n- Fighter\n- Shooter\n- Rider\n\n**Do NOT research all factions equally.** Choose your main faction and dedicate all military research to that single faction for maximum power.\n\n---\n\n## 3. Buffs 💪\n\nMultiply your combat power with strategic buffs:\n\n### Orange Hero Equipments\n\n**Hero Equipments provide Troop DMG and Troop Capacity bonuses**\n- Focus on top 5 main heroes' equipments only to optimize the use of power cores and blue crystals\n\n### Exclusive Weapons\n\n**Exclusive weapons provide Troop DMG and Troop HP bonuses**\n- Always use heroes that have exclusive weapons in your formation\n\n### 3rd Skill Maximization\n\nThe following heroes have powerful troop-related buffs in their 3rd skills:\n\n**Fighter Faction:**\n- **Tristan**\n- **Francis**\n- **Lan**\n\n**Shooter Faction:**\n- **Natasha**\n- **Margaret**\n- **Darian**\n\n**Rider Faction:**\n- **Sirus**\n- **Marcia**\n- **Katrina**\n\n**Priority:** Maximize the 3rd skill levels of these heroes to the highest level possible.\n\n### Capital Seats\n\n**Use capital positions like Grand Marshall to maximize CP temporarily**\n- Apply for these seats before important battles or events\n\n---\n\n## 4. Food Optimization 🌾\n\nManage food efficiently to maximize hero strength:\n\n### The Top 5 Rule\n\n**Only feed your top 5 heroes**\n- Don't waste food on heroes outside your main 5\n\n### Training Center\n\n**Use Training Center to equalize other heroes' levels to your top 5 heroes**\n- This allows you to have many heroes at competitive levels without feeding them all\n\n### Hero Level Caps by Rarity\n\n**Blue Heroes (Rare):**\n- Feed only until **Level 40**\n- Stop leveling at 40\n\n**Purple Heroes (Epic):**\n- Feed useful purple heroes only until **Level 40**\n- Example: Andre\n- Not worth investing food beyond level 40\n\n### Food Extraction\n\n**You can extract food that was fed to heroes at the Training Center**\n- Allows you to recover food from heroes you no longer use\n- Use this to reallocate resources to better heroes\n\n---\n\n## Quick Reference Summary 📋\n\n```\n═══════════════════════════════════════\n     TROOP POWER OPTIMIZATION\n═══════════════════════════════════════\n\n1️⃣ QUANTITY\n✦ Upgrade Military Center\n✦ Research Troop Cap Increase\n✦ Promote orange equipment with power cores\n✦ Level up heroes' star levels\n\n2️⃣ QUALITY\n✦ Choose ONE faction (Fighter/Shooter/Rider)\n✦ Research ONLY your main faction\n\n3️⃣ BUFFS\n✦ Upgrade and focus on top 5 heroes' orange equipments\n✦ Use heroes with exclusive weapons\n✦ Maximize 3rd skill levels:\n  - Fighter: Tristan, Francis, Lan\n  - Shooter: Natasha, Margaret, Darian\n  - Rider: Sirus, Marcia, Katrina\n✦ Use capital seats (Grand Marshall)\n\n4️⃣ FOOD OPTIMIZATION\n✦ Feed ONLY top 5 heroes\n✦ Use Training Center to equalize others\n✦ Blue heroes: Cap at level 40\n✦ Purple heroes: Cap at level 40 (e.g., Andre)\n✦ Extract food from unused heroes\n\n═══════════════════════════════════════\n```\n\n---\n\n**Remember**: Focus on one faction, invest in your best heroes, and use every buff available. These core principles will maximize your combat effectiveness!\n\nGood luck, Survivor! ⚔️\n"])</script><script>self.__next_f.push([1,"22:T1125,"])</script><script>self.__next_f.push([1,"\n# Troop Power Optimization ⚔️\n\nPara ma-maximize ang combat power mo, kailangan mong mag-focus sa apat na key areas: **Quantity**, **Quality**, **Buffs**, at **Food Optimization**. Sundin ang essential strategies na ito para bumuo ng pinakamalakas na army.\n\n---\n\n## 1. Quantity of Units 🏰\n\nDagdagan ang total number ng troops na pwede mong i-deploy:\n\n### Key Actions\n\n**Upgrade ang Military Center**\n  - Directly increases your troop capacity\n\n**Research ang Troop Cap Increase**\n  - Found sa Research Center\n  - Each level increases maximum troop capacity\n\n**Promote Orange Hero Equipment using Power Cores**\n  - Use power cores para i-upgrade ang legendary (orange) equipment\n  - Provides additional troop capacity bonuses\n\n**Level Up ang Heroes' Star Levels**\n  - Increase hero star ratings\n  - Higher star levels boost troop capacity\n\n---\n\n## 2. Quality of Units 🎯\n\nFocus ang research para ma-maximize ang effectiveness:\n\n### The Specialization Rule\n\n**Research lang para sa ONE main faction:**\n- Fighter\n- Shooter\n- Rider\n\n**HUWAG mag-research ng all factions equally.** Choose your main faction at dedicate all military research sa single faction na yan para sa maximum power.\n\n---\n\n## 3. Buffs 💪\n\nMultiply ang combat power mo using strategic buffs:\n\n### Orange Hero Equipments\n\n**Hero Equipments provide Troop DMG and Troop Capacity bonuses**\n- Focus lang sa top 5 main heroes' equipments para ma-optimize ang use ng power cores and blue crystals\n\n### Exclusive Weapons\n\n**Exclusive weapons provide Troop DMG and Troop HP bonuses**\n- Always use heroes na may exclusive weapons sa formation mo\n\n### 3rd Skill Maximization\n\nAng mga heroes na ito may powerful troop-related buffs sa kanilang 3rd skills:\n\n**Fighter Faction:**\n- **Tristan**\n- **Francis**\n- **Lan**\n\n**Shooter Faction:**\n- **Natasha**\n- **Margaret**\n- **Darian**\n\n**Rider Faction:**\n- **Sirus**\n- **Marcia**\n- **Katrina**\n\n**Priority:** Maximize ang 3rd skill levels ng heroes na ito to the highest level possible.\n\n### Capital Seats\n\n**Use capital positions like Grand Marshal para i-maximize ang CP temporarily**\n- Apply for these seats before important battles or events\n\n---\n\n## 4. Food Optimization 🌾\n\nManage food efficiently para ma-maximize ang hero strength:\n\n### The Top 5 Rule\n\n**Feed lang ang top 5 heroes mo**\n- Don't waste food sa heroes outside your main 5\n\n### Training Center\n\n**Use Training Center para i-equalize ang other heroes' levels sa top 5 heroes mo**\n- This allows you to have many heroes at competitive levels without feeding them all\n\n### Hero Level Caps by Rarity\n\n**Blue Heroes (Rare):**\n- Feed lang until **Level 40**\n- Stop leveling at 40\n\n**Purple Heroes (Epic):**\n- Feed useful purple heroes lang until **Level 40**\n- Example: Andre\n- Not worth investing food beyond level 40\n\n### Food Extraction\n\n**You can extract food na na-feed sa heroes at the Training Center**\n- Allows you to recover food from heroes na hindi mo na ginagamit\n- Use this para i-reallocate resources to better heroes\n\n---\n\n## Quick Reference Summary 📋\n\n```\n═══════════════════════════════════════\n     TROOP POWER OPTIMIZATION\n═══════════════════════════════════════\n\n1️⃣ QUANTITY\n✦ Upgrade Military Center\n✦ Research Troop Cap Increase\n✦ Promote orange equipment with power cores\n✦ Level up heroes' star levels\n\n2️⃣ QUALITY\n✦ Choose ONE faction (Fighter/Shooter/Rider)\n✦ Research ONLY your main faction\n\n3️⃣ BUFFS\n✦ Upgrade and focus on top 5 heroes' orange equipments\n✦ Use heroes with exclusive weapons\n✦ Maximize 3rd skill levels:\n  - Fighter: Tristan, Francis, Lan\n  - Shooter: Natasha, Margaret, Darian\n  - Rider: Sirus, Marcia, Katrina\n✦ Use capital seats (Grand Marshal)\n\n4️⃣ FOOD OPTIMIZATION\n✦ Feed ONLY top 5 heroes\n✦ Use Training Center to equalize others\n✦ Blue heroes: Cap at level 40\n✦ Purple heroes: Cap at level 40 (e.g., Andre)\n✦ Extract food from unused heroes\n\n═══════════════════════════════════════\n```\n\n---\n\n**Remember**: Focus sa one faction, invest sa best heroes mo, and use every available buff. These core principles will maximize your combat effectiveness!\n\nGood luck, Survivor! ⚔️\n"])</script><script>self.__next_f.push([1,"23:T101c,"])</script><script>self.__next_f.push([1,"\n# 1军战斗力优化 ⚔️\n\n战斗力最大化需要专注于四个关键领域：**部队数量**、**部队质量**、**增益**、**食物优化**。遵循这些核心策略构建最强大的军队。\n\n---\n\n## 1. 部队数量（Quantity of Units）🏰\n\n增加你能出战的部队总数：\n\n### 关键行动\n\n**升级军事中心**\n  - 直接增加部队容量\n\n**研究部队容量增加**\n  - 在研究中心进行\n  - 每个等级都会增加最大部队容量\n\n**用能量核心升级橙色英雄装备**\n  - 使用能量核心升级传说（橙色）装备\n  - 提供额外的部队容量加成\n\n**提升英雄星级**\n  - 提高英雄星级评价\n  - 更高的星级会增加部队容量\n\n---\n\n## 2. 部队质量（Quality of Units）🎯\n\n专注研究以最大化效率：\n\n### 专业化法则\n\n**只研究一个主力兵种：**\n- 战士\n- 射手\n- 骑兵\n\n**不要平均研究所有兵种。** 选择你的主力兵种，将所有军事研究投入到这单一兵种以获得最大战斗力。\n\n---\n\n## 3. 增益（Buffs）💪\n\n用战略性增益倍增战斗力：\n\n### 橙色英雄装备\n\n**英雄装备提供部队攻击力和部队容量加成**\n- 专注于前5名主力英雄的装备，以优化能量核心和蓝色水晶的使用\n\n### 专属装备\n\n**专属武器提供部队攻击力（DMG）和部队生命值（HP）加成**\n- 始终在编队中使用拥有专属武器的英雄\n\n### 第3技能最大化\n\n以下英雄的第3技能拥有强大的部队相关增益：\n\n**战士兵种：**\n- **特里斯坦**\n- **弗朗西斯**\n- **兰**\n\n**射手兵种：**\n- **娜塔莎**\n- **玛格丽特**\n- **达里安**\n\n**骑兵兵种：**\n- **塞勒斯**\n- **玛西娅**\n- **卡特琳娜**\n\n**优先级：** 优先将这些英雄的第3技能等级提升到最高级别。\n\n### 首都官职\n\n**利用大元帅等首都官职临时最大化战斗力（CP）**\n- 在重要战斗或活动前申请这些官职\n\n---\n\n## 4. 食物优化（Food Optimization）🌾\n\n高效管理食物以最大化英雄实力：\n\n### 前5名法则\n\n**只给前5名英雄喂食**\n- 不要在主力5名以外的英雄上浪费食物\n\n### 训练中心\n\n**使用训练中心将其他英雄的等级调整到与前5名相同**\n- 这样可以在不给所有英雄喂食的情况下保持竞争力的等级\n\n### 稀有度别英雄等级上限\n\n**蓝色稀有度英雄（稀有）：**\n- 只培养到**40级**\n- 在40级停止升级\n\n**紫色稀有度英雄（史诗）：**\n- 只培养有用的紫色稀有度英雄到**40级**\n- 例如：安德烈\n- 投资食物超过40级不值得\n\n### 食物回收\n\n**可以在训练中心回收喂给英雄的食物**\n- 可以从不再使用的英雄那里回收食物\n- 用于重新分配资源给更好的英雄\n\n---\n\n## 快速参考总结 📋\n\n```\n═══════════════════════════════════════\n        1军战斗力优化\n═══════════════════════════════════════\n\n1️⃣ 部队数量\n✦ 升级军事中心\n✦ 研究部队容量增加\n✦ 用能量核心升级橙色装备\n✦ 提升英雄星级\n\n2️⃣ 部队质量\n✦ 选择一个兵种（战士/射手/骑兵）\n✦ 只研究主力兵种\n\n3️⃣ 增益\n✦ 升级并专注于前5名英雄的橙色装备\n✦ 使用拥有专属武器的英雄\n✦ 最大化第3技能等级：\n  - 战士：特里斯坦、弗朗西斯、兰\n  - 射手：娜塔莎、玛格丽特、达里安\n  - 骑兵：塞勒斯、玛西娅、卡特琳娜\n✦ 利用首都官职（大元帅）\n\n4️⃣ 食物优化\n✦ 只给前5名英雄喂食\n✦ 使用训练中心调整其他英雄等级\n✦ 蓝色英雄：40级上限\n✦ 紫色英雄：40级上限（例如：安德烈）\n✦ 从未使用英雄回收食物\n\n═══════════════════════════════════════\n```\n\n---\n\n**记住**：专注于一个兵种，投资最好的英雄，利用所有可用的增益。这些核心原则将最大化你的战斗效率！\n\n祝你好运，幸存者！ ⚔️\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"00VTh7-hGo956TpiOPgK-\",\"p\":\"\",\"c\":[\"\",\"guides\",\"\"],\"i\":false,\"f\":[[[\"\",{\"children\":[\"guides\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",true],[\"\",[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/css/203636aecdefe762.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]],[\"$\",\"html\",null,{\"lang\":\"en\",\"suppressHydrationWarning\":true,\"children\":[[\"$\",\"head\",null,{}],[\"$\",\"body\",null,{\"children\":[\"$\",\"$L2\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"min-h-screen bg-dark-bg text-theme-text flex flex-col\",\"children\":[[\"$\",\"$L3\",null,{}],[\"$\",\"main\",null,{\"className\":\"flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8\",\"children\":[\"$\",\"$L4\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undef
