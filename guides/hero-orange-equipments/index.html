الدليل نظام ترقية المعدات، تقدم المستوى الأحمر، والموارد المطلوبة في كل مرحلة.\n\n**ملاحظة:** هناك **4 أنواع من المعدات البطل البرتقالية** في اللعبة. جميع أنواع المعدات تتبع نفس نظام التعزيز والتكاليف وتقدم الإحصائيات الموضحة في هذا الدليل.\n\n---\n\n## نظام تقدم الترقية\n\nالمعدات البطل البرتقالية تتبع مسار ترقية منظم مع **مرحلتين متميزتين:**\n\n**مسار الترقية الكامل:**\n\n1. **المرحلة 1: المستويات العادية** (المستوى 0 → المستوى 10)\n2. **انتقال الاختراق** (المستوى 10 → المستوى الأحمر 1)\n   - التكلفة: 100 نواة + 10 مخططات DX\n3. **المرحلة 2: المستويات الحمراء** (الأحمر 1 → الأحمر 5)\n\n### المرحلة 1: نظام المستوى العادي (المستوى 0–10)\n\nقبل الوصول إلى المستويات الحمراء، يجب أن تتقدم المعدات عبر نظام المستوى العادي:\n\n**التعزيز (المستويات 0–100):**\n- يمكن **تعزيز** المعدات من المستوى 0 إلى المستوى 100\n- التعزيز يستخدم **خامات التعزيز**\n- يزيد إحصائيات المعدات بشكل تدريجي\n\n**الترقية (المستوى 0–10):**\n- يمكن **ترقية** المعدات عبر 10 مستويات عادية\n- كل ترقية تتطلب **نوى الطاقة**\n- تكاليف نوى الطاقة تزيد بمقدار 10 لكل مستوى\n- كل ترقية تمنح مكافآت إحصائية\n\n**المكافآت الإحصائية لكل ترقية مستوى عادي:**\n\n| فئة الإحصائية | المكافأة لكل مستوى |\n|---------------|:--------------:|\n| تعزيز السمة الأساسية | +10% |\n| تعزيز قوة المعدات | +10% |\n| سعة القوات | +4 |\n\n**تكاليف الترقية للمستوى العادي والمكافآت التراكمية:**\n\n| الترقية | نوى الطاقة | السمة الأساسية التراكمية | قوة المعدات التراكمية | سعة القوات التراكمية |\n|:---------:|:-----------:|:-------------------------:|:-----------------------:|:--------------------:|\n| المستوى 0 → المستوى 1 | 10 | +10% | +10% | +4 |\n| المستوى 1 → المستوى 2 | 20 | +20% | +20% | +8 |\n| المستوى 2 → المستوى 3 | 30 | +30% | +30% | +12 |\n| المستوى 3 → المستوى 4 | 40 | +40% | +40% | +16 |\n| المستوى 4 → المستوى 5 | 50 | +50% | +50% | +20 |\n| المستوى 5 → المستوى 6 | 60 | +60% | +60% | +24 |\n| المستوى 6 → المستوى 7 | 70 | +70% | +70% | +28 |\n| المستوى 7 → المستوى 8 | 80 | +80% | +80% | +32 |\n| المستوى 8 → المستوى 9 | 90 | +90% | +90% | +36 |\n| المستوى 9 → المستوى 10 | 100 | +100% | +100% | +40 |\n| **الإجمالي (المستوى 0 → المستوى 10)** | **550** | **+100%** | **+100%** | **+40** |\n\n**يجب إكمال المستوى 10 قبل أن تتمكن من الاختراق إلى نظام المستوى الأحمر.**\n\n---\n\n### الاختراق: المستوى 10 → المستوى الأحمر 1\n\nبعد إكمال **المستوى العادي 10**، يجب عليك إجراء **اختراق** خاص لتحويل المعدات إلى مستوى أحمر:\n\n**تكلفة الاختراق:**\n- **100 نواة طاقة**\n- **10 مخططات DX**\n\n**مكافآت إحصائيات الاختراق:**\n\n| فئة الإحصائية | المكافأة |\n|---------------|:-----:|\n| تعزيز السمة الأساسية | +20% |\n| تعزيز قوة المعدات | +20% |\n| سعة القوات | +6 |\n\nهذا الاختراق يحول معدات المستوى العادي 10 الخاصة بك إلى **جزء المستوى الأحمر 1**، مما يفتح الوصول إلى نظام تعزيز المستوى الأحمر.\n\n---\n\n### المرحلة 2: نظام تعزيز المستوى الأحمر (الأحمر 1–5)\n\nبمجرد اكتمال الاختراق، تدخل المعدات نظام المستوى الأحمر. **كل مستوى أحمر يتطلب 5 خطوات تعزيز للوصول إلى الاختراق:**\n\n**تدفق التعزيز:**\n- المستوى الأحمر [N] جزء → الخطوة 1 → الخطوة 2 → الخطوة 3 → الخطوة 4 → الخطوة 5 (الاختراق) → المستوى الأحمر [N+1] جزء\n\nكل من الخطوات الخمس توفر زيادات إحصائية تراكمية. الخطوة الخامسة هي **الاختراق** الذي يكمل المستوى.\n\n**تقدم المستوى الأحمر الكامل:**\n\n- **المستوى الأحمر 1:** جزء → (5 خطوات) → الاختراق\n- **المستوى الأحمر 2:** جزء → (5 خطوات) → الاختراق\n- **المستوى الأحمر 3:** جزء → (5 خطوات) → الاختراق\n- **المستوى الأحمر 4:** جزء → (5 خطوات) → الاختراق\n- **المستوى الأحمر 5:** جزء → (5 خطوات) → الاختراق\n\n---\n\n## الزيادات الإحصائية العامة (جميع المستويات الحمراء)\n\n**جميع المستويات الحمراء (1–5) توفر نفس الزيادات الإحصائية لكل خطوة:**\n\n| فئة الإحصائية | الزيادة لكل خطوة |\n|---------------|:-----------------:|\n| هجوم البطل | +240 |\n| مكافأة هجوم البطل | +0.96% |\n| ضرر القوات | +0.64% |\n| تعزيز السمة الأساسية | +8% |\n| تعزيز قوة المعدات | +8% |\n| سعة القوات | +5 |\n\n**إجمالي الزيادات التراكمية لكل مستوى (5 خطوات):**\n\n| فئة الإحصائية | الزيادة الإجمالية |\n|---------------|:--------------:|\n| script>self.__next_f.push([1,"\n# オレンジ英雄装備ガイド 🟠\n\nオレンジ英雄装備は、DarkWar Survivalで戦闘パフォーマンスを向上させる最も強力な方法の一つです。このガイドでは、装備アップグレードシステム、レッドティアの進行、各段階で必要なリソースについて説明します。\n\n**注意:** ゲームには**4種類のオレンジ英雄装備**があります。すべての装備タイプは、このガイドで説明されている同じ強化システム、コスト、能力値の進行に従います。\n\n---\n\n## アップグレード進行システム\n\nオレンジ英雄装備は、**2つの明確なフェーズ**を持つ構造化されたアップグレードパスに従います。\n\n**完全なアップグレードパス:**\n\n1. **フェーズ1: ノーマルティア** (ティア0 → ティア10)\n2. **ブレイクスルー移行** (ティア10 → レッドティア1)\n   - コスト: 100コア + 10 DX設計図\n3. **フェーズ2: レッドティア** (レッド1 → レッド5)\n\n### フェーズ1: ノーマルティアシステム (ティア0–10)\n\nレッドティアに到達する前に、装備はノーマルティアシステムを進行する必要があります。\n\n**強化 (レベル0–100):**\n- 装備はレベル0からレベル100まで**強化**できます\n- 強化には**ブースト鉱石**を使用します\n- 装備の能力値が段階的に増加します\n\n**昇格 (ティア0–10):**\n- 装備は10のノーマルティアを通じて**昇格**できます\n- 各昇格には**パワーコア**が必要です\n- パワーコアのコストはティアごとに10ずつ増加します\n- 各昇格で能力値ボーナスを獲得します\n\n**ノーマルティア昇格ごとの能力値ボーナス:**\n\n| 能力値カテゴリ | ティアごとのボーナス |\n|---------------|:------------------:|\n| 基礎属性ブースト | +10% |\n| 装備戦闘力ブースト | +10% |\n| 部隊収容力 | +4 |\n\n**ノーマルティア昇格コストと累積ボーナス:**\n\n| 昇格 | パワーコア | 累積基礎属性 | 累積装備戦闘力 | 累積部隊収容力 |\n|:----:|:----------:|:------------:|:--------------:|:--------------:|\n| ティア0 → ティア1 | 10 | +10% | +10% | +4 |\n| ティア1 → ティア2 | 20 | +20% | +20% | +8 |\n| ティア2 → ティア3 | 30 | +30% | +30% | +12 |\n| ティア3 → ティア4 | 40 | +40% | +40% | +16 |\n| ティア4 → ティア5 | 50 | +50% | +50% | +20 |\n| ティア5 → ティア6 | 60 | +60% | +60% | +24 |\n| ティア6 → ティア7 | 70 | +70% | +70% | +28 |\n| ティア7 → ティア8 | 80 | +80% | +80% | +32 |\n| ティア8 → ティア9 | 90 | +90% | +90% | +36 |\n| ティア9 → ティア10 | 100 | +100% | +100% | +40 |\n| **合計 (ティア0 → ティア10)** | **550** | **+100%** | **+100%** | **+40** |\n\n**レッドティアシステムへのブレイクスルーを行う前に、ティア10を完了する必要があります。**\n\n---\n\n### ブレイクスルー: ティア10 → レッドティア1\n\n**ノーマルティア10**を完了した後、装備をレッドティアに変換するために特別な**ブレイクスルー**を実行する必要があります。\n\n**ブレイクスルーコスト:**\n- **100 パワーコア**\n- **10 DX設計図**\n\n**ブレイクスルー能力値ボーナス:**\n\n| 能力値カテゴリ | ボーナス |\n|---------------|:-------:|\n| 基礎属性ブースト | +20% |\n| 装備戦闘力ブースト | +20% |\n| 部隊収容力 | +6 |\n\nこのブレイクスルーにより、ノーマルティア10装備が**レッドティア1パーツ**に変換され、レッドティア強化システムへのアクセスが解放されます。\n\n---\n\n### フェーズ2: レッドティア強化システム (レッド1–5)\n\nブレイクスルーが完了すると、装備はレッドティアシステムに入ります。**各レッドティアは、ブレイクスルーに到達するために5つの強化ステップが必要です:**\n\n**強化フロー:**\n- レッドティア [N] パーツ → ステップ1 → ステップ2 → ステップ3 → ステップ4 → ステップ5 (ブレイクスルー) → レッドティア [N+1] パーツ\n\n5つのステップのそれぞれが累積的な能力値の増加を提供します。5番目のステップは、ティアを完了する**ブレイクスルー**です。\n\n**完全なレッドティア進行:**\n\n- **レッドティア1:** パーツ → (5ステップ) → ブレイクスルー\n- **レッドティア2:** パーツ → (5ステップ) → ブレイクスルー\n- **レッドティア3:** パーツ → (5ステップ) → ブレイクスルー\n- **レッドティア4:** パーツ → (5ステップ) → ブレイクスルー\n- **レッドティア5:** パーツ → (5ステップ) → ブレイクスルー\n\n---\n\n## 共通能力値増加 (すべてのレッドティア)\n\n**すべてのレッドティア (1–5) は、ステップごとに同じ能力値増加を提供します:**\n\n| 能力値カテゴリ | ステップごとの増加 |\n|---------------|:------------------:|\n| ヒーロー攻撃力 | +240 |\n| ヒーロー攻撃力ボーナス | +0.96% |\n| 部隊ダメージ | +0.64% |\n| 基礎属性ブースト | +8% |\n| 装備戦闘力ブースト | +8% |\n| 部隊収容力 | +5 |\n\n**ティアごとの総累積増加 (5ステップ):**\n\n| 能力値カテゴリ | 総増加 |\n|---------------|:------:|\n| ヒーロー攻撃力 | +1,200 |\n| ヒーロー攻撃力ボーナス | +4.8% |\n| 部隊ダメージ | +3.2% |\n| 基礎属性ブースト | +40% |\n| 装備戦闘力ブースト | +40% |\n| 部隊収容力 | +25 |\n\n---\n\n## レッドティア1: 強化詳細\n\n### レッドティア1強化コスト\n\n| ステップ | パワーコア | ブースト鉱石 | DX設計図 |\n|:--------:|:----------:|:------------:|:--------:|\n| 1 | 50 | 15,000 | — |\n| 2 | 50 | 15,000 | — |\n| 3 | 50 | 15,000 | — |\n| 4 | 50 | 15,000 | — |\n| 5 (ブレイクスルー) | 70 | 21,000 | 10 |\n| **合計** | **270** | **81,000** | **10** |\n\n### レッドティア1ブレイクスルーボーナス\n\nレッドティア1ブレイクスルー (ステップ5) を完了すると、**追加の特別ボーナス**を獲得します:\n\n**🎯 部隊攻撃力 +5%**\n\n---\n\n## レッドティア2: 強化詳細\n\n### レッドティア2強化コスト\n\n| ステップ | パワーコア | ブースト鉱石 | DX設計図 |\n|:--------:|:----------:|:------------:|:--------:|\n| 1 | 70 | 21,000 | — |\n| 2 | 70 | 21,000 | — |\n| 3 | 70 | 21,000 | — |\n| 4 | 70 | 21,000 | — |\n| 5 (ブレイクスルー) | 90 | 27,000 | 20 |\n| **合計** | **370** | **111,000** | **20** |\n\n### レッドティア2ブレイクスルーボーナス\n\nレッドティア2ブレイクスルー (ステップ5) を完了すると、**追加の特別ボーナス**を獲得します:\n\n**🎯 陣営カウンター +2.5%**\n\n---\n\n## レッドティア3: 強化詳細\n\n### レッドティア3強化コスト\n\n| ステップ | パワーコア | ブースト鉱石 | DX設計図 |\n|:--------:|:----------:|:------------:|:--------:|\n| 1 | 90 | 27,000 | — |\n| 2 | 90 | 27,000 | — |\n| 3 | 90 | 27,000 | — |\n| 4 | 90 | 27,000 | — |\n| 5 (ブレイクスルー) | 110 | 33,000 | 30 |\n| **合計** | **470** | **141,000** | **30** |\n\n### レッドティア3ブレイクスルーボーナス\n\nレッドティア3ブレイクスルー (ステップ5) を完了すると、**追加の特別ボーナス**を獲得します:\n\n**🎯 部隊ダメージ +2.5%**\n\n---\n\n## レッドティア4: 強化詳細\n\n### レッドティア4強化コスト\n\n| ステップ | パワーコア | ブースト鉱石 | DX設計図 |\n|:--------:|:----------:|:------------:|:--------:|\n| 1 | 110 | 33,000 | — |\n| 2 | 110 | 33,000 | — |\n| 3 | 110 | 33,000 | — |\n| 4 | 110 | 33,000 | — |\n| 5 (ブレイクスルー) | 130 | 39,000 | 40 |\n| **合計** | **570** | **171,000** | **40** |\n\n### レッドティア4ブレイクスルーボーナス\n\nレッドティア4ブレイクスルー (ステップ5) を完了すると、**追加の特別ボーナス**を獲得します:\n\n**🎯 行軍速度 +1%**\n\n---\n\n## レッドティア5: 強化詳細\n\n### レッドティア5強化コスト\n\n| ステップ | パワーコア | ブースト鉱石 | DX設計図 |\n|:--------:|:----------:|:------------:|:--------:|\n| 1 | 130 | 39,000 | — |\n| 2 | 130 | 39,000 | — |\n| 3 | 130 | 39,000 | — |\n| 4 | 130 | 39,000 | — |\n| 5 (ブレイクスルー) | 150 | 45,000 | 50 |\n| **合計** | **670** | **201,000** | **50** |\n\n### レッドティア5ブレイクスルーボーナス\n\nレッドティア5ブレイクスルー (ステップ5) を完了すると、**追加の特別ボーナス**を獲得します:\n\n**🎯 チーム部隊上限 +500**\n\n---\n\n## 総強化コスト\n\n### ノーマルティア (ティア0–10)\n\n| リソース | 必要総量 |\n|----------|:--------:|\n| **パワーコア** | **550** |\n| **ブースト鉱石** | *強化レベルによって変動* |\n\n### ブレイクスルーコスト\n\n| リソース | 必要総量 |\n|----------|:--------:|\n| **パワーコア** | **100** |\n| **DX設計図** | **10** |\n\n### レッドティア (レッド1–5)\n\n| レッドティア | ステップ1-4コスト | ステップ5コスト | 総コア | 総鉱石 | 総設計図 |\n|:------------:|:----------------:|:---------------:|:------:|:------:|:--------:|\n| **1** | 50コア + 15k鉱石 | 70コア + 21k鉱石 | **270** | **81,000** | **10** |\n| **2** | 70コア + 21k鉱石 | 90コア + 27k鉱石 | **370** | **111,000** | **20** |\n| **3** | 90コア + 27k鉱石 | 110コア + 33k鉱石 | **470** | **141,000** | **30** |\n| **4** | 110コア + 33k鉱石 | 130コア + 39k鉱石 | **570** | **171,000** | **40** |\n| **5** | 130コア + 39k鉱石 | 150コア + 45k鉱石 | **670** | **201,000** | **50** |\n| **レッドティア合計** | | | **2,350** | **705,000** | **150** |\n\n### 総計 (装備の完全最大化)\n\n| フェーズ | パワーコア | ブースト鉱石 | DX設計図 |\n|----------|:----------:|:------------:|:--------:|\n| ノーマルティア (0–10) | 550 | *変動* | — |\n| ブレイクスルー (10→レッド1) | 100 | — | 10 |\n| レッドティア (1–5) | 2,350 | 705,000 | 150 |\n| **総計** | **3,000** | **705,000+** | **160** |\n\n---\n\n## 重要なポイント\n\n### ノーマルティアフェーズ (ティア0–10)\n- **強化システム** — 装備はブースト鉱石を使用してレベル0から100まで強化できます\n- **昇格システム** — 装備はパワーコアを使用して10のノーマルティアを通じて昇格する必要があります\n- **ノーマルティアコスト** — ティア10に到達するまでに合計550パワーコア (10+20+30...+100)\n- **昇格ボーナス** — 各ティア昇格で+10%基礎属性、+10%装備戦闘力、+4部隊収容力を獲得\n- **ティア10での累積** — 合計+100%基礎属性、+100%装備戦闘力、+40部隊収容力\n- **ブレイクスルー要件** — レッドティアへのブレイクスルー前にティア10を完了する必要があります\n\n### ブレイクスルーフェーズ\n- **重要な移行** — ノーマルティア10装備をレッドティア1に変換します\n- **ブレイクスルーコスト** — 100パワーコア + 10 DX設計図\n- **ブレイクスルーボーナス** — +20%基礎属性、+20%装備戦闘力、+6部隊収容力を獲得\n- **一度の投資** — レッドティアシステムにアクセスするために装備ごとに1回必要\n\n### レッドティアフェーズ (レッド1–5)\n- **レッドティアごとに5つの強化ステップ** — 各レッドティアはブレイクスルーに到達するために5ステップが必要\n- **共通能力値成長** — すべてのレッドティアはステップごとに同じ能力値増加を提供 (+240ヒーロー攻撃力、+0.64%部隊ダメージ、+5部隊収容力など)\n- **ユニークなブレイクスルーボーナス** — 各ティアの5番目のステップは特別なボーナスを付与 (ティア1: 部隊攻撃力+5%、ティア2: 陣営カウンター+2.5%、ティア3: 部隊ダメージ+2.5%、ティア4: 行軍速度+1%、ティア5: チーム部隊上限+500)\n- **コストの増加** — 各レッドティアは前のティアより100コアと30k鉱石多くかかります\n- **レッドティア投資** — すべての5レッドティアを完了するには**2,350パワーコア、705,000ブースト鉱石、150 DX設計図**が必要\n- **コストパターン** — 現在のティアのステップ1-4 = 前のティアのステップ5コスト\n- **DX設計図**はティアごとに10ずつ増加 (10→20→30→40→50)\n\n### 全体\n- **総投資** — 1つの装備を完全に最大化 (ティア0 → レッド5) するには**3,000パワーコア、705,000以上のブースト鉱石、160 DX設計図**が必要\n- **コスト内訳** — 550コア (ノーマルティア) + 100コア (ブレイクスルー) + 2,350コア (レッドティア)\n- **能力値の蓄積** — 装備はノーマルティア昇格 (+100%基礎属性、+100%装備戦闘力、+40収容力)、ブレイクスルー (+20%/+20%/+6)、さらにすべてのレッドティア強化 (ティアごとに+1,200ヒーロー攻撃力、ティアごとに+3.2%部隊ダメージ、ティアごとに+25部隊収容力 × 5ティア) からボーナスを獲得\n- **投資の集中** — 極端なリソース要件のため、トップ5のメインヒーローの装備のみをアップグレードしてください\n\n---\n\n## クイックリファレンス要約 📋\n\n### 📈 アップグレードパス\n\n**フェーズ1: ノーマルティア (0→10)**\n- コスト: 550コア (10+20+...+100)\n- ティアごと: +10%基礎属性、+10%戦闘力、+4収容力\n- 合計: +100%基礎属性、+100%戦闘力、+40収容力\n\n**ブレイクスルー (10→レッド1)**\n- コスト: 100コア + 10設計図\n- ボーナス: +20%基礎属性、+20%戦闘力、+6収容力\n\n**フェーズ2: レッドティア (1→5)**\n- ----:|\n| 기초 속성 부스트 | +10% |\n| 장비 전투력 부스트 | +10% |\n| 병력 수용량 | +4 |\n\n**노멀 티어 승급 비용 및 누적 보너스:**\n\n| 승급 | 에너지 코어 | 누적 기초 속성 | 누적 장비 전투력 | 누적 병력 수용량 |\n|:---------:|:-----------:|:-------------------------:|:-----------------------:|:--------------------:|\n| 티어 0 → 티어 1 | 10 | +10% | +10% | +4 |\n| 티어 1 → 티어 2 | 20 | +20% | +20% | +8 |\n| 티어 2 → 티어 3 | 30 | +30% | +30% | +12 |\n| 티어 3 → 티어 4 | 40 | +40% | +40% | +16 |\n| 티어 4 → 티어 5 | 50 | +50% | +50% | +20 |\n| 티어 5 → 티어 6 | 60 | +60% | +60% | +24 |\n| 티어 6 → 티어 7 | 70 | +70% | +70% | +28 |\n| 티어 7 → 티어 8 | 80 | +80% | +80% | +32 |\n| 티어 8 → 티어 9 | 90 | +90% | +90% | +36 |\n| 티어 9 → 티어 10 | 100 | +100% | +100% | +40 |\n| **합계 (티어 0 → 티어 10)** | **550** | **+100%** | **+100%** | **+40** |\n\n**레드 티어 시스템으로 돌파하기 전에 티어 10을 완료해야 합니다.**\n\n---\n\n### 돌파: 티어 10 → 레드 티어 1\n\n**노멀 티어 10**을 완료한 후, 장비를 레드 티어로 변환하기 위해 특별한 **돌파**를 수행해야 합니다:\n\n**돌파 비용:**\n- **100 에너지 코어**\n- **10 DX 설계도**\n\n**돌파 능력치 보너스:**\n\n| 능력치 카테고리 | 보너스 |\n|---------------|:-----:|\n| 기초 속성 부스트 | +20% |\n| 장비 전투력 부스트 | +20% |\n| 병력 수용량 | +6 |\n\n이 돌파는 노멀 티어 10 장비를 **레드 티어 1 파트**로 전환하여 레드 티어 강화 시스템에 대한 접근을 잠금 해제합니다.\n\n---\n\n### 2단계: 레드 티어 강화 시스템 (레드 1–5)\n\n돌파가 완료되면 장비는 레드 티어 시스템에 진입합니다. **각 레드 티어는 돌파에 도달하기 위해 5개의 강화 단계가 필요합니다:**\n\n**강화 흐름:**\n- 레드 티어 [N] 파트 → 단계 1 → 단계 2 → 단계 3 → 단계 4 → 단계 5 (돌파) → 레드 티어 [N+1] 파트\n\n5개의 단계 각각은 누적 능력치 증가를 제공합니다. 5번째 단계는 티어를 완료하는 **돌파**입니다.\n\n**전체 레드 티어 진행:**\n\n- **레드 티어 1:** 파트 → (5 단계) → 돌파\n- **레드 티어 2:** 파트 → (5 단계) → 돌파\n- **레드 티어 3:** 파트 → (5 단계) → 돌파\n- **레드 티어 4:** 파트 → (5 단계) → 돌파\n- **레드 티어 5:** 파트 → (5 단계) → 돌파\n\n---\n\n## 범용 능력치 증가 (모든 레드 티어)\n\n**모든 레드 티어 (1–5)는 단계당 동일한 능력치 증가를 제공합니다:**\n\n| 능력치 카테고리 | 단계당 증가 |\n|---------------|:-----------------:|\n| 영웅 공격력 | +240 |\n| 영웅 공격력 보너스 | +0.96% |\n| 병력 피해 | +0.64% |\n| 기초 속성 부스트 | +8% |\n| 장비 전투력 부스트 | +8% |\n| 병력 수용량 | +5 |\n\n**티어당 총 누적 증가 (5 단계):**\n\n| 능력치 카테고리 | 총 증가 |\n|---------------|:--------------:|\n| 영웅 공격력 | +1,200 |\n| 영웅 공격력 보너스 | +4.8% |\n|
