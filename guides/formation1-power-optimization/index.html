القوات**، **التعزيزات**، **تحسين الطعام**. اتبع هذه الاستراتيجيات الأساسية لبناء أقوى جيش ممكن.\n\n---\n\n## 1. كمية القوات (Quantity of Units) 🏰\n\nزد العدد الإجمالي للقوات التي يمكنك نشرها:\n\n### الإجراءات الرئيسية\n\n**ترقية المركز العسكري**\n  - يزيد مباشرة من قدرة قواتك\n\n**بحث زيادة سعة القوات**\n  - موجود في مركز البحث\n  - كل مستوى يزيد من السعة القصوى للقوات\n\n**ترقية معدات الأبطال البرتقالية بنوى الطاقة**\n  - استخدم نوى الطاقة لترقية المعدات الأسطورية (البرتقالية)\n  - توفر مكافآت إضافية لسعة القوات\n\n**رفع مستويات نجوم الأبطال**\n  - زد تصنيفات نجوم الأبطال\n  - المستويات النجمية الأعلى تعزز سعة القوات\n\n---\n\n## 2. جودة القوات (Quality of Units) 🎯\n\nركز أبحاثك لتعظيم الفعالية:\n\n### قاعدة التخصص\n\n**ابحث فقط لفصيل رئيسي واحد:**\n- المقاتل\n- الرامي\n- الراكب\n\n**لا تبحث جميع الفصائل بالتساوي.** اختر فصيلك الرئيسي وكرس كل الأبحاث العسكرية لذلك الفصيل الواحد للحصول على أقصى قوة.\n\n---\n\n## 3. التعزيزات (Buffs) 💪\n\nضاعف قوتك القتالية بالتعزيزات الاستراتيجية:\n\n### معدات الأبطال البرتقالية\n\n**معدات الأبطال توفر مكافآت لهجوم القوات وسعة القوات**\n- ركز فقط على معدات أفضل 5 أبطال رئيسيين لتحسين استخدام نوى الطاقة والبلورات الزرقاء\n\n### الأسلحة الحصرية\n\n**الأسلحة الحصرية توفر مكافآت لهجوم القوات (DMG) وصحة القوات (HP)**\n- استخدم دائمًا الأبطال الذين لديهم أسلحة حصرية في تشكيلتك\n\n### تعظيم المهارة الثالثة\n\nالأبطال التاليون لديهم تعزيزات قوية متعلقة بالقوات في مهاراتهم الثالثة:\n\n**فصيل المقاتل:**\n- **تريستان**\n- **فرانسيس**\n- **لان**\n\n**فصيل الرامي:**\n- **ناتاشا**\n- **مارغريت**\n- **داريان**\n\n**فصيل الراكب:**\n- **سايروس**\n- **مارسيا**\n- **كاترينا**\n\n**الأولوية:** عظّم مستويات المهارة الثالثة لهؤلاء الأبطال إلى أعلى مستوى ممكن.\n\n### مناصب العاصمة\n\n**استخدم المناصب العاصمة مثل المارشال الأعلى لتعظيم CP مؤقتًا**\n- قدم لهذه المناصب قبل المعارك أو الأحداث المهمة\n\n---\n\n## 4. تحسين الطعام (Food Optimization) 🌾\n\nأدر الطعام بكفاءة لتعظيم قوة الأبطال:\n\n### قاعدة أفضل 5\n\n**أطعم فقط أفضل 5 أبطال لديك**\n- لا تضيع الطعام على الأبطال خارج أفضل 5 لديك\n\n### مركز التدريب\n\n**استخدم مركز التدريب لمساواة مستويات الأبطال الآخرين بأفضل 5 أبطال لديك**\n- هذا يسمح لك بأن يكون لديك العديد من الأبطال في مستويات تنافسية دون إطعامهم جميعًا\n\n### حدود مستوى الأبطال حسب الندرة\n\n**الأبطال الأزرق (نادر):**\n- أطعم فقط حتى **المستوى 40**\n- توقف عن الترقية عند 40\n\n**الأبطال الأرجوانية (ملحمي):**\n- أطعم الأبطال الأرجوانية المفيدة فقط حتى **المستوى 40**\n- مثال: أندريه\n- لا يستحق استثمار الطعام بعد المستوى 40\n\n### استخراج الطعام\n\n**يمكنك استخراج الطعام الذي تم إطعامه للأبطال في مركز التدريب**\n- يسمح لك باسترداد الطعام من الأبطال الذين لم تعد تستخدمهم\n- استخدم هذا لإعادة تخصيص الموارد لأبطال أفضل\n\n---\n\n## ملخص مرجعي سريع 📋\n\n```\n═══════════════════════════════════════\n        تحسين قوة القوات\n═══════════════════════════════════════\n\n1️⃣ الكمية\n✦ ترقية المركز العسكري\n✦ بحث زيادة سعة القوات\n✦ ترقية المعدات البرتقالية بنوى الطاقة\n✦ رفع مستويات نجوم الأبطال\n\n2️⃣ الجودة\n✦ اختر فصيل واحد (المقاتل/الرامي/الراكب)\n✦ ابحث فقط فصيلك الرئيسي\n\n3️⃣ التعزيزات\n✦ ترقية والتركيز على معدات أفضل 5 أبطال البرتقالية\n✦ استخدم الأبطال بالأسلحة الحصرية\n✦ عظّم مستويات المهارة الثالثة:\n  - المقاتل: تريستان، فرانسيس، لان\n  - الرامي: ناتاشا، مارغريت، داريان\n  - الراكب: سايروس، مارسيا، كاترينا\n✦ استخدم مناصب العاصمة (المارشال الأعلى)\n\n4️⃣ تحسين الطعام\n✦ أطعم فقط أفضل 5 أبطال\n✦ استخدم مركز التدريب لمساواة الآخرين\n✦ الأبطال الأزرق: حد عند المستوى 40\n✦ الأبطال الأرجوانية: حد عند المستوى 40 (مثال: أندريه)\n✦ استخرج الطعام من الأبطال غير المستخدمة\n\n═══════════════════════════════════════\n```\n\n---\n\n**تذكر**: ركز على فصيل واحد، استثمر في أفضل أبطالك، واستخدم كل تعزيز متاح. هذه المبادئ الأساسية ستعظم فعاليتك القتالية!\n\nحظ سعيد، أيها الناجي! ⚔️\n"])</script><script>self.__next_f.push([1,"14:T126d,"])</script><script>self.__next_f.push([1,"\n# Optimasi Kekuatan Pasukan Utama ⚔️\n\nMemaksimalkan kekuatan tempur Anda memerlukan fokus pada empat area utama: **Jumlah Pasukan**, **Kualitas Pasukan**, **Buff**, dan **Optimasi Makanan**. Ikuti strategi penting ini untuk membangun pasukan terkuat.\n\n---\n\n## 1. Jumlah Pasukan (Quantity of Units) 🏰\n\nTingkatkan jumlah total pasukan yang dapat Anda kirim ke pertempuran:\n\n### Tindakan Utama\n\n**Upgrade Military Center**\n  - Langsung meningkatkan kapasitas pasukan Anda\n\n**Riset Peningkatan Kapasitas Pasukan**\n  - Ditemukan di Research Center\n  - Setiap level meningkatkan kapasitas pasukan maksimum\n\n**Promosikan Equipment Hero Orange dengan Power Core**\n  - Gunakan power core untuk upgrade equipment legendaris (orange)\n  - Memberikan bonus kapasitas pasukan tambahan\n\n**Naikkan Level Bintang Hero**\n  - Tingkatkan rating bintang hero\n  - Level bintang yang lebih tinggi meningkatkan kapasitas pasukan\n\n---\n\n## 2. Kualitas Pasukan (Quality of Units) 🎯\n\nFokuskan riset Anda untuk memaksimalkan efektivitas:\n\n### Aturan Spesialisasi\n\n**Riset hanya untuk SATU faksi utama:**\n- Fighter\n- Shooter\n- Rider\n\n**JANGAN riset semua faksi secara merata.** Pilih faksi utama Anda dan dedikasikan semua riset militer untuk faksi tunggal itu untuk kekuatan maksimum.\n\n---\n\n## 3. Buff 💪\n\nGandakan kekuatan tempur Anda dengan buff strategis:\n\n### Equipment Hero Orange\n\n**Equipment Hero memberikan bonus Troop DMG dan Troop Capacity**\n- Fokus hanya pada equipment 5 hero utama untuk mengoptimalkan penggunaan power core dan blue crystal\n\n### Senjata Eksklusif\n\n**Senjata eksklusif memberikan bonus Troop DMG dan Troop HP**\n- Selalu gunakan hero yang memiliki senjata eksklusif dalam formasi Anda\n\n### Maksimalkan Skill ke-3\n\nHero berikut memiliki buff terkait pasukan yang kuat di skill ke-3 mereka:\n\n**Faksi Fighter:**\n- **Tristan**\n- **Francis**\n- **Lan**\n\n**Faksi Shooter:**\n- **Natasha**\n- **Margaret**\n- **Darian**\n\n**Faksi Rider:**\n- **Sirus**\n- **Marcia**\n- **Katrina**\n\n**Prioritas:** Maksimalkan level skill ke-3 hero-hero ini ke level tertinggi yang memungkinkan.\n\n### Jabatan Ibu Kota\n\n**Gunakan posisi ibu kota seperti Marsekal Agung untuk memaksimalkan CP sementara**\n- Ajukan untuk jabatan ini sebelum pertempuran atau event penting\n\n---\n\n## 4. Optimasi Makanan (Food Optimization) 🌾\n\nKelola makanan secara efisien untuk memaksimalkan kekuatan hero:\n\n### Aturan Top 5\n\n**Hanya beri makan 5 hero teratas Anda**\n- Jangan buang makanan untuk hero di luar 5 utama Anda\n\n### Training Center\n\n**Gunakan Training Center untuk menyamakan level hero lain dengan 5 hero teratas Anda**\n- Ini memungkinkan Anda memiliki banyak hero di level kompetitif tanpa memberi makan semuanya\n\n### Batas Level Hero Berdasarkan Rarity\n\n**Hero Blue (Rare):**\n- Beri makan hanya sampai **Level 40**\n- Berhenti leveling di 40\n\n**Hero Purple (Epic):**\n- Beri makan hero purple yang berguna hanya sampai **Level 40**\n- Contoh: Andre\n- Tidak worth menginvestasikan makanan melebihi level 40\n\n### Ekstraksi Makanan\n\n**Anda dapat mengekstrak makanan yang telah diberikan ke hero di Training Center**\n- Memungkinkan Anda untuk memulihkan makanan dari hero yang tidak lagi Anda gunakan\n- Gunakan ini untuk mengalokasikan kembali sumber daya ke hero yang lebih baik\n\n---\n\n## Ringkasan Referensi Cepat 📋\n\n```\n═══════════════════════════════════════\n     OPTIMASI KEKUATAN PASUKAN\n═══════════════════════════════════════\n\n1️⃣ JUMLAH\n✦ Upgrade Military Center\n✦ Riset Peningkatan Kapasitas Pasukan\n✦ Promosikan equipment orange dengan power core\n✦ Naikkan level bintang hero\n\n2️⃣ KUALITAS\n✦ Pilih SATU faksi (Fighter/Shooter/Rider)\n✦ Riset HANYA faksi utama Anda\n\n3️⃣ BUFF\n✦ Upgrade dan fokus pada equipment orange 5 hero teratas\n✦ Gunakan hero dengan senjata eksklusif\n✦ Maksimalkan level skill ke-3:\n  - Fighter: Tristan, Francis, Lan\n  - Shooter: Natasha, Margaret, Darian\n  - Rider: Sirus, Marcia, Katrina\n✦ Gunakan jabatan ibu kota (Marsekal Agung)\n\n4️⃣ OPTIMASI MAKANAN\n✦ Beri makan HANYA 5 hero teratas\n✦ Gunakan Training Center untuk menyamakan yang lain\n✦ Hero blue: Batas di level 40\n✦ Hero purple: Batas di level 40 (contoh: Andre)\n✦ Ekstrak makanan dari hero yang tidak digunakan\n\n═══════════════════════════════════════\n```\n\n---\n\n**Ingat**: Fokus pada satu faksi, investasi pada hero terbaik Anda, dan gunakan setiap buff yang tersedia. Prinsip-prinsip inti ini akan memaksimalkan efektivitas tempur Anda!\n\nSemoga beruntung, Survivor! ⚔️\n"])</script><script>self.__next_f.push([1,"15:T1554,"])</script><script>self.__next_f.push([1,"\n# 1軍戦闘力最適化 ⚔️\n\n戦闘力を最大化するには、4つの重要な領域に集中する必要があります：**部隊数量**、**部隊品質**、**バフ**、**食料最適化**。これらの必須戦略に従って最強の軍隊を構築しましょう。\n\n---\n\n## 1. 部隊数量（Quantity of Units）🏰\n\n出撃可能な部隊の総数を増やす：\n\n### 主要行動\n\n**軍事センターをアップグレード**\n  - 部隊収容力を直接増加させます\n\n**部隊収容力増加の研究**\n  - 研究センターで実施\n  - 各レベルごとに最大部隊収容力が増加します\n\n**パワーコアでオレンジ英雄装備を昇格**\n  - パワーコアを使用して伝説（オレンジ）装備をアップグレード\n  - 追加の部隊収容力ボーナスを提供\n\n**英雄の星レベルを上げる**\n  - 英雄の星評価を上げる\n  - 高い星レベルは部隊収容力を増加させます\n\n---\n\n## 2. 部隊品質（Quality of Units）🎯\n\n効率性を最大化するために研究に集中：\n\n### 専門化の法則\n\n**1つの主力兵種のみ研究する：**\n- ファイター\n- シューター\n- ライダー\n\n**すべての兵種を均等に研究しないでください。** 主力兵種を選択し、すべての軍事研究をその単一兵種に集中して最大の戦闘力を得ましょう。\n\n---\n\n## 3. バフ（Buffs）💪\n\n戦略的バフで戦闘力を倍増：\n\n### オレンジ英雄装備\n\n**英雄装備は部隊攻撃力と部隊収容力ボーナスを提供します**\n- パワーコアとブルークリスタルの使用を最適化するために、トップ5の主力英雄の装備のみに集中\n\n### 専用武器\n\n**専用武器は部隊攻撃力（DMG）と部隊体力（HP）ボーナスを提供します**\n- 常に専用武器を持つ英雄を編成に使用してください\n\n### 3番目スキルの最大化\n\n以下の英雄は3番目スキルに強力な部隊関連バフを持っています：\n\n**ファイター兵種：**\n- **トリスタン**\n- **フランシス**\n- **ラン**\n\n**シューター兵種：**\n- **ナターシャ**\n- **マーガレット**\n- **ダリアン**\n\n**ライダー兵種：**\n- **サイラス**\n- **マルシア**\n- **カトリーナ**\n\n**優先順位：** これらの英雄の3番目スキルレベルを可能な限り最高レベルまで最優先で上げてください。\n\n### 首都官職\n\n**大元帥などの首都官職を活用して戦闘力（CP）を一時的に最大化**\n- 重要な戦闘やイベントの前にこれらの官職に申請してください\n\n---\n\n## 4. 食料最適化（Food Optimization）🌾\n\n食料を効率的に管理して英雄の力を最大化：\n\n### トップ5の法則\n\n**トップ5の英雄にのみ食料を集中投資**\n- 主力5名以外の英雄に食料を無駄にしないでください\n\n### 訓練センター\n\n**訓練センターを使用して他の英雄のレベルをトップ5と同じにする**\n- すべての英雄に食料を与えずに競争力のあるレベルを維持できます\n\n### レアリティ別英雄レベル制限\n\n**青レアリティ英雄（レア）：**\n- **レベル40まで**のみ育成\n- 40でレベルアップを停止\n\n**紫レアリティ英雄（エピック）：**\n- 有用な紫レアリティ英雄のみ**レベル40まで**育成\n- 例：アンドレ\n- レベル40以上に食料を投資する価値はありません\n\n### 食料回収\n\n**訓練センターで英雄に投入した食料を回収できます**\n- もう使用しない英雄から食料を回収できます\n- より良い英雄にリソースを再配分するために使用してください\n\n---\n\n## クイックリファレンス要約 📋\n\n```\n═══════════════════════════════════════\n        1軍戦闘力最適化\n═══════════════════════════════════════\n\n1️⃣ 部隊数量\n✦ 軍事センターをアップグレード\n✦ 部隊収容力増加の研究\n✦ パワーコアでオレンジ装備を昇格\n✦ 英雄の星レベルを上げる\n\n2️⃣ 部隊品質\n✦ 1つの兵種を選択（ファイター/シューター/ライダー）\n✦ 主力兵種のみ研究\n\n3️⃣ バフ\n✦ トップ5英雄のオレンジ装備をアップグレードして集中\n✦ 専用武器を持つ英雄を使用\n✦ 3番目スキルレベルを最大化：\n  - ファイター：トリスタン、フランシス、ラン\n  - シューター：ナターシャ、マーガレット、ダリアン\n  - ライダー：サイラス、マルシア、カトリーナ\n✦ 首都官職を活用（大元帥）\n\n4️⃣ 食料最適化\n✦ トップ5英雄にのみ食料を投資\n✦ 訓練センターで他の英雄レベルを均等化\n✦ 青英雄：レベル40制限\n✦ 紫英雄：レベル40制限（例：アンドレ）\n✦ 未使用英雄から食料を回収\n\n═══════════════════════════════════════\n```\n\n---\n\n**覚えておいてください**：1つの兵種に集中し、最高の英雄に投資し、利用可能なすべてのバフを活用してください。これらの核心原則があなたの戦闘効率を最大化します！\n\n幸運を祈ります、生存者！ ⚔️\n"])</script><script>self.__next_f.push([1,"16:T1462,"])</script><script>self.__next_f.push([1,"\n# 1군 전투력 최적화 ⚔️\n\n전투력을 극대화하려면 네 가지 핵심 영역에 집중해야 합니다: **병력 수량**, **병력 품질**, **버프**, **식량 최적화**. 이 필수 전략들을 따라 최강의 군대를 구축하세요.\n\n---\n\n## 1. 병력 수량 (Quantity of Units) 🏰\n\n출격 가능한 병력의 총 수를 늘리세요:\n\n### 주요 행동\n\n- **군사 센터 업그레이드**\n  - 병력 수용량을 직접적으로 증가시킵니다\n\n- **병력 수용량 증가 연구**\n  - 연구 센터에서 진행\n  - 각 레벨마다 최대 병력 수용량이 증가합니다\n\n- **에너지 코어로 주황 영웅 장비 승급**\n  - 에너지 코어를 사용하여 전설(주황) 장비를 업그레이드\n  - 추가 병력 수용량 보너스 제공\n\n- **영웅 성급(★) 상승**\n  - 영웅 성급 등급 증가\n  - 높은 성급은 병력 수용량을 증가시킵니다\n\n---\n\n## 2. 병력 품질 (Quality of Units) 🎯\n\n효율성을 극대화하기 위해 연구에 집중하세요:\n\n### 특화 법칙\n\n**단 하나의 주력 병종에 대해서만 연구하세요:**\n- 파이터\n- 슈터\n- 라이더\n\n**모든 병종을 균등하게 연구하지 마세요.** 주력 병종을 선택하고 모든 군사 연구를 그 단일 병종에 집중하여 최대 전투력을 얻으세요.\n\n---\n\n## 3. 버프 (Buffs) 💪\n\n전략적 버프로 전투력을 배가시키세요:\n\n### 주황 영웅 장비\n\n**영웅 장비는 병력 공격력과 병력 수용량 보너스를 제공합니다**\n- 에너지 코어와 블루 크리스탈 사용을 최적화하기 위해 상위 5명의 주력 영웅 장비에만 집중하세요\n\n### 전용 무기\n\n**전용 무기는 병력 공격력(DMG)과 병력 체력(HP) 보너스를 제공합니다**\n- 항상 전용 무기를 보유한 영웅을 편성에 사용하세요\n\n### 3번째 스킬 극대화\n\n다음 영웅들은 3번째 스킬에 강력한 병력 관련 버프를 보유하고 있습니다:\n\n**파이터 병종:**\n- **트리스탄**\n- **프란시스**\n- **란**\n\n**슈터 병종:**\n- **나타샤**\n- **마가릿**\n- **다리안**\n\n**라이더 병종:**\n- **사이러스**\n- **마르시아**\n- **카트리나**\n\n**우선순위:** 이 영웅들의 3번째 스킬 레벨을 가능한 최고 레벨까지 최우선으로 올리세요.\n\n### 수도 관직\n\n- **대원수 등의 수도 관직을 활용하여 전투력(CP)을 일시적으로 극대화하세요**\n- 중요한 전투나 이벤트 전에 이 관직에 신청하세요\n\n---\n\n## 4. 식량 최적화 (Food Optimization) 🌾\n\n식량을 효율적으로 관리하여 영웅의 힘을 극대화하세요:\n\n### 상위 5명 법칙\n\n- **상위 5명의 영웅에게만 식량을 집중 투자하세요**\n- 주력 5명 외의 영웅에게 식량을 낭비하지 마세요\n\n### 훈련 센터\n\n- **훈련 센터를 사용하여 다른 영웅들의 레벨을 상위 5명과 동일하게 맞추세요**\n- 모든 영웅에게 식량을 주지 않고도 경쟁력 있는 레벨을 유지할 수 있습니다\n\n### 등급별 영웅 레벨 제한\n\n**파란 등급 영웅 (일반):**\n- **레벨 40까지만** 육성\n- 40에서 레벨업 중단\n\n**보라 등급 영웅 (희귀):**\n- 유용한 보라 등급 영웅만 **레벨 40까지** 육성\n- 예시: 안드레이\n- 레벨 40 이상으로 식량을 투자할 가치가 없습니다\n\n### 식량 회수\n\n- **훈련 센터에서 영웅에게 투입한 식량을 회수할 수 있습니다**\n- 더 이상 사용하지 않는 영웅에게서 식량을 회수할 수 있습니다\n- 더 나은 영웅에게 자원을 재분배하는 데 사용하세요\n\n---\n\n## 빠른 참조 요약 📋\n\n```\n═══════════════════════════════════════\n        병력 전투력 최적화\n═══════════════════════════════════════\n\n1️⃣ 병력 수량\n✦ 군사 센터 업그레이드\n✦ 병력 수용량 증가 연구\n✦ 에너지 코어로 주황 장비 승급\n✦ 영웅 성급 상승\n\n2️⃣ 병력 품질\n✦ 하나의 병종 선택 (파이터/슈터/라이더)\n✦ 주력 병종에 대해서만 연구\n\n3️⃣ 버프\n✦ 상위 5명 영웅의 주황 장비 업그레이드 및 집중\n✦ 전용 무기 보유 영웅 사용\n✦ 3번째 스킬 레벨 극대화:\n  - 파이터: 트리스탄, 프란시스, 란\n  - 슈터: 나타샤, 마가릿, 다리안\n  - 라이더: 사이러스, 마르시아, 카트리나\n✦ 수도 관직 활용 (대원수)\n\n4️⃣ 식량 최적화\n✦ 상위 5명 영웅에게만 식량 투자\n✦ 훈련 센터로 다른 영웅 레벨 동일화\n✦ 파란 영웅: 레벨 40 제한\n✦ 보라 영웅: 레벨 40 제한 (예: 안드레이)\n✦ 미사용 영웅에게서 식량 회수\n\n═══════════════════════════════════════\n```\n\n---\n\n**기억하세요**: 하나의 병종에 집중하고, 최고의 영웅에게 투자하며, 사용 가능한 모든 버프를 활용하세요. 이러한 핵심 원칙들이 당신의 전투 효율성을 극대화할 것입니다!\n\n행운을 빕니다, 생존자님! ⚔️\n"])</script><script>self.__next_f.push([1,"17:T10be,"])</script><script>self.__next_f.push([1,"\n# Formation1 Power Optimization ⚔️\n\nMaximizing your combat power requires focusing on four key areas: **Quantity**, **Quality**, **Buffs**, and **Food Optimization**. Follow these essential strategies to build the strongest army possible.\n\n---\n\n## 1. Quantity of Units 🏰\n\nIncrease the total number of troops you can field:\n\n### Key Actions\n\n**Upgrade Military Center**\n  - Directly increases your troop capacity\n\n**Research Troop Cap Increase**\n  - Found in the Research Center\n  - Each level increases maximum troop capacity\n\n**Promote Orange Hero Equipment with Power Cores**\n  - Use power cores to upgrade legendary (orange) equipment\n  - Provides additional troop capacity bonuses\n\n**Level Up Heroes' Star Levels**\n  - Increase hero star ratings\n  - Higher star levels boost troop capacity\n\n---\n\n## 2. Quality of Units 🎯\n\nFocus your research to maximize effectiveness:\n\n### The Specialization Rule\n\n**Research only for ONE main faction:**\n- Fighter\n- Shooter\n- Rider\n\n**Do NOT research all factions equally.** Choose your main faction and dedicate all military research to that single faction for maximum power.\n\n---\n\n## 3. Buffs 💪\n\nMultiply your combat power with strategic buffs:\n\n### Orange Hero Equipments\n\n**Hero Equipments provide Troop DMG and Troop Capacity bonuses**\n- Focus on top 5 main heroes' equipments only to optimize the use of power cores and blue crystals\n\n### Exclusive Weapons\n\n**Exclusive weapons provide Troop DMG and Troop HP bonuses**\n- Always use heroes that have exclusive weapons in your formation\n\n### 3rd Skill Maximization\n\nThe following heroes have powerful troop-related buffs in their 3rd skills:\n\n**Fighter Faction:**\n- **Tristan**\n- **Francis**\n- **Lan**\n\n**Shooter Faction:**\n- **Natasha**\n- **Margaret**\n- **Darian**\n\n**Rider Faction:**\n- **Sirus**\n- **Marcia**\n- **Katrina**\n\n**Priority:** Maximize the 3rd skill levels of these heroes to the highest level possible.\n\n### Capital Seats\n\n**Use capital positions like Grand Marshall to maximize CP temporarily**\n- Apply for these seats before important battles or events\n\n---\n\n## 4. Food Optimization 🌾\n\nManage food efficiently to maximize hero strength:\n\n### The Top 5 Rule\n\n**Only feed your top 5 heroes**\n- Don't waste food on heroes outside your main 5\n\n### Training Center\n\n**Use Training Center to equalize other heroes' levels to your top 5 heroes**\n- This allows you to have many heroes at competitive levels without feeding them all\n\n### Hero Level Caps by Rarity\n\n**Blue Heroes (Rare):**\n- Feed only until **Level 40**\n- Stop leveling at 40\n\n**Purple Heroes (Epic):**\n- Feed useful purple heroes only until **Level 40**\n- Example: Andre\n- Not worth investing food beyond level 40\n\n### Food Extraction\n\n**You can extract food that was fed to heroes at the Training Center**\n- Allows you to recover food from heroes you no longer use\n- Use this to reallocate resources to better heroes\n\n---\n\n## Quick Reference Summary 📋\n\n```\n═══════════════════════════════════════\n     TROOP POWER OPTIMIZATION\n═══════════════════════════════════════\n\n1️⃣ QUANTITY\n✦ Upgrade Military Center\n✦ Research Troop Cap Increase\n✦ Promote orange equipment with power cores\n✦ Level up heroes' star levels\n\n2️⃣ QUALITY\n✦ Choose ONE faction (Fighter/Shooter/Rider)\n✦ Research ONLY your main faction\n\n3️⃣ BUFFS\n✦ Upgrade and focus on top 5 heroes' orange equipments\n✦ Use heroes with exclusive weapons\n✦ Maximize 3rd skill levels:\n  - Fighter: Tristan, Francis, Lan\n  - Shooter: Natasha, Margaret, Darian\n  - Rider: Sirus, Marcia, Katrina\n✦ Use capital seats (Grand Marshall)\n\n4️⃣ FOOD OPTIMIZATION\n✦ Feed ONLY top 5 heroes\n✦ Use Training Center to equalize others\n✦ Blue heroes: Cap at level 40\n✦ Purple heroes: Cap at level 40 (e.g., Andre)\n✦ Extract food from unused heroes\n\n═══════════════════════════════════════\n```\n\n---\n\n**Remember**: Focus on one faction, invest in your best heroes, and use every buff available. These core principles will maximize your combat effectiveness!\n\nGood luck, Survivor! ⚔️\n"])</script><script>self.__next_f.push([1,"18:T1125,"])</script><script>self.__next_f.push([1,"\n# Troop Power Optimization ⚔️\n\nPara ma-maximize ang combat power mo, kailangan mong mag-focus sa apat na key areas: **Quantity**, **Quality**, **Buffs**, at **Food Optimization**. Sundin ang essential strategies na ito para bumuo ng pinakamalakas na army.\n\n---\n\n## 1. Quantity of Units 🏰\n\nDagdagan ang total number ng troops na pwede mong i-deploy:\n\n### Key Actions\n\n**Upgrade ang Military Center**\n  - Directly increases your troop capacity\n\n**Research ang Troop Cap Increase**\n  - Found sa Research Center\n  - Each level increases maximum troop capacity\n\n**Promote Orange Hero Equipment using Power Cores**\n  - Use power cores para i-upgrade ang legendary (orange) equipment\n  - Provides additional troop capacity bonuses\n\n**Level Up ang Heroes' Star Levels**\n  - Increase hero star ratings\n  - Higher star levels boost troop capacity\n\n---\n\n## 2. Quality of Units 🎯\n\nFocus ang research para ma-maximize ang effectiveness:\n\n### The Specialization Rule\n\n**Research lang para sa ONE main faction:**\n- Fighter\n- Shooter\n- Rider\n\n**HUWAG mag-research ng all factions equally.** Choose your main faction at dedicate all military research sa single faction na yan para sa maximum power.\n\n---\n\n## 3. Buffs 💪\n\nMultiply ang combat power mo using strategic buffs:\n\n### Orange Hero Equipments\n\n**Hero Equipments provide Troop DMG and Troop Capacity bonuses**\n- Focus lang sa top 5 main heroes' equipments para ma-optimize ang use ng power cores and blue crystals\n\n### Exclusive Weapons\n\n**Exclusive weapons provide Troop DMG and Troop HP bonuses**\n- Always use heroes na may exclusive weapons sa formation mo\n\n### 3rd Skill Maximization\n\nAng mga heroes na ito may powerful troop-related buffs sa kanilang 3rd skills:\n\n**Fighter Faction:**\n- **Tristan**\n- **Francis**\n- **Lan**\n\n**Shooter Faction:**\n- **Natasha**\n- **Margaret**\n- **Darian**\n\n**Rider Faction:**\n- **Sirus**\n- **Marcia**\n- **Katrina**\n\n**Priority:** Maximize ang 3rd skill levels ng heroes na ito to the highest level possible.\n\n### Capital Seats\n\n**Use capital positions like Grand Marshal para i-maximize ang CP temporarily**\n- Apply for these seats before important battles or events\n\n---\n\n## 4. Food Optimization 🌾\n\nManage food efficiently para ma-maximize ang hero strength:\n\n### The Top 5 Rule\n\n**Feed lang ang top 5 heroes mo**\n- Don't waste food sa heroes outside your main 5\n\n### Training Center\n\n**Use Training Center para i-equalize ang other heroes' levels sa top 5 heroes mo**\n- This allows you to have many heroes at competitive levels without feeding them all\n\n### Hero Level Caps by Rarity\n\n**Blue Heroes (Rare):**\n- Feed lang until **Level 40**\n- Stop leveling at 40\n\n**Purple Heroes (Epic):**\n- Feed useful purple heroes lang until **Level 40**\n- Example: Andre\n- Not worth investing food beyond level 40\n\n### Food Extraction\n\n**You can extract food na na-feed sa heroes at the Training Center**\n- Allows you to recover food from heroes na hindi mo na ginagamit\n- Use this para i-reallocate resources to better heroes\n\n---\n\n## Quick Reference Summary 📋\n\n```\n═══════════════════════════════════════\n     TROOP POWER OPTIMIZATION\n═══════════════════════════════════════\n\n1️⃣ QUANTITY\n✦ Upgrade Military Center\n✦ Research Troop Cap Increase\n✦ Promote orange equipment with power cores\n✦ Level up heroes' star levels\n\n2️⃣ QUALITY\n✦ Choose ONE faction (Fighter/Shooter/Rider)\n✦ Research ONLY your main faction\n\n3️⃣ BUFFS\n✦ Upgrade and focus on top 5 heroes' orange equipments\n✦ Use heroes with exclusive weapons\n✦ Maximize 3rd skill levels:\n  - Fighter: Tristan, Francis, Lan\n  - Shooter: Natasha, Margaret, Darian\n  - Rider: Sirus, Marcia, Katrina\n✦ Use capital seats (Grand Marshal)\n\n4️⃣ FOOD OPTIMIZATION\n✦ Feed ONLY top 5 heroes\n✦ Use Training Center to equalize others\n✦ Blue heroes: Cap at level 40\n✦ Purple heroes: Cap at level 40 (e.g., Andre)\n✦ Extract food from unused heroes\n\n═══════════════════════════════════════\n```\n\n---\n\n**Remember**: Focus sa one faction, invest sa best heroes mo, and use every available buff. These core principles will maximize your combat effectiveness!\n\nGood luck, Survivor! ⚔️\n"])</script><script>self.__next_f.push([1,"19:T101c,"])</script><script>self.__next_f.push([1,"\n# 1军战斗力优化 ⚔️\n\n战斗力最大化需要专注于四个关键领域：**部队数量**、**部队质量**、**增益**、**食物优化**。遵循这些核心策略构建最强大的军队。\n\n---\n\n## 1. 部队数量（Quantity of Units）🏰\n\n增加你能出战的部队总数：\n\n### 关键行动\n\n**升级军事中心**\n  - 直接增加部队容量\n\n**研究部队容量增加**\n  - 在研究中心进行\n  - 每个等级都会增加最大部队容量\n\n**用能量核心升级橙色英雄装备**\n  - 使用能量核心升级传说（橙色）装备\n  - 提供额外的部队容量加成\n\n**提升英雄星级**\n  - 提高英雄星级评价\n  - 更高的星级会增加部队容量\n\n---\n\n## 2. 部队质量（Quality of Units）🎯\n\n专注研究以最大化效率：\n\n### 专业化法则\n\n**只研究一个主力兵种：**\n- 战士\n- 射手\n- 骑兵\n\n**不要平均研究所有兵种。** 选择你的主力兵种，将所有军事研究投入到这单一兵种以获得最大战斗力。\n\n---\n\n## 3. 增益（Buffs）💪\n\n用战略性增益倍增战斗力：\n\n### 橙色英雄装备\n\n**英雄装备提供部队攻击力和部队容量加成**\n- 专注于前5名主力英雄的装备，以优化能量核心和蓝色水晶的使用\n\n### 专属装备\n\n**专属武器提供部队攻击力（DMG）和部队生命值（HP）加成**\n- 始终在编队中使用拥有专属武器的英雄\n\n### 第3技能最大化\n\n以下英雄的第3技能拥有强大的部队相关增益：\n\n**战士兵种：**\n- **特里斯坦**\n- **弗朗西斯**\n- **兰**\n\n**射手兵种：**\n- **娜塔莎**\n- **玛格丽特**\n- **达里安**\n\n**骑兵兵种：**\n- **塞勒斯**\n- **玛西娅**\n- **卡特琳娜**\n\n**优先级：** 优先将这些英雄的第3技能等级提升到最高级别。\n\n### 首都官职\n\n**利用大元帅等首都官职临时最大化战斗力（CP）**\n- 在重要战斗或活动前申请这些官职\n\n---\n\n## 4. 食物优化（Food Optimization）🌾\n\n高效管理食物以最大化英雄实力：\n\n### 前5名法则\n\n**只给前5名英雄喂食**\n- 不要在主力5名以外的英雄上浪费食物\n\n### 训练中心\n\n**使用训练中心将其他英雄的等级调整到与前5名相同**\n- 这样可以在不给所有英雄喂食的情况下保持竞争力的等级\n\n### 稀有度别英雄等级上限\n\n**蓝色稀有度英雄（稀有）：**\n- 只培养到**40级**\n- 在40级停止升级\n\n**紫色稀有度英雄（史诗）：**\n- 只培养有用的紫色稀有度英雄到**40级**\n- 例如：安德烈\n- 投资食物超过40级不值得\n\n### 食物回收\n\n**可以在训练中心回收喂给英雄的食物**\n- 可以从不再使用的英雄那里回收食物\n- 用于重新分配资源给更好的英雄\n\n---\n\n## 快速参考总结 📋\n\n```\n═══════════════════════════════════════\n        1军战斗力优化\n═══════════════════════════════════════\n\n1️⃣ 部队数量\n✦ 升级军事中心\n✦ 研究部队容量增加\n✦ 用能量核心升级橙色装备\n✦ 提升英雄星级\n\n2️⃣ 部队质量\n✦ 选择一个兵种（战士/射手/骑兵）\n✦ 只研究主力兵种\n\n3️⃣ 增益\n✦ 升级并专注于前5名英雄的橙色装备\n✦ 使用拥有专属武器的英雄\n✦ 最大化第3技能等级：\n  - 战士：特里斯坦、弗朗西斯、兰\n  - 射手：娜塔莎、玛格丽特、达里安\n  - 骑兵：塞勒斯、玛西娅、卡特琳娜\n✦ 利用首都官职（大元帅）\n\n4️⃣ 食物优化\n✦ 只给前5名英雄喂食\n✦ 使用训练中心调整其他英雄等级\n✦ 蓝色英雄：40级上限\n✦ 紫色英雄：40级上限（例如：安德烈）\n✦ 从未使用英雄回收食物\n\n═══════════════════════════════════════\n```\n\n---\n\n**记住**：专注于一个兵种，投资最好的英雄，利用所有可用的增益。这些核心原则将最大化你的战斗效率！\n\n祝你好运，幸存者！ ⚔️\n"])</script><script>self.__next_f.push([1,"7:[\"$\",\"$L12\",null,{\"slug\":\"formation1-power-optimization\",\"versions\":{\"ar\":{\"slug\":\"formation1-power-optimization\",\"metadata\":{\"title\":\"تحسين قوة القوات الأولى\",\"description\":\"استراتيجيات أساسية لتعظيم قوتك القتالية من خلال كمية القوات والجودة والتعزيزات وإدارة الطعام الفعالة\",\"category\":\"strategy\",\"tags\":[\"troops\",\"combat\",\"power\",\"optimization\",\"heroes\",\"buffs\"],\"publishedAt\":\"2026-01-23\",\"difficulty\":\"intermediate\",\"estimatedReadTime\":6,\"featured\":true,\"locale\":\"ar\"},\"content\":\"$13\",\"headings\":[{\"id\":\"1-كمية-القوات-quantity-of-units\",\"text\":\"1. كمية القوات (Quantity of Units) 🏰\",\"level\":2},{\"id\":\"الإجراءات-الرئيسية\",\"text\":\"الإجراءات الرئيسية\",\"level\":3},{\"id\":\"2-جودة-القوات-quality-of-units\",\"text\":\"2. جودة القوات (Quality of Units) 🎯\",\"level\":2},{\"id\":\"قاعدة-التخصص\",\"text\":\"قاعدة التخصص\",\"level\":3},{\"id\":\"3-التعزيزات-buffs\",\"text\":\"3. التعزيزات (Buffs) 💪\",\"level\":2},{\"id\":\"معدات-الأبطال-البرتقالية\",\"text\":\"معدات الأبطال البرتقالية\",\"level\":3},{\"id\":\"الأسلحة-الحصرية\",\"text\":\"الأسلحة الحصرية\",\"level\":3},{\"id\":\"تعظيم-المهارة-الثالثة\",\"text\":\"تعظيم المهارة الثالثة\",\"level\":3},{\"id\":\"مناصب-العاصمة\",\"text\":\"مناصب العاصمة\",\"level\":3},{\"id\":\"4-تحسين-الطعام-food-optimization\",\"text\":\"4. تحسين الطعام (Food Optimization) 🌾\",\"level\":2},{\"id\":\"قاعدة-أفضل-5\",\"text\":\"قاعدة أفضل 5\",\"level\":3},{\"id\":\"مركز-التدريب\",\"text\":\"مركز التدريب\",\"level\":3},{\"id\":\"حدود-مستوى-الأبطال-حسب-الندرة\",\"text\":\"حدود مستوى الأبطال حسب الندرة\",\"level\":3},{\"id\":\"استخراج-الطعام\",\"text\":\"استخراج الطعام\",\"level\":3},{\"id\":\"ملخص-مرجعي-سريع\",\"text\":
